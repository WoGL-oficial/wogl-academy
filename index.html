        es:'<p>FBM estático es una foto. Súmale <code>T</code> a las coordenadas y empieza a <strong>moverse</strong>. La velocidad cambia todo.</p><p><em>Cascada de bits que nadie detuvo.</em></p><div class="glossary"><span class="glossary-label">fb(p + T * vel)</span>El tiempo desplaza las coordenadas. El noise se calcula en una posición que cambia cada frame.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.2</code> a <code>1.0</code> — rápido. A <code>0.05</code> — lento.</span></div>',
        en:'<p>Static FBM is a photo. Add <code>T</code> to the coordinates and it starts <strong>moving</strong>. The speed changes everything.</p><p><em>A cascade of bits no one stopped.</em></p><div class="glossary"><span class="glossary-label">fb(p + T * vel)</span>Time shifts the coordinates. The noise is calculated at a position that changes every frame.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.2</code> to <code>1.0</code> — fast. To <code>0.05</code> — slow.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float col_id = floor(p.x * 10.0);\n  float speed = 0.5 + h2(vec2(col_id, 0.0)) * 1.5;\n  float scrolled = p.y + T * speed;\n  vec2 grid = vec2(col_id, floor(scrolled * 8.0));\n  float id = h2(grid);\n  float on = step(0.4, id);\n  float bright = step(0.85, id);\n  float trail = exp(-fract(scrolled * 8.0) * 3.0);\n  vec3 col = vec3(0.0, on * 0.5 * trail, on * 0.4 * trail);\n  col += vec3(0.0, 0.9, 0.7) * bright * trail;\n  col += vec3(0.01, 0.02, 0.02);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'06', title:{es:'Terrain',en:'Terrain'}, desc:{es:'Noise como data. step() como filtro.',en:'Noise as data. step() as filter.'},
      explain: {
        es:'<p>El noise no solo es color — es <strong>información</strong>. Aquí lo usamos como elevación de un terreno. Con <code>step()</code> cortas el terreno en niveles — como un mapa topográfico.</p><div class="glossary"><span class="glossary-label">step() como nivel</span>Cada <code>step()</code> define un nivel de altura. Abajo del umbral = un color. Arriba = otro. Varios steps = varios niveles.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.3</code> y <code>0.6</code> para mover los niveles. Agrega otro <code>step()</code> con un tercer color.</span></div>',
        en:'<p>Noise is not just color — it is <strong>information</strong>. Here we use it as terrain elevation. With <code>step()</code> you cut the terrain into levels — like a topographic map.</p><div class="glossary"><span class="glossary-label">step() as level</span>Each <code>step()</code> defines a height level. Below the threshold = one color. Above = another. Multiple steps = multiple levels.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.3</code> and <code>0.6</code> to move the levels. Add another <code>step()</code> with a third color.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float v = n2(p * 3.0) * 0.5 + n2(p * 6.0 + 2.0) * 0.3 + n2(p * 12.0) * 0.2;\n  float contour = abs(fract(v * 10.0) - 0.5);\n  contour = 1.0 - smoothstep(0.0, 0.04, contour);\n  vec2 gridLine = abs(fract(p * 8.0) - 0.5);\n  float grid = 1.0 - smoothstep(0.0, 0.03, min(gridLine.x, gridLine.y));\n  float zone = floor(v * 4.0) / 4.0;\n  vec3 col = vec3(0.01, 0.03 + zone * 0.06, 0.02 + zone * 0.04);\n  col += vec3(0.0, 0.9, 0.7) * contour * 0.5;\n  col += vec3(0.0, 0.3, 0.25) * grid * 0.2;\n  col += vec3(0.95, 0.0, 0.5) * step(0.75, v) * 0.3;\n  col += vec3(0.01, 0.01, 0.02);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'07', title:{es:'Sphere',en:'Sphere'}, desc:{es:'Noise + clip = esfera.',en:'Noise + clip = sphere.'},
      explain: {
        es:'<p>El noise no tiene que llenar toda la pantalla. <strong>Recórtalo con un círculo</strong> y parece una esfera — un planeta, una luna, una gota.</p><p>Combinas el <code>smoothstep()</code> del círculo con el noise como color adentro.</p><p><em>Esfera de datos. Latitud, longitud, glitch.</em></p><div class="glossary"><span class="glossary-label">Combinar técnicas</span>Círculo de Start Here + noise de esta sección = esfera con textura. Cada sección te da herramientas que se combinan.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el radio <code>0.6</code>. Cambia <code>p * 5.</code> para la escala. Agrega <code>+ T * 0.1</code> para que la textura se mueva.</span></div>',
        en:'<p>Noise does not have to fill the whole screen. <strong>Clip it with a circle</strong> and it looks like a sphere — a planet, a moon, a drop.</p><p>You combine the <code>smoothstep()</code> circle with noise as the color inside.</p><p><em>Data sphere. Latitude, longitude, glitch.</em></p><div class="glossary"><span class="glossary-label">Combining techniques</span>Circle from Start Here + noise from this section = textured sphere. Each section gives you tools that combine.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change the radius <code>0.6</code>. Change <code>p * 5.</code> for the scale. Add <code>+ T * 0.1</code> to make the texture move.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float d = length(p);\n  float mask = smoothstep(0.6, 0.58, d);\n  float lat = abs(fract(p.y * 8.0) - 0.5);\n  float lon = abs(fract(p.x * 8.0) - 0.5);\n  float wire = 1.0 - smoothstep(0.0, 0.04, min(lat, lon));\n  float edge = 1.0 - smoothstep(0.0, 0.02, abs(d - 0.58));\n  float glitch = step(0.93, h2(vec2(floor(T * 3.0), floor(p.y * 6.0)))) * 0.12;\n  vec2 gp = p + vec2(glitch, 0.0);\n  float gd = length(gp);\n  vec3 col = vec3(0.0, wire * 0.5, wire * 0.4) * mask;\n  col += vec3(0.0, 0.9, 0.7) * edge * 0.7;\n  col += vec3(0.8, 0.0, 0.5) * step(0.55, gd) * step(gd, 0.62) * glitch * 5.0;\n  col += vec3(0.01, 0.015, 0.015);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'08', title:{es:'Color shift',en:'Color shift'}, desc:{es:'El campo recibe su coating.',en:'The field gets coating.'},
      explain: {
        es:'<p>Hasta ahora el noise elegía entre dos colores. Ahora lo usas para elegir de <code>iri()</code> — y cicla por <strong>todo el espectro</strong>.</p><p><em>Aberración cromática. La pantalla rota que ves bonita.</em></p><div class="glossary"><span class="glossary-label">iri(v)</span>La función de color de Start Here. El noise alimenta su input — cada valor mapea a un color diferente del espectro.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>v * 0.5</code> a <code>v * 1.</code> — más colores. Agrega <code>+ T * 0.05</code> para que derive.</span></div>',
        en:'<p>Until now noise chose between two colors. Now you use it to pick from <code>iri()</code> — and it cycles through <strong>the whole spectrum</strong>.</p><p><em>Chromatic aberration. The broken screen you find beautiful.</em></p><div class="glossary"><span class="glossary-label">iri(v)</span>The color function from Start Here. Noise feeds its input — each value maps to a different spectral color.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>v * 0.5</code> to <code>v * 1.</code> — more colors. Add <code>+ T * 0.05</code> to drift.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float shift = 0.06 + 0.03 * sin(T * 0.5);\n  float scan = step(0.5, sin(gl_FragCoord.y * 2.0) * 0.5 + 0.5) * 0.08;\n  vec2 pr = p + vec2(shift, 0.0);\n  vec2 pb = p - vec2(shift, 0.0);\n  float r = step(0.5, sin(pr.x * 15.0 + n2(vec2(pr.y * 3.0, 1.0)) * 4.0) * 0.5 + 0.5);\n  float g = step(0.5, sin(p.x * 15.0 + n2(vec2(p.y * 3.0, 2.0)) * 4.0) * 0.5 + 0.5);\n  float b = step(0.5, sin(pb.x * 15.0 + n2(vec2(pb.y * 3.0, 3.0)) * 4.0) * 0.5 + 0.5);\n  vec3 col = vec3(r * 0.85, g * 0.9, b * 0.75);\n  col *= 1.0 - scan;\n  col += vec3(0.02);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'09', title:{es:'Force',en:'Force'}, desc:{es:'Noise como displacement. El patrón se dobla.',en:'Noise as displacement. The pattern bends.'},
      explain: {
        es:'<p>El noise no solo colorea — puede <strong>empujar</strong>. Usa el noise para desplazar las coordenadas de un patrón y ese patrón se deforma. Las rayas rectas se tuercen.</p><p><em>Broadcast limpio. El noise lo destruye.</em></p><div class="glossary"><span class="glossary-label">Noise como fuerza</span>En vez de <code>sin(p.x)</code> usas <code>sin(p.x + noise)</code>. El noise empuja antes de evaluar. Preview de lo que viene en Domain Warp.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.5</code> a <code>1.5</code> — deformación extrema. A <code>0.1</code> — apenas se nota.</span></div>',
        en:'<p>Noise does not only color — it can <strong>push</strong>. Use noise to displace the coordinates of a pattern and that pattern deforms. Straight stripes twist.</p><p><em>Clean broadcast. Noise destroys it.</em></p><div class="glossary"><span class="glossary-label">Noise as force</span>Instead of <code>sin(p.x)</code> you use <code>sin(p.x + noise)</code>. Noise pushes before evaluating. Preview of what comes in Domain Warp.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.5</code> to <code>1.5</code> — extreme deformation. To <code>0.1</code> — barely noticeable.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Broadcast bars — señal limpia\n  float bar = floor(p.x * 7.0 + 3.5) / 7.0;\n  vec3 signal = vec3(0.0);\n  signal += vec3(0.9, 0.9, 0.9) * step(0.0, bar) * step(bar, 0.14);\n  signal += vec3(0.9, 0.9, 0.0) * step(0.14, bar) * step(bar, 0.28);\n  signal += vec3(0.0, 0.9, 0.9) * step(0.28, bar) * step(bar, 0.42);\n  signal += vec3(0.0, 0.9, 0.0) * step(0.42, bar) * step(bar, 0.56);\n  signal += vec3(0.9, 0.0, 0.9) * step(0.56, bar) * step(bar, 0.7);\n  signal += vec3(0.9, 0.0, 0.0) * step(0.7, bar) * step(bar, 0.84);\n  signal += vec3(0.0, 0.0, 0.9) * step(0.84, bar);\n  // Noise destruye la señal\n  float push = n2(vec2(p.y * 4.0, 0.5)) * 0.5;\n  float destroy = n2(vec2(p.y * 8.0, 1.5));\n  float glitch = step(0.7, destroy);\n  vec2 broken = p + vec2(push * glitch, 0.0);\n  float bar2 = floor(broken.x * 7.0 + 3.5) / 7.0;\n  vec3 corrupt = vec3(0.0);\n  corrupt += vec3(0.9, 0.9, 0.9) * step(0.0, bar2) * step(bar2, 0.14);\n  corrupt += vec3(0.9, 0.9, 0.0) * step(0.14, bar2) * step(bar2, 0.28);\n  corrupt += vec3(0.0, 0.9, 0.9) * step(0.28, bar2) * step(bar2, 0.42);\n  corrupt += vec3(0.0, 0.9, 0.0) * step(0.42, bar2) * step(bar2, 0.56);\n  corrupt += vec3(0.9, 0.0, 0.9) * step(0.56, bar2) * step(bar2, 0.7);\n  corrupt += vec3(0.9, 0.0, 0.0) * step(0.7, bar2) * step(bar2, 0.84);\n  corrupt += vec3(0.0, 0.0, 0.9) * step(0.84, bar2);\n  vec3 col = mix(signal, corrupt, glitch);\n  col += vec3(0.9, 0.0, 0.5) * glitch * 0.15;\n  float scan = step(0.5, sin(gl_FragCoord.y * 2.0) * 0.5 + 0.5) * 0.08;\n  col *= 1.0 - scan;\n  col += vec3(0.01);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'10', title:{es:'Your noise piece',en:'Your noise piece'}, desc:{es:'Dos capas. Dos direcciones. Tu pieza.',en:'Two layers. Two directions. Your piece.'},
      explain: {
        es:'<p>Todo lo que aprendiste en Noise. Dos capas de FBM moviéndose en direcciones opuestas, colores sunset, recortado con vignette.</p><p><em>La terminal completa. Cada técnica que aprendiste, cayendo.</em></p><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia las escalas <code>4.</code> y <code>6.</code>. Cambia las velocidades. Cambia los colores. <em>Este noise es tuyo.</em></span></div>',
        en:'<p>Everything you learned in Noise. Two layers of FBM moving in opposite directions, sunset colors, framed with vignette.</p><p><em>The full terminal. Every technique you learned, falling.</em></p><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change the scales <code>4.</code> and <code>6.</code>. Change the speeds. Change the colors. <em>This noise is yours.</em></span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float d = length(p);\n  float glitch = step(0.93, h2(vec2(floor(T * 5.0), floor(p.y * 6.0))));\n  p.x += glitch * 0.2;\n  float shift = 0.04;\n  float col_id = floor(p.x * 8.0);\n  float speed = 0.3 + h2(vec2(col_id, 0.0)) * 0.8;\n  float scroll = p.y + T * speed;\n  float data = step(0.45, h2(vec2(col_id, floor(scroll * 6.0))));\n  float trail = exp(-fract(scroll * 6.0) * 2.5);\n  float r = step(0.45, h2(vec2(floor((p.x+shift) * 8.0), floor(scroll * 6.0))));\n  float b = step(0.45, h2(vec2(floor((p.x-shift) * 8.0), floor(scroll * 6.0))));\n  vec3 col = vec3(r * 0.6, data * 0.9, b * 0.5) * trail;\n  col += vec3(0.0, 0.85, 0.65) * step(0.9, data) * trail;\n  col += vec3(0.9, 0.0, 0.5) * glitch * 0.5;\n  vec2 gridLine = abs(fract(p * 8.0) - 0.5);\n  float grid = 1.0 - smoothstep(0.0, 0.03, min(gridLine.x, gridLine.y));\n  col += vec3(0.0, 0.2, 0.15) * grid * 0.15;\n  float scan = step(0.5, sin(gl_FragCoord.y * 1.5) * 0.5 + 0.5) * 0.1;\n  col *= 1.0 - scan;\n  col *= 1.0 - d * 0.15;\n  col += vec3(0.015, 0.01, 0.02);\n  gl_FragColor = vec4(col, 1.);\n}',
      finale: true,
      celebrateTitle: { es:'Aprendiste noise.', en:'You learned noise.' },
      celebrateText: { es:'Hash, smooth noise, FBM, movimiento, terreno, esferas, color, fuerza — las herramientas fundamentales de la textura. <em>Lo siguiente es Domain Warp</em> — mismos ingredientes, nuevo cableado.', en:'Hash, smooth noise, FBM, motion, terrain, spheres, color, force — the core tools of texture. <em>Next up is Domain Warp</em> — same ingredients, new wiring.' },
    },
  ],
  '04': [
    { num:'01', title:{es:'Giraffe',en:'Giraffe'}, desc:{es:'La distorsión es el instrumento.',en:'Distortion is the instrument.'},
      welcome: true,
      explain: {
        es:'<p>Ya sabes hacer noise y FBM. Ahora vas a aprender a <strong>conectarlos diferente</strong> — usar la salida de un noise como entrada de otro. Eso es domain warp: el noise se dobla a sí mismo.</p><p>Para convertir ese campo en materiales reconocibles necesitas herramientas de corte y forma. Estas son las nuevas:</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">step(edge, x)</code> &nbsp; corte duro — 0 o 1, sin transición</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">smoothstep(a, b, x)</code> &nbsp; corte suave — transición gradual entre a y b</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(field * N)</code> &nbsp; convierte un campo en ondas — vetas, anillos, bandas</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">fract(p * N)</code> &nbsp; repite el espacio en celdas — escamas, mosaicos</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">length(p)</code> &nbsp; distancia al centro — todo lo radial</li></ul><p>Con estas herramientas + domain warp vas a fabricar: camuflaje, piel de vaca, leopardo, madera, tie-dye, escamas, mármol, y una lava lamp.</p><p>El código de abajo es tu primer domain warp. <code>fb(p + fb(p))</code> — una línea que cambia todo.</p><p><em>fb(p + fb(p)). El noise se distorsiona a sí mismo.</em></p><div class="glossary"><span class="glossary-label">fb(p + fb(p))</span>Evalúas <code>fb()</code> una vez para obtener un desplazamiento. Lo sumas a las coordenadas. Evalúas <code>fb()</code> otra vez. El noise se distorsiona a sí mismo = formas fluidas.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>0.8</code> (amplitud del warp) a <code>0.1</code> — apenas se dobla. A <code>2.0</code> — se come a sí mismo. Ese número es tu perilla principal.</span></div>',
        en:'<p>You already know noise and FBM. Now you will learn to <strong>connect them differently</strong> — use the output of one noise as input of another. That is domain warp: noise bends itself.</p><p>To turn that field into recognizable materials you need cutting and shaping tools. These are the new ones:</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">step(edge, x)</code> &nbsp; hard cut — 0 or 1, no transition</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">smoothstep(a, b, x)</code> &nbsp; soft cut — gradual transition between a and b</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(field * N)</code> &nbsp; turns a field into waves — veins, rings, bands</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">fract(p * N)</code> &nbsp; repeats space into cells — scales, mosaics</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">length(p)</code> &nbsp; distance to center — everything radial</li></ul><p>With these tools + domain warp you will build: camouflage, cow spots, leopard, wood grain, tie-dye, scales, marble, and a lava lamp.</p><p>The code below is your first domain warp. <code>fb(p + fb(p))</code> — one line that changes everything.</p><p><em>fb(p + fb(p)). Noise distorts itself.</em></p><div class="glossary"><span class="glossary-label">fb(p + fb(p))</span>Evaluate <code>fb()</code> once to get a displacement. Add it to coordinates. Evaluate <code>fb()</code> again. Noise distorts itself = fluid shapes.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.8</code> (warp amplitude) to <code>0.1</code> — barely bends. To <code>2.0</code> — eats itself. That number is your main knob.</span></div>'
      },
      code:'void main(){\n  vec2 p = gl_FragCoord.xy / R * 4.0;\n  float warp = fb(p);\n  float f = fb(p + warp * 0.8);\n  // Hard patches with dark cracks\n  float patch = smoothstep(0.42, 0.48, f);\n  float crack = 1.0 - smoothstep(0.38, 0.42, f);\n  vec3 hide = vec3(0.78, 0.55, 0.25);\n  vec3 dark = vec3(0.12, 0.06, 0.02);\n  vec3 col = mix(dark, hide, patch);\n  col *= 0.8 + 0.2 * f;\n  col -= vec3(0.06, 0.03, 0.01) * crack;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'02', title:{es:'Camo',en:'Camo'}, desc:{es:'Bordes suaves — camuflaje militar',en:'Soft edges — military camouflage'},
      explain: {
        es:'<p>Mismo warp, diferente corte. <code>smoothstep()</code> crea transiciones suaves entre zonas. Así nace el camuflaje: manchas que se derriten unas en otras.</p><p><em>Invisible entre los arbustos con una cerveza fría.</em></p><div class="glossary"><span class="glossary-label">smoothstep(a, b, x)</span>Transición suave de 0 a 1. Cuanto más separados a y b, más suave el borde.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Acerca los valores (<code>0.35</code>, <code>0.65</code>) → prueba (<code>0.49</code>, <code>0.51</code>) para bordes duros, o sepáralos (<code>0.2</code>, <code>0.8</code>) para difusos.</span></div>',
        en:'<p>Same warp, different cut. <code>smoothstep()</code> creates soft transitions between zones. This is how camouflage is born: patches melting into each other.</p><div class="glossary"><span class="glossary-label">smoothstep(a, b, x)</span>Smooth transition from 0 to 1. Further apart a and b = softer edge.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Bring the values (<code>0.35</code>, <code>0.65</code>) closer → try (<code>0.49</code>, <code>0.51</code>) for hard edges, or spread them (<code>0.2</code>, <code>0.8</code>) for diffuse.</span></div>'
      },
      code:'void main(){\n  vec2 p = gl_FragCoord.xy / R * 3.5;\n  float warp = fb(p + 1.5);\n  float f = fb(p + warp * 1.2);\n  // 4 zonas duras — military spec\n  vec3 dark = vec3(0.08, 0.06, 0.03);\n  vec3 brown = vec3(0.35, 0.22, 0.1);\n  vec3 olive = vec3(0.25, 0.35, 0.12);\n  vec3 sage = vec3(0.4, 0.5, 0.25);\n  vec3 col = dark;\n  col = mix(col, brown, step(0.25, f));\n  col = mix(col, olive, step(0.45, f));\n  col = mix(col, sage, step(0.65, f));\n  col *= 0.85 + 0.15 * f;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'03', title:{es:'Cow',en:'Cow'}, desc:{es:'Manchas grandes — Holstein clásica',en:'Big patches — classic Holstein'},
      explain: {
        es:'<p>La vaca es la giraffe con dos cambios: frecuencia más baja (manchas grandes) y threshold más alto (menos manchas, más blanco).</p><p><em>Holstein a las 6am, leche fresca.</em></p><div class="glossary"><span class="glossary-label">Frecuencia</span>El multiplicador de p controla el tamaño. Menor = manchas grandes. Mayor = textura fina.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Baja el multiplicador a 1.5 para manchas enormes, o sube a 5.0 para dálmata.</span></div>',
        en:'<p>The cow is the giraffe with two changes: lower frequency (bigger patches) and higher threshold (fewer patches, more white).</p><div class="glossary"><span class="glossary-label">Frequency</span>The multiplier on p controls size. Lower = big patches. Higher = fine texture.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Lower p multiplier to 1.5 for huge patches, raise to 5.0 for dalmatian.</span></div>'
      },
      code:'void main(){\n  vec2 p = gl_FragCoord.xy / R * 2.5;\n  float warp = fb(p);\n  float f = fb(p + warp * 0.8);\n  // Pure B&W, bigger patches, skin texture\n  float mask = smoothstep(0.55, 0.58, f);\n  float skin = n2(p * 20.0) * 0.04;\n  vec3 white = vec3(0.96, 0.94, 0.92);\n  vec3 black = vec3(0.03, 0.03, 0.04);\n  vec3 col = mix(white, black, mask);\n  col += skin * (1.0 - mask);\n  col *= 0.92 + 0.08 * (1.0 - mask);\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'04', title:{es:'Leopard',en:'Leopard'}, desc:{es:'Tercer color: rosetas con anillo',en:'Third color: rosettes with a ring'},
      explain: {
        es:'<p>Aquí entra el <strong>tercer color</strong>. Dos smoothsteps a diferentes thresholds crean tres zonas: fondo, anillo intermedio, y centro oscuro. La resta de dos smoothsteps = la franja del anillo.</p><p><em>Rosetas de tinta en papel kraft.</em></p><div class="glossary"><span class="glossary-label">Layering</span>Restar dos smoothsteps a diferentes umbrales crea un anillo de color intermedio.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el color c (centro) a rojo para ver las rosetas como ojos.</span></div>',
        en:'<p>Here comes the <strong>third color</strong>. Two smoothsteps at different thresholds create three zones: background, mid-ring, dark center. Subtracting two smoothsteps = the ring band.</p><div class="glossary"><span class="glossary-label">Layering</span>Subtracting two smoothsteps at different thresholds creates a mid-tone ring.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change color c (center) to red to see rosettes as eyes.</span></div>'
      },
      code:'void main(){\n  vec2 p = gl_FragCoord.xy / R * 3.0;\n  float warp = fb(p * 0.8);\n  float f = fb(p + warp * 1.2);\n  // Flat vector rosettes — step() not smoothstep()\n  float ring = step(0.46, f) - step(0.58, f);\n  float core = step(0.58, f);\n  vec3 gold = vec3(0.82, 0.65, 0.32);\n  vec3 ring_col = vec3(0.28, 0.15, 0.05);\n  vec3 spot = vec3(0.06, 0.04, 0.02);\n  vec3 col = gold;\n  col = mix(col, ring_col, ring);\n  col = mix(col, spot, core);\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'05', title:{es:'Wood',en:'Wood'}, desc:{es:'Vetas de madera con sin()',en:'Wood grain with sin()'},
      explain: {
        es:'<p><code>sin()</code> convierte un campo continuo en ondas repetitivas. Sobre un campo warpeado, esas ondas se curvan como vetas de madera. El multiplicador antes del sin() controla la densidad.</p><p><em>Mesa de roble recién barnizada.</em></p><div class="glossary"><span class="glossary-label">sin(f * N)</span>N = densidad de vetas. El warp les da curvatura natural.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Sube el multiplicador de 8.0 a 20.0 para grano más fino.</span></div>',
        en:'<p><code>sin()</code> turns a continuous field into repeating waves. Over a warped field, those waves bend like wood grain. The multiplier before sin() controls density.</p><div class="glossary"><span class="glossary-label">sin(f * N)</span>N = grain density. Warp gives natural curvature.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Raise multiplier from 8.0 to 20.0 for finer grain.</span></div>'
      },
      code:'void main(){\n  vec2 p = gl_FragCoord.xy / R * 3.0;\n  float warp = fb(p);\n  float f = fb(p + warp * 0.6);\n  // Flat vector grain — clean bands\n  float grain = sin(f * 10.0) * 0.5 + 0.5;\n  float band = floor(grain * 4.0) / 4.0;\n  float line = step(0.88, grain);\n  vec3 light = vec3(0.75, 0.55, 0.3);\n  vec3 mid = vec3(0.6, 0.4, 0.2);\n  vec3 dark = vec3(0.35, 0.2, 0.08);\n  vec3 col = mix(light, mid, band);\n  col = mix(col, dark, line);\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'06', title:{es:'Tie-dye',en:'Tie-dye'}, desc:{es:'Anillos psicodélicos con length()',en:'Psychedelic rings with length()'},
      explain: {
        es:'<p>Tie-dye es radial: <code>length()</code> crea anillos. Warpear antes del length() los distorsiona en formas fluidas. <code>sin()</code> sobre la distancia crea las bandas de color.</p><p><em>Woodstock, 1969, la playera que nunca lavaste.</em></p><div class="glossary"><span class="glossary-label">length(p)</span>Distancia al origen. Con warp = radial irregular.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia los 3 colores a neón para un resultado más rave.</span></div>',
        en:'<p>Tie-dye is radial: <code>length()</code> creates rings. Warping before length() distorts them into fluid shapes. <code>sin()</code> over distance creates color bands.</p><div class="glossary"><span class="glossary-label">length(p)</span>Distance to origin. With warp = irregular radial.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change all 3 colors to neon for a more rave result.</span></div>'
      },
      code:'void main(){\n  vec2 p = gl_FragCoord.xy / R * 3.0 - 1.5;\n  float warp = fb(p * 2.0);\n  vec2 wp = p + warp * 0.4;\n  float d = length(wp);\n  // Bold saturated rings with hard transitions\n  float rings = sin(d * 10.0) * 0.5 + 0.5;\n  float band = floor(rings * 4.0) / 4.0;\n  vec3 hot = vec3(0.95, 0.1, 0.3);\n  vec3 cool = vec3(0.1, 0.25, 0.9);\n  vec3 sun = vec3(0.95, 0.85, 0.0);\n  vec3 lime = vec3(0.2, 0.9, 0.3);\n  vec3 col = hot;\n  col = mix(col, cool, step(0.25, band));\n  col = mix(col, sun, step(0.5, band));\n  col = mix(col, lime, step(0.75, band));\n  col *= 0.9 + 0.1 * rings;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'07', title:{es:'Snake',en:'Snake'}, desc:{es:'Escamas con fract() y warp',en:'Scales with fract() and warp'},
      explain: {
        es:'<p><code>fract()</code> repite el espacio en celdas. Si warpeas antes, las celdas se deforman y parecen escamas. La distancia al centro de cada celda da forma hexagonal-ish.</p><p><em>Escamas de pitón bajo la lámpara del escritorio.</em></p><div class="glossary"><span class="glossary-label">fract(p)</span>Parte fraccionaria. Repite 0-1 infinitamente. Con warp = celdas irregulares.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Sube el multiplicador de p (5.0 → 8.0) para escamas más densas.</span></div><div class="glossary"><span class="glossary-label">Freebie</span>¿Te acuerdas de <code>T</code>? ¿Y de las coordenadas polares con <code>atan()</code>? Busca la línea 3 que dice:<br><code>vec2 wp = p + warp * 0.6;</code><br><br>Reemplázala por estas dos líneas:<br><code>float ang = atan(p.y, p.x) + T * 0.15;</code><br><code>vec2 wp = vec2(cos(ang), sin(ang)) * length(p) * 5.0 + warp * 0.6;</code><br><br>Las escamas rotan como un patrón vivo. Todo lo que aprendiste se conecta aquí.</div>',
        en:'<p><code>fract()</code> tiles space into cells. Warp before fract() and cells deform into scales. Distance to each cell center gives a hexagonal-ish shape.</p><div class="glossary"><span class="glossary-label">fract(p)</span>Fractional part. Repeats 0-1 infinitely. With warp = irregular cells.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Raise p multiplier (5.0 → 8.0) for smaller, denser scales.</span></div><div class="glossary"><span class="glossary-label">Freebie</span>Remember <code>T</code>? And polar coordinates with <code>atan()</code>? Find line 3 where it says:<br><code>vec2 wp = p + warp * 0.6;</code><br><br>Replace it with these two lines:<br><code>float ang = atan(p.y, p.x) + T * 0.15;</code><br><code>vec2 wp = vec2(cos(ang), sin(ang)) * length(p) * 5.0 + warp * 0.6;</code><br><br>The scales rotate like a living pattern. Everything you learned connects here.</div>'
      },
      code:'void main(){\n  vec2 p = gl_FragCoord.xy / R * 5.0;\n  float warp = fb(p * 0.5);\n  vec2 wp = p + warp * 0.6;\n  vec2 cell = fract(wp) - 0.5;\n  float d = length(cell);\n  // Python: dark patches, golden borders, pearlescent center\n  float scale_edge = smoothstep(0.3, 0.38, d);\n  float scale_center = smoothstep(0.15, 0.02, d);\n  float sheen = n2(wp * 8.0) * 0.08;\n  vec3 dark = vec3(0.12, 0.08, 0.03);\n  vec3 gold = vec3(0.75, 0.6, 0.3);\n  vec3 pearl = vec3(0.85, 0.78, 0.55);\n  vec3 col = mix(gold, dark, scale_edge);\n  col = mix(col, pearl, scale_center);\n  col += sheen;\n  col *= 0.85 + 0.15 * (1.0 - scale_edge);\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'08', title:{es:'Marble',en:'Marble'}, desc:{es:'Venas de mármol con sin()',en:'Marble veins with sin()'},
      explain: {
        es:'<p><code>sin()</code> de una coordenada + warp = vetas. La coordenada lineal da dirección, el warp las ondula. Tres colores: crema base, gris en vetas anchas, dorado en las más finas.</p><p><em>Mantequilla de tequila.</em></p><div class="glossary"><span class="glossary-label">sin(p.x + warp)</span>Coordenada lineal = dirección. Warp = ondulación. Juntos = mármol.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia p.x por p.y para vetas horizontales, o p.x + p.y para diagonales.</span></div>',
        en:'<p><code>sin()</code> of a coordinate + warp = veins. Linear coordinate gives direction, warp undulates them. Three colors: cream base, gray in wide veins, gold in finest lines.</p><div class="glossary"><span class="glossary-label">sin(p.x + warp)</span>Linear coordinate = direction. Warp = undulation. Together = marble.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change p.x to p.y for horizontal veins, or p.x + p.y for diagonal.</span></div>'
      },
      code:'void main(){\n  vec2 p = gl_FragCoord.xy / R * 3.0;\n  float warp = fb(p) * 2.5;\n  float vein = sin(p.x * 2.0 + warp) * 0.5 + 0.5;\n  // Thin veins on solid white, violet tint\n  float thin = smoothstep(0.82, 0.88, vein);\n  float hair = smoothstep(0.92, 0.95, vein);\n  float surface = n2(p * 12.0) * 0.03;\n  vec3 white = vec3(0.96, 0.94, 0.92);\n  vec3 grey = vec3(0.6, 0.55, 0.58);\n  vec3 viola = vec3(0.5, 0.35, 0.45);\n  vec3 gold = vec3(0.8, 0.7, 0.4);\n  vec3 col = white + surface;\n  col = mix(col, grey, thin * 0.5);\n  col = mix(col, viola, thin * 0.3);\n  col = mix(col, gold, hair);\n  col *= 0.95 + 0.05 * (1.0 - thin);\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'09', title:{es:'Lava Lamp',en:'Lava Lamp'}, desc:{es:'Blobs animados — warp + tiempo',en:'Animated blobs — warp + time'},
      explain: {
        es:'<p>Una lava lamp no scrollea — sus blobs <strong>flotan, se deforman, se separan</strong>. El truco: dos warps con T a velocidades diferentes. Uno empuja vertical, otro empuja diagonal. Los blobs se mueven en direcciones distintas y se deforman entre sí.</p><p><code>T * 0.12</code> es lento — gelatinoso. Los blobs no tienen prisa.</p><p><em>1972 en la mesa de noche de tu abuela cool.</em></p><div class="glossary"><span class="glossary-label">Dos warps con T</span>Un warp con <code>T</code> solo en Y = sube. Otro warp con <code>T</code> en X e Y a velocidades diferentes = se retuerce. Combinados = blobs que flotan de forma fluida.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.12</code> a <code>0.04</code> para cámara ultra lenta. A <code>0.3</code> para blobs nerviosos. Cambia el <code>0.8</code> del warp a <code>1.5</code> para más deformación.</span></div>',
        en:'<p>A lava lamp does not scroll — its blobs <strong>float, deform, split apart</strong>. The trick: two warps with T at different speeds. One pushes vertical, the other pushes diagonal. Blobs move in different directions and deform each other.</p><p><code>T * 0.12</code> is slow — gelatinous. Blobs are in no rush.</p><div class="glossary"><span class="glossary-label">Two warps with T</span>One warp with <code>T</code> only in Y = rises. Another warp with <code>T</code> in X and Y at different speeds = twists. Combined = blobs floating fluidly.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.12</code> to <code>0.04</code> for ultra slow motion. To <code>0.3</code> for nervous blobs. Change the warp <code>0.8</code> to <code>1.5</code> for more deformation.</span></div>'
      },
      code:'void main(){\n  vec2 p = gl_FragCoord.xy / R * 3.0 - 1.5;\n  float slow = T * 0.08;\n  float warp1 = fb(p + vec2(0., slow));\n  float warp2 = fb(p + vec2(slow * 0.7, slow * 0.4) + 5.0);\n  vec2 wp = p + vec2(warp1, warp2) * 0.8;\n  float f = fb(wp + vec2(0., slow * 0.5));\n  // Round blobs — step for clean edges\n  float blob = step(0.48, f);\n  float inner = step(0.58, f);\n  float hot = step(0.68, f);\n  vec3 liquid = vec3(0.04, 0.0, 0.1);\n  vec3 wax = vec3(0.85, 0.1, 0.04);\n  vec3 core = vec3(1.0, 0.6, 0.08);\n  vec3 white = vec3(1.0, 0.9, 0.6);\n  vec3 col = liquid;\n  col = mix(col, wax, blob);\n  col = mix(col, core, inner);\n  col = mix(col, white, hot);\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'10', title:{es:'Tu Patrón',en:'Your Pattern'}, desc:{es:'Todo junto — tus constantes, tu material',en:'All together — your constants, your material'},
      explain: {
        es:'<p>Todo lo que aprendiste en una pieza: coordenadas polares que giran con <code>T</code>, doble domain warp, bandas de color con <code>sin()</code> que ciclan, vignette radial. <strong>Un animal print que pulsa.</strong></p><p>Las tres constantes de color arriba son tu firma. Cambia los colores y la pieza se transforma completamente — misma estructura, diferente identidad.</p><p><em>fract() + sin() + h2(). Tres funciones, una superficie.</em></p><div class="glossary"><span class="glossary-label">Todo conectado</span>Polar (Snake) + domain warp (todas) + sin bands (Wood, Tie-dye) + T animado (Lava Lamp) + vignette. Cada técnica que aprendiste vive en este shader.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia los 3 colores. Cambia el <code>4.0</code> de dist (zoom del patrón). Cambia el <code>8.0</code> del sin() (cantidad de bandas). <em>Fírmalo.</em></span></div>',
        en:'<p>Everything you learned in one piece: polar coordinates rotating with <code>T</code>, double domain warp, color bands with <code>sin()</code> that cycle, radial vignette. <strong>An animal print that pulses.</strong></p><p>The three color constants at top are your signature. Change colors and the piece transforms completely — same structure, different identity.</p><p><em>fract() + sin() + h2(). Three functions, one surface.</em></p><div class="glossary"><span class="glossary-label">Everything connected</span>Polar (Snake) + domain warp (all) + sin bands (Wood, Tie-dye) + animated T (Lava Lamp) + vignette. Every technique you learned lives in this shader.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change all 3 colors. Change the <code>4.0</code> on dist (pattern zoom). Change the <code>8.0</code> on sin() (number of bands). <em>Sign it.</em></span></div>'
      },
      code:'void main(){\n  vec2 p = gl_FragCoord.xy / R * 3.0;\n  float warp = fb(p);\n  vec2 wp = p + warp * 0.5;\n  vec2 cell = fract(wp * 3.0);\n  vec2 id = floor(wp * 3.0);\n  float tint = h2(id);\n  // Vetas dentro de cada celda\n  float vein = sin(cell.x * 6.0 + warp * 2.0) * 0.5 + 0.5;\n  float line = step(0.88, vein);\n  // Borde de celda\n  float edge = step(0.92, max(cell.x, cell.y)) + step(cell.x, 0.08) + step(cell.y, 0.08);\n  edge = min(edge, 1.0);\n  vec3 base = mix(vec3(0.85, 0.78, 0.65), vec3(0.7, 0.82, 0.75), tint);\n  vec3 dark = vec3(0.15, 0.1, 0.06);\n  vec3 grout = vec3(0.3, 0.25, 0.2);\n  vec3 col = base;\n  col = mix(col, dark, line * 0.4);\n  col = mix(col, grout, edge);\n  col *= 0.85 + 0.15 * (1.0 - edge);\n  gl_FragColor = vec4(col, 1.0);\n}',
      finale: true,
      celebrateTitle: { es:'Domain Warp: Dominado.', en:'Domain Warp: Mastered.' },
      celebrateText: { es:'Jirafa, camo, vaca, leopardo, madera, tie-dye, serpiente, mármol, lava lamp — todo con domain warp y colores. <em>Lo siguiente es Motion</em> — vas a coreografiar el tiempo.', en:'Giraffe, camo, cow, leopard, wood, tie-dye, snake, marble, lava lamp — all with domain warp and colors. <em>Next up is Motion</em> — you will choreograph time.' },
    },
  ],
  '02': [
    { num:'01', title:{es:'Forces',en:'Forces'}, desc:{es:'El output ya existe. Ahora le das movimiento.',en:'The output exists. Now you add motion.'},
      welcome: true,
      explain: {
        es:'<p>Mira lo que ya sabes construir. Rayas, espirales, radiales, Chladni, patrones — todo con código que tú escribiste. Eso no es trabajo de principiante. <strong class="scatter-settle">Eso es real.</strong></p><p>Lo que falta es movimiento. Las imágenes quietas son posters. Las imágenes que se mueven están vivas.</p><p><em>Frame estático = poster. Frame animado = sistema vivo.</em></p><p>Antes de moverlas necesitas un <strong>material</strong> — algo con textura irregular que se sienta natural cuando lo empujes. <code>fb()</code> es esa función: genera campos con detalle a todas las escalas. Por ahora es una caja negra — en la siguiente sección vas a aprender qué tiene adentro. Aquí la usas como herramienta.</p><p>Esta sección te enseña 9 fuerzas:</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">p.y += T</code> &nbsp; gravedad — todo cae</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">p.x += sin(T)</code> &nbsp; viento — sopla y regresa</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">warp * sin(T)</code> &nbsp; pulso — el material pulsa</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">atan(p) + T</code> &nbsp; vórtice — gira desde el centro</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(length(p) - T)</code> &nbsp; ripple — ondas que salen del centro</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">M (mouse)</code> &nbsp; touch</li></ul><div class="glossary"><span class="glossary-label">fb(p)</span><code>fb()</code> genera textura irregular — como nubes, humo, terreno. Es tu material base. Cada lección le agrega UNA fuerza para moverlo.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>0.8</code> del warp a <code>0.1</code> — apenas se dobla. A <code>20.0</code> — se come a sí mismo. Ese número es tu perilla principal.</span></div>',
        en:'<p>Look at what you already know how to build. Stripes, spirals, radials, Chladni, patterns — all with code you wrote. That is not beginner work. <strong class="scatter-settle">That is real.</strong></p><p>What is missing is motion. Still images are posters. Moving images are alive.</p><p><em>Static frame = poster. Animated frame = living system.</em></p><p>Before moving them you need a <strong>material</strong> — something with irregular texture that feels natural when you push it. <code>fb()</code> is that function: it generates fields with detail at every scale. For now it is a black box — in the next section you will learn what is inside. Here you use it as a tool.</p><p>This section teaches you 9 forces:</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">p.y += T</code> &nbsp; gravity — everything falls</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">p.x += sin(T)</code> &nbsp; wind — blows and returns</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">warp * sin(T)</code> &nbsp; pulse — the material pulses</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">atan(p) + T</code> &nbsp; vortex — spins from center</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(length(p) - T)</code> &nbsp; ripple — waves from center</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">M (mouse)</code> &nbsp; touch</li></ul><div class="glossary"><span class="glossary-label">fb(p)</span><code>fb()</code> generates irregular texture — like clouds, smoke, terrain. It is your base material. Each lesson adds ONE force to move it.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change the <code>0.8</code> on the warp to <code>0.1</code> — barely bends. To <code>20.0</code> — eats itself. That number is your main knob.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Domain warp: fb distorsiona fb\n  float w1 = fb(p * 2.5);\n  float w2 = fb(p * 2.5 + w1 * 0.7);\n  float f = smoothstep(0.3, 0.65, w2);\n  // Tres zonas de color del material\n  vec3 deep = vec3(0.04, 0.02, 0.15);\n  vec3 mid = vec3(0.0, 0.65, 0.85);\n  vec3 peak = vec3(0.85, 0.95, 1.0);\n  vec3 col = mix(deep, mid, f);\n  col = mix(col, peak, pow(f, 3.0) * 0.6);\n  col *= 0.7 + 0.3 * f;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'02', title:{es:'Gravity',en:'Gravity'}, desc:{es:'Todo cae lento.',en:'Everything falls slow.'},
      explain: {
        es:'<p>La primera fuerza: <strong>sumar T a una coordenada</strong>. <code>p.y += T * 0.2</code> desplaza el campo hacia arriba continuamente — como si la gravedad jalara el material hacia abajo y tú vieras desde arriba.</p><p><em>Miel en cámara lenta.</em></p><div class="glossary"><span class="glossary-label">p.y += T * velocidad</span>Velocidad positiva = sube (la textura baja). Negativa = baja (la textura sube). El número controla qué tan pesado se siente.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.2</code> a <code>0.05</code> — lava. A <code>1.0</code> — cascada. Cambia <code>p.y</code> por <code>p.x</code> — gravedad lateral.</span></div>',
        en:'<p>The first force: <strong>add T to a coordinate</strong>. <code>p.y += T * 0.2</code> displaces the field upward continuously — as if gravity pulled the material down and you watched from above.</p><div class="glossary"><span class="glossary-label">p.y += T * speed</span>Positive speed = rises (texture falls). Negative = falls (texture rises). The number controls how heavy it feels.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.2</code> to <code>0.05</code> — lava. To <code>1.0</code> — waterfall. Change <code>p.y</code> to <code>p.x</code> — sideways gravity.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Rayas horizontales que caen con gravedad variable\n  float phase = sin(p.x * 3.0) * 0.5 + 0.5;\n  float fall = p.y + T * 0.3 * (0.3 + phase * 0.7);\n  float v = sin(fall * 8.0) * 0.5 + 0.5;\n  v = pow(v, 0.7);\n  vec3 a = vec3(0.88, 0.18, 0.06);\n  vec3 b = vec3(0.04, 0.02, 0.1);\n  vec3 hot = vec3(1.0, 0.75, 0.3);\n  vec3 col = mix(b, a, v);\n  col += hot * pow(v, 4.0) * 0.35;\n  col *= 0.7 + 0.3 * v;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'03', title:{es:'Wind',en:'Wind'}, desc:{es:'Sopla y regresa.',en:'Blows and returns.'},
      explain: {
        es:'<p>La gravedad va en una dirección para siempre. El viento <strong>va y viene</strong>. <code>sin(T)</code> oscila — empuja para un lado, frena, regresa. El material ondula como tela en una ventana abierta.</p><p><em>Cortina que no se decide.</em></p><div class="glossary"><span class="glossary-label">sin(T * vel) * amp</span>vel = qué tan rápido sopla. amp = qué tan lejos empuja. <code>sin(T * 0.5) * 0.3</code> = brisa suave. <code>sin(T * 2.0) * 1.0</code> = vendaval.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.4</code> (velocidad) a <code>2.0</code> — viento rápido. Cambia el otro <code>0.4</code> (amplitud) a <code>1.0</code> — ráfaga fuerte. Ponle viento en Y también: <code>p.y += sin(T * 0.3) * 0.15;</code></span></div>',
        en:'<p>Gravity goes one direction forever. Wind <strong>goes and comes back</strong>. <code>sin(T)</code> oscillates — pushes one way, slows, returns. The material undulates like cloth in an open window.</p><div class="glossary"><span class="glossary-label">sin(T * speed) * amp</span>speed = how fast it blows. amp = how far it pushes. <code>sin(T * 0.5) * 0.3</code> = gentle breeze. <code>sin(T * 2.0) * 1.0</code> = gale.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.4</code> (speed) to <code>2.0</code> — fast wind. Change the other <code>0.4</code> (amplitude) to <code>1.0</code> — strong gust. Add Y wind too: <code>p.y += sin(T * 0.3) * 0.15;</code></span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Wind: humo que sopla\n  float wind = sin(T * 0.35) * 0.4;\n  float gust = sin(p.y * 2.5 + T * 0.5) * 0.15;\n  vec2 blown = p + vec2(wind + gust, 0.0);\n  float smoke1 = fb(blown * 2.0 + vec2(T * 0.08, 0.0));\n  float smoke2 = fb(blown * 3.5 + vec2(T * 0.12, 0.0) + 3.0);\n  float v = smoke1 * 0.6 + smoke2 * 0.4;\n  v = pow(v, 0.75);\n  vec3 a = vec3(0.15, 0.45, 0.85);\n  vec3 b = vec3(0.02, 0.04, 0.15);\n  vec3 bright = vec3(0.6, 0.8, 1.0);\n  vec3 col = mix(b, a, v);\n  col += bright * pow(v, 4.0) * 0.3;\n  col *= 0.7 + 0.3 * v;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'04', title:{es:'Pulse',en:'Pulse'}, desc:{es:'El warp respira. Expande y contrae.',en:'The warp breathes. Expand and contract.'},
      explain: {
        es:'<p>En vez de mover las coordenadas, mueves la <strong>intensidad del warp</strong>. <code>warp * (0.5 + 0.3 * sin(T * 0.4))</code> — la deformación sube y baja. El material se expande y contrae.</p><p><em>Inhala. Exhala. El warp respira.</em></p><div class="glossary"><span class="glossary-label">Modular la amplitud</span>No mueves el material — lo aprietas y lo sueltas. Los patrones se concentran (contrae) y se relajan (expande). Es la técnica que hace que un shader se sienta vivo sin moverlo.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>1.2</code> a <code>0.3</code> — pulsa muy lento. A <code>3.0</code> — hiperventila. Cambia el <code>0.8</code> a <code>0.3</code> — oscilación sutil.</span></div>',
        en:'<p>Instead of moving coordinates, you move the <strong>warp intensity</strong>. <code>warp * (0.5 + 0.3 * sin(T * 0.4))</code> — deformation rises and falls. The material expands and contracts.</p><p><em>Inhale. Exhale. The warp breathes.</em></p><div class="glossary"><span class="glossary-label">Modulate amplitude</span>You do not move the material — you squeeze and release it. Patterns concentrate (contract) and relax (expand). This is what makes a shader feel alive without moving it.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>1.2</code> to <code>0.3</code> — very slow pulsing. To <code>3.0</code> — hyperventilating. Change <code>0.8</code> to <code>0.3</code> — subtle oscillation.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Pulse: el circulo expande y contrae\n  float beat = pow(sin(T * 1.0), 2.0) * 0.5 + pow(sin(T * 1.0 + 0.35), 2.0) * 0.3;\n  float d = length(p);\n  float r = 0.4 + beat * 0.2;\n  float circ = smoothstep(r, r - 0.08, d);\n  float glow = exp(-max(d - r, 0.0) * 3.0) * 0.5;\n  float rings = sin(d * 20.0 - T * 3.0) * 0.5 + 0.5;\n  rings *= smoothstep(r + 0.3, r, d);\n  vec3 a = vec3(0.85, 0.08, 0.35);\n  vec3 b = vec3(0.06, 0.02, 0.12);\n  vec3 hot = vec3(1.0, 0.55, 0.7);\n  vec3 col = mix(b, a, circ);\n  col += a * glow;\n  col += hot * rings * 0.15;\n  col *= 0.7 + 0.3 * (circ + glow);\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'05', title:{es:'Vortex',en:'Vortex'}, desc:{es:'Gira desde el centro.',en:'Spins from center.'},
      explain: {
        es:'<p>Conviertes a coordenadas polares, le sumas <code>T</code> al ángulo, y regresas a cartesianas. El espacio entero <strong>gira</strong>. El warp se enrosca como agua vaciándose por el drenaje.</p><p><em>El agua cuando sueltas el tapón.</em></p><div class="glossary"><span class="glossary-label">atan() + T</span><code>atan(p.y, p.x)</code> te da el ángulo. Le sumas <code>T * 0.1</code> y reconstruyes con cos/sin. Todo rota. Velocidad baja = contemplativo. Alta = centrífuga.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.12</code> a <code>0.5</code> — centrifugadora. A <code>0.02</code> — gira tan lento que apenas lo notas. Cambia el signo a <code>-T * 0.12</code> — gira al revés.</span></div>',
        en:'<p>Convert to polar coordinates, add <code>T</code> to the angle, convert back. The entire space <strong>rotates</strong>. The warp coils like water going down the drain.</p><div class="glossary"><span class="glossary-label">atan() + T</span><code>atan(p.y, p.x)</code> gives you the angle. Add <code>T * 0.1</code> and rebuild with cos/sin. Everything rotates. Low speed = contemplative. High = centrifuge.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.12</code> to <code>0.5</code> — spin cycle. To <code>0.02</code> — so slow you barely notice. Flip sign to <code>-T * 0.12</code> — spins the other way.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Vortex: rebanadas polares que giran\n  float ang = atan(p.y, p.x) + T * 0.15;\n  float d = length(p);\n  float v = sin(ang * 5.0 + d * 3.0) * 0.5 + 0.5;\n  v = pow(v, 0.8);\n  float glow = exp(-d * 1.5) * 0.3;\n  vec3 a = vec3(0.85, 0.45, 0.05);\n  vec3 b = vec3(0.18, 0.03, 0.45);\n  vec3 bright = vec3(0.95, 0.85, 0.4);\n  vec3 col = mix(b, a, v);\n  col += bright * pow(v, 4.0) * 0.3;\n  col += a * glow;\n  col *= 0.7 + 0.3 * v;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'06', title:{es:'Drift',en:'Drift'}, desc:{es:'Diagonal lazy. Se desliza.',en:'Lazy diagonal. It slides.'},
      explain: {
        es:'<p>Drift es gravedad + viento al mismo tiempo pero a <strong>velocidades diferentes</strong>. X se mueve lento, Y se mueve ligeramente más rápido. El resultado es un desplazamiento diagonal perezoso — el material se desliza como aceite sobre vidrio.</p><p><em>Mancha de aceite en la banqueta.</em></p><div class="glossary"><span class="glossary-label">Velocidades asimétricas</span><code>p.x += T * 0.06</code> y <code>p.y += T * 0.09</code>. Diferente velocidad por eje = diagonal. La asimetría es lo que hace que no se vea mecánico.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Invierte las velocidades: X rápido, Y lento. El drift cambia de dirección. Pon una negativa — drift hacia arriba-izquierda.</span></div>',
        en:'<p>Drift is gravity + wind at the same time but at <strong>different speeds</strong>. X moves slow, Y moves slightly faster. The result is a lazy diagonal — the material slides like oil on glass.</p><div class="glossary"><span class="glossary-label">Asymmetric speeds</span><code>p.x += T * 0.06</code> and <code>p.y += T * 0.09</code>. Different speed per axis = diagonal. The asymmetry is what keeps it from looking mechanical.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Flip speeds: X fast, Y slow. Drift changes direction. Make one negative — drift up-left.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Drift: rayas que se desplazan a velocidades distintas\n  float speed1 = 0.06;\n  float speed2 = 0.09;\n  float v1 = sin((p.x + T * speed1) * 6.0) * 0.5 + 0.5;\n  float v2 = sin((p.y + T * speed2) * 8.0) * 0.5 + 0.5;\n  float glitch = step(0.92, fb(p * 1.5 + T * 0.02)) * 0.3;\n  float v = v1 * 0.5 + v2 * 0.5 + glitch;\n  v = pow(v, 0.8);\n  vec3 a = vec3(0.08, 0.7, 0.45);\n  vec3 b = vec3(0.02, 0.08, 0.18);\n  vec3 accent = vec3(0.4, 1.0, 0.7);\n  vec3 col = mix(b, a, v);\n  col += accent * pow(v, 4.0) * 0.25;\n  col += accent * glitch * 0.5;\n  col *= 0.7 + 0.3 * v;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'07', title:{es:'Turbulence',en:'Turbulence'}, desc:{es:'Tres frecuencias. Cero repetición.',en:'Three frequencies. Zero repetition.'},
      explain: {
        es:'<p>Una sola fuerza se siente mecánica. <strong>Tres fuerzas a frecuencias diferentes</strong> se sienten fluidas — porque nunca se alinean. El movimiento nunca se repite exactamente.</p><p><em>Bandera en día de viento.</em></p><div class="glossary"><span class="glossary-label">Tres sin() sumados</span><code>sin(T*0.3) + sin(T*0.17) + sin(T*0.07)</code>. Las frecuencias son irracionales entre sí. El ciclo antes de repetirse es de más de una hora. Eso es turbulencia real.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.25</code> a <code>0.05</code> — gira lento, contemplativo. A <code>1.0</code> — centrifugadora. Cambia <code>1.4</code> a <code>0.5</code> — turbulencia sutil. A <code>3.0</code> — caos total.</span></div>',
        en:'<p>A single force feels mechanical. <strong>Three forces at different frequencies</strong> feel fluid — because they never align. Movement never repeats exactly.</p><div class="glossary"><span class="glossary-label">Three sin() stacked</span><code>sin(T*0.3) + sin(T*0.17) + sin(T*0.07)</code>. Frequencies are irrational to each other. Cycle before repeating is over an hour. That is real turbulence.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.25</code> to <code>0.05</code> — slow spin, contemplative. To <code>1.0</code> — spin cycle. Change <code>1.4</code> to <code>0.5</code> — subtle turbulence. To <code>3.0</code> — total chaos.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Turbulence: Chladni churned by time\n  float twist = T * 0.2;\n  float n = 5.0, m = 3.0;\n  float z = sin(n * 3.14 * (p.x + sin(twist) * 0.3)) * sin(m * 3.14 * (p.y + cos(twist * 0.7) * 0.3))\n          + sin(m * 3.14 * (p.x + cos(twist * 1.3) * 0.2)) * sin(n * 3.14 * (p.y + sin(twist * 0.9) * 0.2));\n  float v = abs(z);\n  v = pow(v, 0.8);\n  vec3 a = vec3(0.9, 0.35, 0.08);\n  vec3 b = vec3(0.06, 0.02, 0.2);\n  vec3 hot = vec3(1.0, 0.85, 0.4);\n  vec3 col = mix(b, a, v);\n  col += hot * pow(v, 4.0) * 0.35;\n  col *= 0.65 + 0.35 * v;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'08', title:{es:'Ripple',en:'Ripple'}, desc:{es:'Ondas desde el centro.',en:'Waves from center.'},
      explain: {
        es:'<p><code>sin(length(p) - T)</code> — ondas concéntricas que se expanden desde el centro. Como tirar una piedra a un lago. La distancia crea los anillos, T los empuja hacia afuera.</p><p>Sumamos el ripple al warp — las ondas <strong>deforman el material</strong> en vez de pintarse encima. El camo se ondula como si alguien hubiera golpeado la superficie.</p><p><em>La piedra que tiraste al lago.</em></p><div class="glossary"><span class="glossary-label">sin(length(p) - T)</span>length(p) = distancia al centro (anillos). Restarle T = los anillos se mueven hacia afuera. Multiplicar por amplitud = qué tanto deforman.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>8.0</code> a <code>3.0</code> — ondas anchas, lentas. A <code>20.0</code> — ondas apretadas, nerviosas. Cambia <code>0.25</code> a <code>0.5</code> — golpe fuerte.</span></div>',
        en:'<p><code>sin(length(p) - T)</code> — concentric waves expanding from center. Like throwing a stone into a lake. Distance creates the rings, T pushes them outward.</p><p>We add the ripple to the warp — waves <strong>deform the material</strong> instead of painting on top. The camo undulates as if someone hit the surface.</p><div class="glossary"><span class="glossary-label">sin(length(p) - T)</span>length(p) = distance to center (rings). Subtract T = rings move outward. Multiply by amplitude = how much they deform.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>8.0</code> to <code>3.0</code> — wide, slow waves. To <code>20.0</code> — tight, nervous waves. Change <code>0.25</code> to <code>0.5</code> — hard hit.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Ripple: ondas concéntricas expandiéndose\n  float d = length(p);\n  float ripple = sin(d * 12.0 - T * 2.5) * 0.5 + 0.5;\n  ripple *= smoothstep(1.5, 0.0, d);\n  float v = pow(ripple, 0.8);\n  vec3 a = vec3(0.2, 0.35, 0.9);\n  vec3 b = vec3(0.015, 0.02, 0.08);\n  vec3 foam = vec3(0.65, 0.85, 1.0);\n  vec3 col = mix(b, a, v);\n  col += foam * pow(v, 4.0) * 0.4;\n  col *= 0.65 + 0.35 * v;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'09', title:{es:'Collision',en:'Collision'}, desc:{es:'Dos piedras al mismo lago.',en:'Two stones in the same lake.'},
      explain: {
        es:'<p>Un ripple sale del centro. <strong>Dos ripples desde puntos diferentes</strong> crean interferencia — donde se cruzan, las ondas se suman o se cancelan. Patrones complejos de interacción.</p><p><em>Dos piedras al mismo lago.</em></p><div class="glossary"><span class="glossary-label">Interferencia</span>Sumar dos sin() desde orígenes diferentes. Donde se alinean = onda fuerte. Donde se oponen = calma. Es como dos altavoces en un cuarto — hay zonas de sonido y zonas de silencio.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Mueve el segundo centro <code>vec2(0.5, -0.3)</code> más lejos. Más separados = patrón de interferencia más complejo.</span></div>',
        en:'<p>One ripple from center. <strong>Two ripples from different points</strong> create interference — where they cross, waves add or cancel. Complex interaction patterns.</p><div class="glossary"><span class="glossary-label">Interference</span>Adding two sin() from different origins. Where they align = strong wave. Where they oppose = calm. Like two speakers in a room — zones of sound and zones of silence.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Move the second center <code>vec2(0.5, -0.3)</code> further away. More separation = more complex interference pattern.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Collision: dos ripples desde centros orbitando\n  vec2 o1 = vec2(cos(T * 0.25), sin(T * 0.25)) * 0.5;\n  vec2 o2 = -o1;\n  float d1 = length(p - o1);\n  float d2 = length(p - o2);\n  float r1 = sin(d1 * 10.0 - T * 2.0) * 0.5 + 0.5;\n  float r2 = sin(d2 * 10.0 - T * 2.0) * 0.5 + 0.5;\n  float v = (r1 + r2) * 0.5;\n  v *= smoothstep(1.8, 0.0, min(d1, d2));\n  v = pow(v, 0.75);\n  vec3 a = vec3(0.85, 0.55, 0.6);\n  vec3 b = vec3(0.06, 0.02, 0.1);\n  vec3 bright = vec3(0.95, 0.8, 0.85);\n  vec3 col = mix(b, a, v);\n  col += bright * pow(v, 4.0) * 0.3;\n  col *= 0.7 + 0.3 * v;\n  gl_FragColor = vec4(col, 1.0);\n}'
    },
    { num:'10', title:{es:'Todo junto',en:'All together'}, desc:{es:'Todas las fuerzas en una pieza.',en:'Every force in one piece.'},
      explain: {
        es:'<p>Esta lección no enseña nada nuevo. <strong>Junta todas las fuerzas que aprendiste en una pieza.</strong></p><p>Mira el código — cada bloque ya lo conoces:</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">1.0 / (d + 0.15)</code> &nbsp; túnel — 1/distance comprime al centro (Start Here 10)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">atan() + T * 0.12</code> &nbsp; vórtice que gira (lección 05)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(n * ang) * sin(m * inv)</code> &nbsp; Chladni a través del túnel (Patterns 09)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(d * 15.0 - T)</code> &nbsp; ripple que se expande (lección 08)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(T * 0.618)</code> &nbsp; respiración irracional (lección 04)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">fb(p)</code> &nbsp; domain warp (lección 01)</li></ul><p>Todo se jala hacia el centro. El vórtice gira, el Chladni dibuja, el ripple empuja, la respiración nunca se repite. <em>Todo automático, todo vivo.</em></p><p><em>Nueve fuerzas corriendo en paralelo. Un solo output.</em></p><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>6.0</code> y <code>4.0</code> (los modos Chladni) — el patrón muta. Cambia <code>0.15</code> en el 1/distance a <code>0.05</code> — la singularidad se aprieta. Cambia <code>0.618</code> a <code>1.0</code> — la respiración se vuelve mecánica. <em>Esta pieza es tuya.</em></span></div>',
        en:'<p>This lesson teaches nothing new. <strong>It brings together every force you learned into one piece.</strong></p><p>Look at the code — you already know every block:</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">1.0 / (d + 0.15)</code> &nbsp; tunnel — 1/distance compresses to center (Start Here 10)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">atan() + T * 0.12</code> &nbsp; spinning vortex (lesson 05)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(n * ang) * sin(m * inv)</code> &nbsp; Chladni through the tunnel (Patterns 09)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(d * 15.0 - T)</code> &nbsp; expanding ripple (lesson 08)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(T * 0.618)</code> &nbsp; irrational breathing (lesson 04)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">fb(p)</code> &nbsp; domain warp (lesson 01)</li></ul><p>Everything pulls toward the center. The vortex spins, Chladni draws, ripple pushes, breathing never repeats. <em>All automatic, all alive.</em></p><p><em>Nine forces running in parallel. One single output.</em></p><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>6.0</code> and <code>4.0</code> (the Chladni modes) — the pattern mutates. Change <code>0.15</code> in the 1/distance to <code>0.05</code> — the singularity tightens. Change <code>0.618</code> to <code>1.0</code> — breathing becomes mechanical. <em>This piece is yours.</em></span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  p += vec2(sin(T*0.07)*0.08, sin(T*0.09)*0.06);\n  float d = length(p);\n  float inv = 1.0 / (d + 0.15);\n  float ang = atan(p.y, p.x) + T * 0.12 + inv * 0.3;\n  float n = 6.0, m = 4.0;\n  float z = sin(n * ang + inv * 5.0 - T * 0.8)\n          * sin(m * inv - T * 0.5 + ang * 2.0);\n  float ripple = sin(d * 15.0 - T * 3.0) * 0.5 + 0.5;\n  ripple *= exp(-d * 1.5);\n  float breath = 0.7 + 0.2 * sin(T * 0.618);\n  float warp = fb(p * 2.0 + ang * 0.1);\n  float v = abs(z) * breath + ripple * 0.2 + warp * 0.1;\n  v *= smoothstep(3.0, 0.0, d);\n  v = pow(v, 0.7);\n  vec3 a = vec3(0.005, 0.003, 0.015);\n  vec3 b = vec3(0.35, 0.05, 0.4);\n  vec3 c = vec3(0.85, 0.15, 0.45);\n  vec3 pk = vec3(1.0, 0.85, 0.95);\n  vec3 col = mix(a, b, smoothstep(0.05, 0.3, v));\n  col = mix(col, c, smoothstep(0.25, 0.55, v));\n  col += pk * pow(v, 4.0) * 0.5;\n  col += vec3(0.9, 0.6, 1.0) * exp(-d * 3.0) * 0.25;\n  col *= 0.4 + 0.6 * v;\n  gl_FragColor = vec4(col, 1.0);\n}',
      finale: true,
      celebrateTitle: { es:'Todas las fuerzas. Una pieza.', en:'Every force. One piece.' },
      celebrateText: { es:'Gravedad, viento, pulso, vórtice, drift, turbulencia, ripple, colisión — y al final, todo junto. <em>Lo siguiente es Noise</em> — vas a aprender qué hay adentro de <code>fb()</code>.', en:'Gravity, wind, pulse, vortex, drift, turbulence, ripple, collision — and at the end, all together. <em>Next up is Noise</em> — you will learn what is inside <code>fb()</code>.' },
    },
  ],
  '05': [
  { num:'01', title:{es:'Breathe',en:'Breathe'}, desc:{es:'El material respira. Nunca repite exacto.',en:'The material breathes. Never repeats exactly.'},
    welcome: true,
    explain: {
      es:'<p>Ya sabes mover cosas con <code>T</code>. Ahora vas a controlar <strong>cómo</strong> se mueven. Motion no es animar — es <em>coreografiar</em>. Darle intención al tiempo.</p><p><em>0.618 — frecuencia irracional. El loop que nunca cierra.</em></p><p>El primer truco: <code>sin(T * 0.618)</code>. Ese <code>0.618</code> es el ratio áureo invertido — un número <strong>irracional</strong>. Nunca se alinea con ningún ciclo entero. El resultado: la animación respira, pero nunca se repite exactamente igual. Orgánico, no mecánico.</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ Esta sección te enseña a controlar el tiempo como instrumento</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ Respiración, drift, phase, elastic, morph, flow, oscillators, loops, rhythm</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ Al final vas a coreografiar movimiento que se siente vivo</li></ul><div class="glossary"><span class="glossary-label">Frecuencia irracional</span>Cuando multiplicas <code>T</code> por un número irracional (0.618, 0.7071, PI/4), el ciclo nunca se cierra perfectamente. Cada vuelta es ligeramente diferente. Eso es lo que hace que algo se sienta vivo.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.618</code> a <code>1.0</code> — se siente mecánico. Vuelve a <code>0.618</code> y nota la diferencia. Cambia <code>0.4</code> (amplitud) a <code>0.8</code> para que respire más profundo.</span></div>',
      en:'<p>You already know how to move things with <code>T</code>. Now you will control <strong>how</strong> they move. Motion is not animating — it is <em>choreographing</em>. Giving intention to time.</p><p><em>0.618 — irrational frequency. The loop that never closes.</em></p><p>The first trick: <code>sin(T * 0.618)</code>. That <code>0.618</code> is the inverse golden ratio — an <strong>irrational</strong> number. It never aligns with any integer cycle. The result: the animation breathes, but never repeats exactly. Organic, not mechanical.</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ This section teaches you to control time as an instrument</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ Breathe, drift, phase, elastic, morph, flow, oscillators, loops, rhythm</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ By the end you will choreograph motion that feels alive</li></ul><div class="glossary"><span class="glossary-label">Irrational frequency</span>When you multiply <code>T</code> by an irrational number (0.618, 0.7071, PI/4), the cycle never closes perfectly. Each loop is slightly different. That is what makes something feel alive.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.618</code> to <code>1.0</code> — it feels mechanical. Switch back to <code>0.618</code> and notice the difference. Change <code>0.4</code> (amplitude) to <code>0.8</code> for deeper breathing.</span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float warp = fb(p * 3.);\n  float breath = 0.3 + sin(T * 0.618) * 0.25;\n  float w = fb(p * 3. + warp * breath);\n  vec3 col = iri(w);\n  col *= smoothstep(1.8, 0.2, length(p));\n  gl_FragColor = vec4(col, 1.);\n}'},
  { num:'02', title:{es:'Capas drift',en:'Drift layers'}, desc:{es:'Dos capas a velocidades distintas. Profundidad instantánea.',en:'Two layers at different speeds. Instant depth.'},
    explain: {
      es:'<p>Un solo FBM se mueve como una masa uniforme. Dos FBMs a <strong>velocidades distintas</strong> crean la ilusión de profundidad — como nubes a diferentes alturas.</p><p>El truco: una capa se mueve lento (<code>T * 0.1</code>) y otra rápido (<code>T * 0.3</code>) en direcciones diferentes. Tu cerebro interpreta velocidad como distancia: lo lento está lejos, lo rápido está cerca. <em>Parallax sin cámara 3D.</em></p><p><em>Lento atrás, rápido enfrente. Parallax en 2D.</em></p><div class="glossary"><span class="glossary-label">Parallax de velocidad</span>Dos capas de noise a velocidades distintas producen percepción de profundidad con puro 2D.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.1</code> a <code>0.5</code> en la capa lenta — la ilusión de profundidad se rompe. Cambia la dirección: <code>vec2(0., T*0.3)</code> a <code>vec2(T*0.3, 0.)</code> para drift horizontal.</span></div>',
      en:'<p>A single FBM moves like a uniform mass. Two FBMs at <strong>different speeds</strong> create the illusion of depth — like clouds at different altitudes.</p><p>The trick: one layer moves slow (<code>T * 0.1</code>) and another fast (<code>T * 0.3</code>) in different directions. Your brain reads speed as distance: slow is far, fast is near. <em>Parallax without a 3D camera.</em></p><p><em>Slow in back, fast in front. Parallax in 2D.</em></p><div class="glossary"><span class="glossary-label">Velocity parallax</span>Two noise layers at different speeds produce depth perception with pure 2D.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.1</code> to <code>0.5</code> on the slow layer — the depth illusion breaks. Change direction: <code>vec2(0., T*0.3)</code> to <code>vec2(T*0.3, 0.)</code> for horizontal drift.</span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float lejos = fb(p * 2. + vec2(0., T * 0.08));\n  float cerca = fb(p * 3.5 + vec2(T * 0.2, -T * 0.05));\n  float v = lejos * 0.6 + cerca * 0.4;\n  vec3 col = vec3(0.02, 0.01, 0.03);\n  col += vec3(0.9, 0.15, 0.05) * pow(v, 2.) * 1.5;\n  col += vec3(1.0, 0.6, 0.1) * pow(cerca, 4.) * 0.8;\n  gl_FragColor = vec4(col, 1.);\n}'},
  { num:'03', title:{es:'Phase offset',en:'Phase offset'}, desc:{es:'Cada zona se mueve en su propio tiempo. Olas que viajan.',en:'Each zone moves on its own timeline. Traveling waves.'},
    explain: {
      es:'<p>Hasta ahora, todo el canvas se mueve al mismo tiempo. Lo que quieres es que <strong>cada zona arranque en un momento diferente</strong>.</p><p><code>sin(T + p.x * 2.)</code> — la posición X modifica el <em>cuándo</em>. Puntos a la izquierda llegan a su peak antes que los de la derecha. El resultado: una ola que se propaga por el espacio.</p><p><em>Cada punto arranca en su propio tiempo. La ola se propaga.</em></p><div class="glossary"><span class="glossary-label">Phase offset</span>El término que sumas dentro del <code>sin()</code> junto con <code>T</code>. Si es <code>p.x</code>, la ola viaja en X. Si es <code>length(p)</code>, la ola se expande en círculo.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>p.x * 2.</code> por <code>length(p) * 4.</code> para olas circulares. Cambia por <code>p.y * 3.</code> para cascada vertical.</span></div>',
      en:'<p>Until now, the whole canvas moves at the same time. What you want is for <strong>each region to start at a different moment</strong>.</p><p><code>sin(T + p.x * 2.)</code> — the X position modifies the <em>when</em>. Points on the left reach their peak before those on the right. The result: a wave propagating through space.</p><p><em>Each point starts on its own timeline. The wave propagates.</em></p><div class="glossary"><span class="glossary-label">Phase offset</span>The term you add inside <code>sin()</code> alongside <code>T</code>. If it is <code>p.x</code>, the wave travels in X. If it is <code>length(p)</code>, the wave expands in circles.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>p.x * 2.</code> to <code>length(p) * 4.</code> for circular waves. Change to <code>p.y * 3.</code> for vertical cascade.</span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float ola = sin(T * 2.5 + (p.x + p.y) * 3.) * 0.5 + 0.5;\n  float w = fb(p * 3. + ola * 0.3);\n  vec3 col = vec3(0.9, 0.2, 0.5) * w * ola;\n  col += vec3(0.4, 0.05, 0.2) * (1.0 - ola) * w;\n  col += vec3(0.02, 0.01, 0.04);\n  gl_FragColor = vec4(col, 1.);\n}'},
  { num:'04', title:{es:'Elastic',en:'Elastic'}, desc:{es:'Se pasa, rebota, se asienta. Gelatina.',en:'Overshoots, bounces, settles. Jelly.'},
    explain: {
