<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WoGL Learn · Start Here</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #02010a;
  --bg-lift: #07061a;
  --bg-deep: #000;
  --bg-side: #050410;
  --ink: #e8d9c0;
  --ink-soft: #c9b89e;
  --ink-mute: #a89880;
  --ink-faint: #8a7a65;
  --gold: #d4b896;
  --copper: #a8704c;
  --green: rgb(180, 220, 150);
  --line: rgba(232, 217, 192, 0.14);
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --side-w: 320px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background:var(--bg); }
body { background:transparent; color:var(--ink); font-family:var(--font-body); font-weight:300; min-height:100vh; min-height:100dvh; -webkit-font-smoothing:antialiased; }

/* Background FBM */
.bg-fbm {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  z-index:0; pointer-events:none;
}
.bg-fbm canvas { width:100%; height:100%; display:block; }
::selection { background:rgba(212,184,150,.25); }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(232,217,192,.10); border-radius:3px; }

/* ===== LANGUAGE TOGGLE (header) ===== */
.lang-toggle {
  display:flex; align-items:center; gap:2px;
  margin-left:16px; flex-shrink:0;
}
.lang-toggle-btn {
  background:transparent; border:0; outline:0;
  font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px;
  color:var(--ink-faint); padding:6px 10px; cursor:pointer;
  transition:all 0.3s var(--ease); text-transform:uppercase;
}
.lang-toggle-btn.active {
  color:#e8c89a;
}
.lang-toggle-btn:hover:not(.active) {
  color:var(--ink-soft);
}

/* ===== LAYOUT ===== */
.app { display:grid; grid-template-columns:var(--side-w) 1fr; min-height:100vh; min-height:100dvh; position:relative; z-index:1; }
@media (max-width:900px) { .app { grid-template-columns:1fr; } .app .main { order:-1; } .app .side { order:1; } }

/* ===== SIDEBAR ===== */
.side {
  background:var(--bg-side); border-right:1px solid var(--line);
  position:sticky; top:60px; height:calc(100vh - 60px); height:calc(100dvh - 60px);
  overflow-y:auto; display:flex; flex-direction:column;
}
@media (max-width:900px) { .side { position:relative; height:auto; border-right:0; border-bottom:1px solid var(--line); } }
.side-head { padding:32px 28px 24px; border-bottom:1px solid var(--line); }
.side-tag { font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--ink-mute); text-transform:uppercase; margin-bottom:14px; }
.side-title { font-family:var(--font-display); font-weight:300; font-size:34px; line-height:1; color:var(--ink); letter-spacing:-.02em; }
.side-subtitle { font-family:var(--font-body); font-weight:300; font-size:13px; color:var(--ink-soft); margin-top:8px; line-height:1.4; letter-spacing:.01em; }
.side-progress { margin-top:18px; display:flex; align-items:center; gap:10px; font-family:var(--font-mono); font-size:10px; color:var(--ink-mute); letter-spacing:1.5px; }
.side-progress .bar { flex:1; height:2px; background:var(--line); position:relative; overflow:hidden; }
.side-progress .bar-fill { position:absolute; left:0; top:0; bottom:0; background:var(--gold); transition:width .6s var(--ease); }

.side-section-label {
  font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--ink-mute);
  text-transform:uppercase; padding:24px 28px 12px;
}

/* TOC */
.toc { display:flex; flex-direction:column; }
.toc-item {
  display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:14px;
  padding:14px 28px; cursor:pointer; border-left:2px solid transparent;
  transition:all .3s var(--ease);
}
.toc-item:hover { background:rgba(232,217,192,.025); border-left-color:var(--copper); }
.toc-item.active { background:rgba(212,184,150,.06); border-left-color:var(--gold); }
.toc-item.done .toc-num { color:var(--green); }
.toc-num { font-family:var(--font-mono); font-size:10px; letter-spacing:1px; color:var(--ink-faint); width:24px; }
.toc-item.active .toc-num { color:var(--gold); }
.toc-name { font-family:var(--font-body); font-size:14px; font-weight:300; color:var(--ink-soft); letter-spacing:.005em; line-height:1.3; }
.toc-item.active .toc-name { color:var(--ink); font-weight:400; }
.toc-mark { font-family:var(--font-mono); font-size:10px; color:var(--green); }

/* Progressive kit */
.kit-list { padding:0 28px 28px; display:flex; flex-direction:column; gap:12px; }
.kit-card {
  background:var(--bg-deep); border:1px solid var(--line); padding:14px; position:relative;
  opacity:.80; transition:opacity .5s var(--ease);
}
.kit-card.unlocked { opacity:1; }
.kit-card-title {
  font-family:var(--font-display); font-weight:400;
  font-size:13px; color:var(--gold); margin-bottom:8px; letter-spacing:.02em;
}
.kit-card-code {
  font-family:var(--font-mono); font-size:10.5px; line-height:1.55; color:var(--ink);
  border-left:2px solid var(--copper); padding:6px 10px; margin-bottom:8px;
  white-space:pre-wrap; word-break:break-word; -webkit-user-select:text; user-select:text;
}
.kit-card-explain { font-family:var(--font-body); font-weight:300; font-size:12px; line-height:1.5; color:var(--ink-mute); }

/* ===== MAIN ===== */
.main { padding:48px 56px 80px; max-width:1100px; }
@media (max-width:900px) { .main { padding:32px 24px 80px; } }
@media (max-width:560px) { .main { padding:24px 16px 64px; } }

.crumb {
  font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--ink-mute);
  text-transform:uppercase; margin-bottom:24px; display:flex; align-items:center; gap:10px;
}
.crumb span { color:var(--ink-soft); }
.crumb .sep { color:var(--ink-faint); }

/* Welcome banner */
.welcome-banner {
  background:linear-gradient(180deg, rgba(212,184,150,.12), rgba(168,112,76,.06));
  border:1px solid rgba(212,184,150,.25); padding:28px 32px; margin-bottom:48px;
  display:flex; flex-direction:column; gap:14px;
}
.welcome-eyebrow {
  font-family:var(--font-mono); font-size:10px; letter-spacing:3px; color:var(--gold);
  text-transform:uppercase; font-weight:400;
}
.welcome-title {
  font-family:var(--font-display); font-weight:300;
  font-size:28px; line-height:1.15; color:var(--ink); letter-spacing:-.01em;
}
.welcome-text {
  font-family:var(--font-body); font-size:15px; line-height:1.65; color:var(--ink-soft); font-weight:300;
}
.welcome-text em { font-family:var(--font-display); font-weight:500; color:var(--gold); }

.lesson-num-big { font-family:var(--font-display); font-weight:300; font-size:96px; line-height:1; color:var(--gold); letter-spacing:-.04em; margin-bottom:8px; }
.lesson-title-big { font-family:var(--font-display); font-weight:300; font-size:clamp(40px,6vw,64px); line-height:1; color:var(--ink); letter-spacing:-.02em; margin-bottom:14px; }
.lesson-desc-big { font-family:var(--font-body); font-weight:300; font-size:18px; color:var(--ink-soft); margin-bottom:48px; line-height:1.5; max-width:600px; }

/* Tips */
.tips-banner {
  background:linear-gradient(180deg,rgba(168,112,76,.06),rgba(168,112,76,.02));
  border:none; border-left:3px solid var(--copper);
  padding:20px 24px; margin-bottom:48px; display:flex; gap:18px; align-items:flex-start;
}
.tips-icon { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; color:var(--copper); text-transform:uppercase; padding:4px 10px; border:none; flex-shrink:0; margin-top:2px; }
.tips-text { font-family:var(--font-body); font-weight:300; font-size:15px; color:var(--ink-soft); line-height:1.6; }
.tips-text em { color:var(--gold); font-style:normal; font-weight:500; }
.tips-text code { font-family:var(--font-mono); font-style:normal; font-size:.88em; background:var(--bg-deep); color:var(--gold); padding:2px 6px; border:1px solid var(--line); }

/* Explain */
.explain { font-family:var(--font-body); font-size:16px; line-height:1.7; color:var(--ink-soft); font-weight:300; max-width:720px; margin-bottom:48px; }
.explain p { margin-bottom:1em; }
.explain p:last-child { margin-bottom:0; }
.explain strong { color:var(--ink); font-weight:400; }
.explain em { font-family:var(--font-display); font-style:normal; font-weight:500; color:var(--gold); }
.explain code { font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep); color:var(--gold); padding:2px 7px; border:1px solid var(--line); }

/* Inline glossary */
.glossary {
  background:var(--bg-lift); border:none; border-left:2px solid var(--gold);
  padding:24px 28px; margin:18px 0;
  font-family:var(--font-body); font-size:14px; line-height:1.7; color:var(--ink-soft);
}
.glossary-label {
  font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--gold);
  text-transform:uppercase; margin-bottom:10px; display:block;
}
.glossary .gold { color:var(--gold); font-weight:400; }

/* Statement hero — the emotional hook */
.statement-hero {
  font-family:var(--font-display); font-weight:500; font-size:18px; line-height:1.5;
  color:var(--gold); margin:28px 0; letter-spacing:.01em;
}
.glossary code { font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep); color:var(--gold); padding:2px 6px; border:1px solid var(--line); margin:0 2px; }

/* Reference block */
.ref-block {
  background:var(--bg-lift); border:none; border-left:2px solid var(--copper);
  padding:14px 18px; margin:18px 0;
  font-family:var(--font-body); font-size:14px; line-height:1.7; color:var(--ink-soft);
}
.ref-block-label {
  font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--copper);
  text-transform:uppercase; margin-bottom:10px; display:block;
}
.ref-block code { font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep); color:var(--gold); padding:2px 6px; border:1px solid var(--line); margin:0 2px; }

/* Try it prompt */
.try-it {
  background:rgba(180,220,150,.04); border:none;
  padding:16px 20px; margin-top:18px; margin-bottom:18px;
  font-family:var(--font-body); font-size:14px; line-height:1.55; color:var(--ink-soft);
  display:flex; gap:14px; align-items:flex-start;
}
.try-it-icon {
  font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--green);
  text-transform:uppercase; padding:3px 8px; border:none;
  flex-shrink:0; margin-top:1px;
}
.try-it code { font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep); color:var(--green); padding:2px 6px; border:1px solid rgba(180,220,150,.2); }
.try-it em { font-family:var(--font-display); font-style:normal; font-weight:500; color:var(--gold); }

/* Pulse prompt */
.pulse-block {
  background:rgba(200,160,255,.04); border:none;
  padding:16px 20px; margin-top:18px; margin-bottom:18px;
  font-family:var(--font-body); font-size:14px; line-height:1.55; color:var(--ink-soft);
}
.pulse-label {
  font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:rgba(200,160,255,.85);
  text-transform:uppercase; margin-bottom:10px; display:block;
}
.pulse-block pre {
  font-family:var(--font-mono); font-size:11px; line-height:1.6; color:var(--ink);
  background:var(--bg-deep); border:1px solid var(--line); padding:12px 14px; margin:10px 0;
  white-space:pre-wrap; word-break:break-word; -webkit-user-select:all; user-select:all; cursor:copy;
}
.pulse-block code { font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep); color:rgba(200,160,255,.85); padding:2px 6px; border:1px solid rgba(200,160,255,.2); margin:0 2px; }
.pulse-hint { font-size:13px; color:var(--ink-mute); margin-top:8px; }

/* Supernova divider */
.supernova {
  position:relative; height:1px; margin:40px 0;
  background:linear-gradient(90deg, transparent, var(--line) 20%, var(--line) 80%, transparent);
}
.supernova::after {
  content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:120px; height:1px;
  background:radial-gradient(ellipse at center, rgba(232,200,154,0.9) 0%, rgba(212,165,116,0.4) 30%, transparent 70%);
  box-shadow:0 0 20px rgba(232,200,154,0.4), 0 0 60px rgba(232,200,154,0.15), 0 0 100px rgba(212,165,116,0.08);
  animation:supernova-breathe 5s ease-in-out infinite;
}
@keyframes supernova-breathe {
  0%, 100% { width:120px; opacity:0.8; }
  50% { width:180px; opacity:1; }
}

/* Sandbox */
/* Intro — this is alive */
.intro-alive { position:relative; padding:48px 0 56px; margin-bottom:48px; border-bottom:1px solid var(--line); overflow:hidden; }
.intro-alive-line {
  font-family:var(--font-display); font-weight:300; font-size:clamp(24px, 4vw, 40px);
  color:var(--ink); line-height:1.4; letter-spacing:-0.01em;
  clip-path:inset(0 100% 0 0);
  transition:clip-path 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}
.intro-alive-line.visible { clip-path:inset(0 0% 0 0); }
.intro-alive-line .intro-glow { color:#e8c89a; text-shadow:0 0 30px rgba(232,200,154,0.3); }
@keyframes gradient-sweep {
  0%   { background-position:0% 50%; }
  100% { background-position:300% 50%; }
}
@keyframes sub-glow {
  0%, 100% { filter:brightness(1) drop-shadow(0 0 8px rgba(232,200,154,0.0)); }
  50% { filter:brightness(1.6) drop-shadow(0 0 30px rgba(232,200,154,0.6)); }
}
.intro-alive-sub {
  font-family:var(--font-display); font-weight:500; font-size:clamp(24px, 4vw, 40px);
  letter-spacing:-0.01em; margin-top:28px; line-height:1.4;
  background:linear-gradient(90deg, #fff8ee, #e8c89a, #d4a876, #e8c89a, #fff8ee);
  background-size:300% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gradient-sweep 3s linear infinite, sub-glow 4s ease-in-out infinite;
  opacity:0; transition:opacity 1s ease;
}
.intro-alive-sub.visible { opacity:1; }

/* Slider + text field controls */
.controls-row { display:flex; gap:16px; align-items:flex-end; margin-bottom:20px; flex-wrap:wrap; }
.control-group { flex:1; min-width:160px; }
.control-label { font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--ink-mute); text-transform:uppercase; margin-bottom:8px; }
.control-slider {
  -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:2px;
  background:linear-gradient(90deg, #e8a060, #d070a0, #7060d0, #60b8a0, #c8a070);
  outline:none; cursor:pointer;
}
.control-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none; width:14px; height:14px;
  border-radius:50%; background:#f8f0e8; cursor:pointer;
  box-shadow:0 0 8px rgba(248,240,232,0.4);
}
.control-slider::-moz-range-thumb {
  width:14px; height:14px; border:0; border-radius:50%;
  background:#f8f0e8; cursor:pointer;
  box-shadow:0 0 8px rgba(248,240,232,0.4);
}
.control-text-field {
  background:rgba(232,217,192,0.04); border:1px solid rgba(232,217,192,0.12);
  border-radius:4px; padding:8px 14px; width:90px;
  font-family:var(--font-mono); font-size:16px; color:#e8c89a;
  text-align:center; outline:none; transition:border-color 0.3s var(--ease);
}
.control-text-field:focus { border-color:rgba(232,200,154,0.35); }

/* Code wall (lesson 1) */
.code-wall {
  background:rgba(0,0,0,0.5); border:1px solid rgba(232,217,192,0.06);
  border-radius:4px; padding:14px 18px; margin-bottom:8px;
  font-family:var(--font-mono); font-size:13px; line-height:2;
  color:rgba(232,217,192,0.6); white-space:pre; overflow-x:auto;
}
.code-wall .code-hl {
  color:#e8c89a; background:rgba(232,200,154,0.1);
  padding:1px 6px; border-radius:3px;
  border:1px solid rgba(232,200,154,0.2);
}
.code-wall-note {
  font-family:var(--font-mono); font-size:8px; letter-spacing:1px;
  color:rgba(232,217,192,0.2); margin-bottom:0;
}

/* Iridescent sandbox right panel (lesson 1) */
.iri-panel { display:flex; flex-direction:column; background:var(--bg-deep); border:1px solid var(--line); padding:0; }
.iri-panel .controls-row { padding:16px 20px 12px; border-bottom:1px solid var(--line); margin:0; }
.iri-panel .control-label { font-size:8px; margin-bottom:6px; }
.iri-panel .control-text-field { font-size:13px; padding:6px 10px; width:72px; }
.iri-panel .code-wall { border:0; border-radius:0; margin:0; flex:1; padding:20px 24px; }
.iri-panel .code-wall-note { padding:0 24px 16px; margin:0; }

.sandbox-label { font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--ink-mute); text-transform:uppercase; margin-bottom:14px; }
.sandbox { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:32px; }
@media (max-width:900px) { .sandbox { grid-template-columns:1fr; } }
.canvas-wrap { background:#000; border:1px solid var(--line); aspect-ratio:1/1; position:relative; overflow:hidden; }
.canvas-wrap canvas { width:100%; height:100%; display:block; }
.canvas-wrap .badge { position:absolute; bottom:12px; right:14px; font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:rgba(232,217,192,.3); pointer-events:none; }
.canvas-wrap .err { position:absolute; top:14px; left:14px; right:14px; font-family:var(--font-mono); font-size:11px; color:#ff6b6b; background:rgba(0,0,0,.85); padding:8px 12px; border-left:2px solid #ff6b6b; display:none; max-height:60%; overflow-y:auto; white-space:pre-wrap; }
.canvas-wrap .err.show { display:block; }
.editor { display:flex; flex-direction:column; background:var(--bg-deep); border:1px solid var(--line); position:relative; }
.editor-wrap { position:relative; flex:1; min-height:240px; }
.editor-highlight {
  position:absolute; top:0; left:0; right:0; bottom:0;
  padding:14px 16px; margin:0;
  font-family:var(--font-mono); font-size:13px; line-height:1.7;
  white-space:pre-wrap; word-wrap:break-word; tab-size:2; -moz-tab-size:2;
  color:transparent; pointer-events:none; overflow:auto;
}
.editor-wrap textarea {
  position:relative; z-index:1;
  width:100%; height:100%; min-height:240px;
  background:transparent; border:0; outline:0; resize:vertical;
  padding:14px 16px; margin:0;
  color:transparent; caret-color:var(--ink);
  font-family:var(--font-mono); font-size:13px; line-height:1.7;
  white-space:pre-wrap; word-wrap:break-word; tab-size:2; -moz-tab-size:2;
  -webkit-user-select:text; user-select:text;
}
/* Opalo syntax palette */
.sh-kw { color:#e8c070; }
.sh-type { color:#d4a850; }
.sh-fn { color:#885878; }
.sh-paren { color:#d898c0; }
.sh-num { color:#e8d8a0; }
.sh-op { color:#d0c8d8; }
.sh-semi { color:rgba(232,217,192,0.35); }
.sh-comment { color:rgba(232,217,192,0.35); font-style:italic; }
.sh-plain { color:rgba(232,217,192,0.6); }

/* Buttons */
.actions { display:flex; gap:10px; flex-wrap:wrap; padding-top:24px; border-top:1px solid var(--line); }
.btn { background:transparent; border:1px solid var(--line); color:var(--ink-soft); font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; padding:12px 18px; cursor:pointer; transition:all .3s var(--ease); display:flex; align-items:center; gap:8px; font-weight:400; }
.btn:hover { color:var(--gold); border-color:rgba(212,184,150,.3); background:rgba(212,184,150,.03); }
.btn .icon { font-size:13px; opacity:.7; }
.btn.copied { color:var(--green); border-color:rgba(180,220,150,.4); }
.btn.primary { border-color:var(--copper); color:var(--gold); margin-left:auto; }

<script>

  celebrateEyebrow: { es: '✓ Sección completada', en: '✓ Section complete' },
  headerTagline:    { es: 'aprende GLSL desde cero', en: 'learn GLSL from zero' },

// ============================================================
// Section data (bilingual)
// ============================================================

var SECTION_DATA = {
  tag: UI.sideTag,
  title: UI.sideTitle,
  sub: UI.sideSub,
  welcome: {
    eyebrow: { es: 'Bienvenido', en: 'Welcome' },
    title: { es: '¿Te interesa hacer arte con código?', en: 'Interested in making art with code?' },
    text: { es: 'Estás en el lugar correcto. En estas 10 lecciones vas a ir de cero a escribir visuales en tiempo real — degradados, ondas, círculos, patrones — todo corriendo en tu GPU con unas cuantas líneas de código. No necesitas experiencia.', en: 'You are in the right place. In these 10 lessons you will go from zero to writing real-time visuals — gradients, waves, circles, patterns — all running on your GPU with a few lines of code. No experience needed.' }
  },
  tips: { es: 'Es <em>imposible</em> romper nada aquí. En serio. Cambia cualquier número, borra una línea entera, escribe lo que quieras. Si algo truena, aparece un mensaje rojo — le das <em>Reset</em> y vuelves a empezar. Cero consecuencias. <em>La única manera de aprender es tocando.</em>', en: 'It is <em>impossible</em> to break anything here. Seriously. Change any number, delete a whole line, type whatever you want. If something breaks, a red message shows up — hit <em>Reset</em> and you are back. Zero consequences. <em>The only way to learn is by touching the code.</em>' },
};

// Primals — the absolute basics of reading code
var KIT = [
  { title: { es: 'Las llaves', en: 'Curly braces' },
    code: '{ }',
    explain: { es: 'Agrupan código. Todo lo que va adentro se ejecuta junto.', en: 'They group code. Everything inside runs together.' }
  },
  { title: { es: 'Los paréntesis', en: 'Parentheses' },
    code: '( )',
    explain: { es: 'Llaman una función — le dicen a la máquina "haz esto".', en: 'They call a function — they tell the machine "do this".' }
  },
  { title: { es: 'El punto y coma', en: 'The semicolon' },
    code: ';',
    explain: { es: 'El punto final de cada instrucción. Sin él, la máquina se pierde.', en: 'The period at the end of each instruction. Without it, the machine gets lost.' }
  },
  { title: { es: 'El igual', en: 'The equals sign' },
    code: '=',
    explain: { es: 'Asigna un valor. "x = 5" significa: guarda 5 dentro de x.', en: 'Assigns a value. "x = 5" means: store 5 inside x.' }
  },
  { title: { es: 'El comentario', en: 'The comment' },
    code: '// esto es un comentario',
    explain: { es: 'La máquina lo ignora. Es una nota para ti o para quien lea tu código.', en: 'The machine ignores it. It is a note for you or whoever reads your code.' }
  },
];

// Lesson catalogue (bilingual)
var LESSONS = [

  // ===== 01 =====
  { num:'01',
    title: { es: 'Hola, luz', en: 'Hello, light' },
    desc: { es: 'Un pixel. Millones de colores. Tu primera pieza.', en: 'One pixel. Millions of colors. Your first piece.' },
    welcome: true,
    iridescent: true,
    explain: {
      es: '<div class="glossary"><span class="glossary-label">¿Qué es un pixel?</span>Un pixel es uno de los cuadritos diminutos que forman tu pantalla. <span class="gold">Tu pantalla tiene millones.</span> Un <em>shader</em> es un programa que decide de qué color brilla cada uno.</div><p class="statement-hero">Lo que ves abajo es uno solo. Un shader le dice de qué color brillar.</p><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>0.42</code> a cualquier número — prueba <code>0.1</code>, <code>0.5</code>, <code>0.9</code>. Cada número cambia el color. Después cambia el <code>0.05</code> a <code>0.2</code> para que se mueva más rápido.</span></div><div class="supernova"></div><div class="pulse-block"><span class="pulse-label">Pulse</span>Reemplaza todo el código con esto — ve cómo pulsa.<pre>void main(){&#10;  vec3 col = iri(T * 0.05 + 0.42);&#10;  col *= .5 + .5 * sin(T);&#10;  gl_FragColor = vec4(col, 1.);&#10;}</pre><p class="pulse-hint">¿Quieres que pulse más rápido? Cambia <code>T</code> por <code>T * 3.</code> — el punto después del 3 es importante. En shaders, los números siempre llevan punto: <code>3.</code> no <code>3</code></p></div>',
      en: '<div class="glossary"><span class="glossary-label">What is a pixel?</span>A pixel is one of the tiny squares that make up your screen. <span class="gold">Your screen has millions.</span> A <em>shader</em> is a program that decides what color each one glows.</div><p class="statement-hero">What you see below is just one. A shader tells it what color to glow.</p><div class="supernova"></div><div class="ref-block"><span class="ref-block-label">Reading the code</span><code>void main()</code> — the starting point. Every shader begins here.<br><code>vec3 col</code> — a variable that holds 3 numbers: red, green, blue.<br><code>iri()</code> — the color formula. It cycles through 7 colors.<br><code>T</code> — time in seconds. It keeps growing, so the color keeps changing.<br><code>0.05</code> — how fast the color shifts. Bigger = faster.<br><code>0.42</code> — the starting point in the color cycle.<br><code>gl_FragColor</code> — the final output. This is what paints the pixel.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change the <code>0.42</code> to any number — try <code>0.1</code>, <code>0.5</code>, <code>0.9</code>. Each number shifts the color. Then change <code>0.05</code> to <code>0.2</code> to make it move faster.</span></div><div class="supernova"></div><div class="pulse-block"><span class="pulse-label">Pulse</span>Replace all the code with this — watch it pulse.<pre>void main(){&#10;  vec3 col = iri(T * 0.05 + 0.42);&#10;  col *= .5 + .5 * sin(T);&#10;  gl_FragColor = vec4(col, 1.);&#10;}</pre><p class="pulse-hint">Want it faster? Change <code>T</code> to <code>T * 3.</code> — the dot after the 3 matters. In shaders, numbers always need a dot: <code>3.</code> not <code>3</code></p></div>'
    },
    code: 'void main(){\n  vec3 col = iri(T * 0.05 + 0.42);\n  gl_FragColor = vec4(col, 1.);\n}'
  },

  // ===== 02 =====
  { num:'02',
    title: { es: 'Los tres números', en: 'The three numbers' },
    desc: { es: 'Rojo, verde, azul. Así se hace cualquier color.', en: 'Red, green, blue. That is how you make any color.' },
    explain: {
      es: '<p>Cualquier color que veas en una pantalla está hecho de <strong>tres números</strong>: cuánto rojo, cuánto verde, cuánto azul. <em>R, G, B.</em></p><p>Si los tres están al máximo (1, 1, 1), tienes blanco. Si los tres están apagados (0, 0, 0), tienes negro. Si solo el rojo está prendido (1, 0, 0), tienes rojo puro.</p><div class="glossary"><span class="glossary-label">¿Por qué tres?</span>Porque tu pantalla está hecha de tres tipos de luces: rojas, verdes y azules. Mezclando esos tres puedes hacer <em>cualquier</em> color del mundo. Es la misma idea que la imprenta CMYK pero al revés.</div><p>Nota una cosa rara: escribimos <code>1.</code> con punto, no <code>1</code>. Eso es porque la computadora distingue entre números enteros y decimales. Acá siempre usamos decimales — el punto es obligatorio.</p><div class="try-it"><span class="try-it-icon">Prueba</span><span>Intenta hacer <em>amarillo</em>. Pista: amarillo es rojo + verde, sin azul. Después intenta <em>morado</em>. Pista: rojo + azul, sin verde.</span></div>',
      en: '<p>Any color you see on a screen is made of <strong>three numbers</strong>: how much red, how much green, how much blue. <em>R, G, B.</em></p><p>If all three are at maximum (1, 1, 1), you get white. If all three are off (0, 0, 0), you get black. If only red is on (1, 0, 0), you get pure red.</p><div class="glossary"><span class="glossary-label">Why three?</span>Because your screen is made of three types of lights: red, green, and blue. By mixing those three you can make <em>any</em> color in the world. Same idea as CMYK printing but in reverse.</div><p>Notice something odd: we write <code>1.</code> with a dot, not <code>1</code>. That is because the computer tells apart whole numbers and decimals. Here we always use decimals — the dot is mandatory.</p><div class="try-it"><span class="try-it-icon">Try</span><span>Try making <em>yellow</em>. Hint: yellow is red + green, no blue. Then try <em>purple</em>. Hint: red + blue, no green.</span></div>'
    },
    code: 'void main(){\n  float r = 1.;\n  float g = 0.7;\n  float b = 0.2;\n  gl_FragColor = vec4(r, g, b, 1.);\n}'
  },

  // ===== 03 =====
  { num:'03',
    title: { es: 'Mezclar', en: 'Mixing' },
    desc: { es: 'Sumar y restar números. Ya sabes hacerlo.', en: 'Add and subtract numbers. You already know how.' },
    explain: {
      es: '<p>Los números de los colores se pueden <strong>sumar, restar, multiplicar y dividir</strong>. Igual que los números normales que aprendiste en la primaria.</p><p>Si multiplicas un color por <em>0.5</em>, queda más oscuro (la mitad de luz). Si lo multiplicas por <em>2.</em>, queda más brillante. Si le restas <em>0.3</em>, le quitas un poco de cada canal.</p><div class="glossary"><span class="glossary-label">vec3</span>Un <code>vec3</code> es como una <em>bolsita con tres números adentro</em>. La usamos para guardar un color (R, G, B). Cuando le sumas otra bolsita, suma los tres números a la vez. Mucho más cómodo que sumar uno por uno.</div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>0.5</code> por <code>0.2</code> para ver el color más oscuro. O por <code>1.5</code> para verlo brillando.</span></div>',
      en: '<p>Color numbers can be <strong>added, subtracted, multiplied, and divided</strong>. Just like the regular numbers you learned in school.</p><p>If you multiply a color by <em>0.5</em>, it gets darker (half the light). Multiply by <em>2.</em> and it gets brighter. Subtract <em>0.3</em> and you take a little away from each channel.</p><div class="glossary"><span class="glossary-label">vec3</span>A <code>vec3</code> is like a <em>little bag with three numbers inside</em>. We use it to hold a color (R, G, B). When you add another bag to it, it adds all three numbers at once. Way easier than adding one by one.</div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.5</code> to <code>0.2</code> to see the color darker. Or to <code>1.5</code> to see it glow.</span></div>'
    },
    code: 'void main(){\n  vec3 base = vec3(1., 0.5, 0.2);\n  // Scale brightness\n  vec3 col = base * 0.5;\n  gl_FragColor = vec4(col, 1.);\n}'
  },

  // ===== 04 =====
  { num:'04',
    title: { es: 'Las coordenadas', en: 'Coordinates' },
    desc: { es: 'Cada pixel sabe dónde está.', en: 'Every pixel knows where it is.' },
    explain: {
      es: '<p>Cada pixel de la pantalla tiene una <strong>posición</strong>: dos números, X y Y. X es horizontal (izquierda-derecha), Y es vertical (abajo-arriba). Como en el plano cartesiano de la escuela.</p><p>Lo importante: <em>cada pixel ejecuta el código por separado</em>, pero conoce su propia posición. El pixel de la esquina inferior izquierda sabe que es (0, 0). El de la esquina superior derecha sabe que es el último.</p><div class="glossary"><span class="glossary-label">vec2</span>Si <code>vec3</code> es una bolsita de 3 números, <code>vec2</code> es una bolsita de 2. La usamos para posiciones (X, Y). Acá <code>p</code> es la posición del pixel, dividida entre el tamaño de la pantalla — para que vaya de 0 a 1 en lugar de 0 a 1920.</div><p>Si pones <code>p.x</code> como rojo, el rojo aumenta hacia la derecha. Si pones <code>p.y</code> como verde, el verde aumenta hacia arriba. <em>El color es la posición.</em></p><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>p.x</code> por <code>p.y</code> en la primera línea. ¿Qué pasa? Ahora pon <code>p.x</code> en los tres lugares. ¿Y ahora?</span></div>',
      en: '<p>Every pixel on the screen has a <strong>position</strong>: two numbers, X and Y. X is horizontal (left-right), Y is vertical (bottom-top). Just like the coordinate plane from school.</p><p>Here is the key idea: <em>every pixel runs the code on its own</em>, but it knows its own position. The pixel at the bottom-left corner knows it is (0, 0). The one at the top-right knows it is the last one.</p><div class="glossary"><span class="glossary-label">vec2</span>If <code>vec3</code> is a little bag of 3 numbers, <code>vec2</code> is a bag of 2. We use it for positions (X, Y). Here <code>p</code> is the pixel position divided by the screen size — so it goes from 0 to 1 instead of 0 to 1920.</div><p>If you put <code>p.x</code> as red, the red increases to the right. Put <code>p.y</code> as green and the green increases upward. <em>The color is the position.</em></p><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>p.x</code> to <code>p.y</code> on the first line. What happens? Now put <code>p.x</code> in all three spots. And now?</span></div>'
    },
    code: 'void main(){\n  vec2 p = gl_FragCoord.xy / R;\n  // Position as color\n  gl_FragColor = vec4(p.x, p.y, 0.5, 1.);\n}'
  },

  // ===== 05 =====
  { num:'05',
    title: { es: 'El degradé', en: 'The gradient' },
    desc: { es: 'Una posición controla un color. Ya está, eres artista.', en: 'A position controls a color. There you go, you are an artist.' },
    explain: {
      es: '<p>Esto es la <strong>idea más poderosa</strong> que vas a aprender hoy: <em>la posición puede convertirse en color</em>. Y al revés: <em>las matemáticas que apliques a la posición se ven como dibujo</em>.</p><p>Un degradé es solo eso: tomas <code>p.x</code> (la posición horizontal) y la usas como un canal de color. El pixel de la izquierda tiene <code>p.x = 0</code>, el de la derecha tiene <code>p.x = 1</code>. Si lo conectas al rojo, queda un degradé de negro a rojo.</p><div class="glossary"><span class="glossary-label">mix()</span>La función <code>mix(A, B, t)</code> "mezcla" dos cosas. Cuando <code>t</code> es 0, te da A puro. Cuando es 1, te da B puro. Cuando es 0.5, te da la mitad de cada uno. Es como un slider.</div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>p.x</code> por <code>p.y</code> para que el degradé sea vertical. Cambia los colores <code>vec3(1.,0.3,0.2)</code> y <code>vec3(0.2,0.5,1.)</code> a otros que tú elijas.</span></div>',
      en: '<p>This is the <strong>most powerful idea</strong> you will learn today: <em>position can become color</em>. And the other way around: <em>the math you apply to the position shows up as a drawing</em>.</p><p>A gradient is just that: you take <code>p.x</code> (the horizontal position) and use it as a color channel. The pixel on the left has <code>p.x = 0</code>, the one on the right has <code>p.x = 1</code>. Connect it to red, and you get a gradient from black to red.</p><div class="glossary"><span class="glossary-label">mix()</span>The function <code>mix(A, B, t)</code> "blends" two things. When <code>t</code> is 0, you get pure A. When it is 1, you get pure B. When it is 0.5, you get half and half. It is like a slider.</div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>p.x</code> to <code>p.y</code> to make the gradient vertical. Change the colors <code>vec3(1.,0.3,0.2)</code> and <code>vec3(0.2,0.5,1.)</code> to anything you like.</span></div>'

// Shader preamble
// ============================================================
var VERT = 'attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}';
var HEAD = [
  'precision mediump float;',
  'uniform float T;', 'uniform vec2 R;', 'uniform vec2 M;',
  'uniform float U;',
  '',
  '// Iridescent color cycle — 7 spectral anchors',
  'vec3 iri(float t){',
  '  vec3 d=vec3(.83,.65,.30),me=vec3(.97,.78,.55),pe=vec3(.95,.70,.60),',
  '       la=vec3(.77,.63,1.),ro=vec3(.95,.78,.88),ve=vec3(.65,.85,.72),mo=vec3(.55,.45,.80);',
  '  t=fract(t);float s=t*7.;int i=int(floor(s));float f=fract(s);f=f*f*(3.-2.*f);',
  '  vec3 a,b;',
  '  if(i==0){a=d;b=me;}else if(i==1){a=me;b=pe;}else if(i==2){a=pe;b=la;}',
  '  else if(i==3){a=la;b=ro;}else if(i==4){a=ro;b=ve;}else if(i==5){a=ve;b=mo;}',
  '  else{a=mo;b=d;}',
  '  return mix(a,b,f);',
  '}',
].join('\n');

// ============================================================
// GLSL syntax highlighter — Opalo palette
// ============================================================
var GLSL_KW = /^(void|return|if|else|for|while|break|continue|discard|precision|mediump|highp|lowp|in|out|inout|uniform|attribute|varying|const)$/;
var GLSL_TYPE = /^(float|int|bool|vec2|vec3|vec4|mat2|mat3|mat4|sampler2D|ivec2|ivec3|ivec4|bvec2|bvec3|bvec4)$/;
var GLSL_FN = /^(sin|cos|tan|asin|acos|atan|pow|exp|log|sqrt|abs|sign|floor|ceil|fract|mod|min|max|clamp|mix|step|smoothstep|length|distance|dot|cross|normalize|reflect|refract|texture2D|iri|fb|n2|h2)$/;

function highlightGLSL(src) {
  var out = '';
  var i = 0;
  while (i < src.length) {
    // Line comment
    if (src[i] === '/' && src[i+1] === '/') {
      var end = src.indexOf('\n', i);
      if (end === -1) end = src.length;
      out += '<span class="sh-comment">' + esc(src.slice(i, end)) + '</span>';
      i = end;
      continue;
    }
    // Number
    if (/[0-9]/.test(src[i]) || (src[i] === '.' && i+1 < src.length && /[0-9]/.test(src[i+1]))) {
      var start = i;
      while (i < src.length && /[0-9.]/.test(src[i])) i++;
      out += '<span class="sh-num">' + esc(src.slice(start, i)) + '</span>';
      continue;
    }
    // Word
    if (/[a-zA-Z_]/.test(src[i])) {
      var start = i;
      while (i < src.length && /[a-zA-Z0-9_]/.test(src[i])) i++;
      var w = src.slice(start, i);
      if (GLSL_KW.test(w)) out += '<span class="sh-kw">' + esc(w) + '</span>';
      else if (GLSL_TYPE.test(w)) out += '<span class="sh-type">' + esc(w) + '</span>';
      else if (GLSL_FN.test(w)) out += '<span class="sh-fn">' + esc(w) + '</span>';
      else out += '<span class="sh-plain">' + esc(w) + '</span>';
      continue;
    }
    // Parens/braces
    if ('(){}[]'.indexOf(src[i]) !== -1) {
      out += '<span class="sh-paren">' + esc(src[i]) + '</span>';
      i++; continue;
    }
    // Semicolon
    if (src[i] === ';') {
      out += '<span class="sh-semi">;</span>';
      i++; continue;
    }
    // Operators
    if ('=+-*/<>!&|^~%'.indexOf(src[i]) !== -1) {
      out += '<span class="sh-op">' + esc(src[i]) + '</span>';
      i++; continue;
    }
    // Newline and whitespace preserved
    out += esc(src[i]);
    i++;
  }
  return out;
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function syncHighlight(textarea, pre) {
  pre.innerHTML = highlightGLSL(textarea.value) + '\n';
  pre.scrollTop = textarea.scrollTop;
}

function el(tag, attrs, kids) {
  var e = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.indexOf('on') === 0) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if (kids) {
    if (typeof kids === 'string') e.textContent = kids;
    else kids.forEach(function(c){ if (c) e.appendChild(c); });
  }
  return e;
}

  updateSidebarText();
  rebuildToc();
  rebuildKit();
  renderLesson();
  updateProgress();
}

function updateSidebarText() {
  document.getElementById('sideTag').textContent = t(UI.sideTag);
  document.getElementById('sideTitle').textContent = t(UI.sideTitle);
  document.getElementById('sideSub').textContent = t(UI.sideSub);
  document.getElementById('sideLessonsLabel').textContent = t(UI.lessonsLabel);
  document.getElementById('sideKitLabel').textContent = t(UI.kitLabel);
  document.getElementById('headerTagline').textContent = t(UI.headerTagline);
}

// ============================================================
// Sidebar navigation
// ============================================================
function rebuildToc() {
  var toc = document.getElementById('toc');
  toc.innerHTML = '';
  LESSONS.forEach(function(lesson, i) {
    var item = el('div', { class:'toc-item', 'data-idx':i }, [
      el('span', { class:'toc-num' }, lesson.num),
      el('span', { class:'toc-name' }, t(lesson.title)),
      el('span', { class:'toc-mark' }, '')
    ]);
    item.addEventListener('click', function(){ goTo(i); });
    toc.appendChild(item);
  });
}

function rebuildKit() {
  var kitList = document.getElementById('kitList');
  kitList.innerHTML = '';
  KIT.forEach(function(item) {
    var card = el('div', { class:'kit-card unlocked' }, [
      el('div', { class:'kit-card-title' }, t(item.title)),
      el('pre', { class:'kit-card-code' }, item.code),
      el('p', { class:'kit-card-explain' }, t(item.explain))
    ]);
    kitList.appendChild(card);
  });
}

function buildSidebar() {
  rebuildToc();
  rebuildKit();
}

function updateProgress() {
  var done = visited.size;
  document.getElementById('progressText').textContent = done + ' / ' + LESSONS.length;
  document.getElementById('progressBar').style.width = (done / LESSONS.length * 100) + '%';

  document.querySelectorAll('.toc-item').forEach(function(item){
    var idx = parseInt(item.getAttribute('data-idx'));
    item.classList.toggle('active', idx === currentIdx);
    item.classList.toggle('done', visited.has(idx));
    var mark = item.querySelector('.toc-mark');
    mark.textContent = visited.has(idx) ? '✓' : '';
  });

}

// ============================================================
// Lesson renderer
// ============================================================
function goTo(idx) {
  if (idx < 0 || idx >= LESSONS.length) return;
  if (currentRenderer) currentRenderer.destroy();
  currentIdx = idx;
  visited.add(idx);
  renderLesson();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderLesson() {
  var lesson = LESSONS[currentIdx];
  var main = document.getElementById('main');
  main.innerHTML = '';

  // Breadcrumb
  main.appendChild(el('div', { class:'crumb' }, [
    el('span', null, t(UI.crumbLearn)),
    el('span', { class:'sep' }, '›'),
    el('span', null, 'Start Here'),
    el('span', { class:'sep' }, '›'),
    el('span', null, t(UI.crumbLesson) + ' ' + lesson.num)
  ]));

  // Welcome banner (lesson 01 only)
  if (lesson.welcome) {
    main.appendChild(el('div', { class:'welcome-banner' }, [
      el('div', { class:'welcome-eyebrow' }, t(SECTION_DATA.welcome.eyebrow)),
      el('h2', { class:'welcome-title' }, t(SECTION_DATA.welcome.title)),
      el('p', { class:'welcome-text', html: t(SECTION_DATA.welcome.text) })
    ]));
  }

  // Lesson header
  main.appendChild(el('div', { class:'lesson-num-big' }, lesson.num));
  main.appendChild(el('h1', { class:'lesson-title-big' }, t(lesson.title)));
  main.appendChild(el('p', { class:'lesson-desc-big' }, t(lesson.desc)));

  // Intro — this is alive (lesson 1, first visit only)
  if (lesson.iridescent && !introShown) {
    introShown = true;
    var introLines = lang === 'en'
      ? [
          'Your computer has two engines.',
          '<span class="intro-glow">CPU</span> runs your apps — browser, music, files.',
          '<span class="intro-glow">GPU</span> runs graphics — every pixel you see on screen.',
          '<span class="intro-glow">Graphics Processing Unit</span> (GPU). Built to paint millions of pixels at the same time.',
          'A <span class="intro-glow">shader</span> is a small program that runs on the GPU.',
          '<span class="intro-glow">GLSL</span> — the language you write shaders in.'
        ]
      : [
          'Tu computadora tiene dos motores.',
          '<span class="intro-glow">CPU</span> corre tus apps — navegador, música, archivos.',
          '<span class="intro-glow">GPU</span> corre los gráficos — cada pixel que ves en pantalla.',
          '<span class="intro-glow">Graphics Processing Unit</span> (GPU). Hecho para pintar millones de pixeles al mismo tiempo.',
          'Un <span class="intro-glow">shader</span> es un programa pequeño que corre en la GPU.',
          '<span class="intro-glow">GLSL</span> — el lenguaje en el que escribes shaders.'
        ];
    var introEl = el('div', { class:'intro-alive' });
    var lineEls = [];
    introLines.forEach(function(text) {
      var line = el('div', { class:'intro-alive-line' });
      line.innerHTML = text;
      introEl.appendChild(line);
      lineEls.push(line);
    });
    var subText = lang === 'en' ? 'And you will learn how to build them all here.' : 'Y aquí vas a aprender a construirlos todos.';
    var sub = el('div', { class:'intro-alive-sub' });
    sub.textContent = subText;
    introEl.appendChild(sub);
    main.appendChild(introEl);
    lineEls.forEach(function(line, i) {
      setTimeout(function(){ line.classList.add('visible'); }, 300 + i * 2000);
    });
    setTimeout(function(){ sub.classList.add('visible'); }, 300 + lineEls.length * 2000);
  }

  // Tips banner (lesson 01 only)
  if (lesson.welcome) {
    main.appendChild(el('div', { class:'tips-banner' }, [
      el('span', { class:'tips-icon' }, t(UI.tipsIcon)),
      el('p', { class:'tips-text', html: t(SECTION_DATA.tips) })
    ]));
  }

  // Explanation content
  main.appendChild(el('div', { class:'explain', html: t(lesson.explain) }));

  // Interactive sandbox
  main.appendChild(el('div', { class:'sandbox-label' }, t(UI.sandboxLabel)));

  // Canvas + editor
  var canvas = el('canvas');
  var errEl = el('div', { class:'err' });
  var canvasWrap = el('div', { class:'canvas-wrap' }, [canvas, errEl, el('div', { class:'badge' }, 'live · webgl')]);

  var textarea, statusEl, editor;

  // All lessons: textarea with syntax highlight overlay
  statusEl = el('span', { class:'editor-status' }, t(UI.editorCompiled));
  textarea = el('textarea', { spellcheck:'false', id:'shader-editor', name:'shader-editor' });
  textarea.value = lesson.code;
  var hlPre = el('pre', { class:'editor-highlight' });
  var editorWrap = el('div', { class:'editor-wrap' }, [hlPre, textarea]);
  editor = el('div', { class:'editor' }, [editorWrap]);
  main.appendChild(el('div', { class:'sandbox' }, [canvasWrap, editor]));

  // Initial highlight
  syncHighlight(textarea, hlPre);

  // Sync scroll
  textarea.addEventListener('scroll', function(){ hlPre.scrollTop = textarea.scrollTop; });

  // WebGL compile loop
  setTimeout(function(){
    currentRenderer = createRenderer(canvas, lesson.code, statusEl, errEl);
    var debounce;
    textarea.addEventListener('input', function(){
      syncHighlight(textarea, hlPre);
      clearTimeout(debounce);
      debounce = setTimeout(function(){
        if (currentRenderer) currentRenderer.recompile(textarea.value);
      }, 250);
    });
  }, 50);

  // Action buttons
  var btnCopy = el('button', { class:'btn' }, [el('span', { class:'icon' }, '⧉'), el('span', null, t(UI.btnCopy))]);
  var btnReset = el('button', { class:'btn' }, [el('span', { class:'icon' }, '↺'), el('span', null, 'Reset')]);

  var btnNextLabel, btnNextIcon;
  if (lesson.finale) {
    btnNextLabel = t(UI.btnCompleted);
    btnNextIcon = '✓';
  } else if (currentIdx < LESSONS.length - 1) {
    btnNextLabel = t(UI.btnNext);
    btnNextIcon = '→';
  } else {
    btnNextLabel = t(UI.btnCompletedAlt);
    btnNextIcon = '✓';
  }
  var btnNext = el('button', { class:'btn primary' }, [
    el('span', null, btnNextLabel),
    el('span', { class:'icon' }, btnNextIcon)
  ]);

  btnCopy.addEventListener('click', function(){
    navigator.clipboard.writeText(textarea.value).then(function(){
      var l = btnCopy.querySelector('span:last-child');
      var o = l.textContent; l.textContent = t(UI.btnCopied);
      btnCopy.classList.add('copied');
      setTimeout(function(){ l.textContent = o; btnCopy.classList.remove('copied'); }, 1400);
    });
  });
  btnReset.addEventListener('click', function(){
    textarea.value = lesson.code;
    if (currentRenderer) currentRenderer.recompile(lesson.code);
  });
  btnNext.addEventListener('click', function(){
    if (currentIdx < LESSONS.length - 1) goTo(currentIdx + 1);
  });

  main.appendChild(el('div', { class:'actions' }, [btnCopy, btnReset, btnNext]));

  // Completion card (lesson 10 only)
  if (lesson.finale) {
    main.appendChild(el('div', { class:'celebrate' }, [
      el('div', { class:'celebrate-eyebrow' }, t(UI.celebrateEyebrow)),
      el('h3', { class:'celebrate-title' }, t(lesson.celebrateTitle)),
      el('p', { class:'celebrate-text', html: t(lesson.celebrateText) })
    ]));
  }

  // Prev / next navigation
  var prevArrow = el('div', { class:'nav-arrow' + (currentIdx === 0 ? ' disabled' : '') }, [
    el('span', { class:'nav-arrow-label' }, t(UI.navPrev)),
    el('span', { class:'nav-arrow-name' }, currentIdx > 0 ? t(LESSONS[currentIdx-1].title) : '—')
  ]);
  var nextArrow = el('div', { class:'nav-arrow next' + (currentIdx === LESSONS.length - 1 ? ' disabled' : '') }, [
    el('span', { class:'nav-arrow-label' }, t(UI.navNext)),
    el('span', { class:'nav-arrow-name' }, currentIdx < LESSONS.length - 1 ? t(LESSONS[currentIdx+1].title) : '—')
  ]);
  prevArrow.addEventListener('click', function(){ if (currentIdx > 0) goTo(currentIdx - 1); });
  nextArrow.addEventListener('click', function(){ if (currentIdx < LESSONS.length - 1) goTo(currentIdx + 1); });

  main.appendChild(el('div', { class:'nav-bottom' }, [prevArrow, nextArrow]));
}

// ============================================================
// WebGL renderer
// ============================================================
function createRenderer(canvas, code, statusEl, errEl) {
  var gl = canvas.getContext('webgl', { antialias:true, alpha:false });
  if (!gl) return null;
  var prog = null, uT, uR, uM, uU;
  var userUniformValue = 0.42;
  var dpr = Math.max(window.devicePixelRatio || 1, window.innerWidth < 768 ? 1.25 : 1.5);
  var mouseX = 0.5, mouseY = 0.5;
  var paused = false, isVisible = true, isInViewport = true;
  var FPS = 30, FRAME = 1000/FPS, lastDraw = 0;
  var startTime = performance.now();

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  function recompile(src) {
    var fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, HEAD + '\n' + src);
    gl.compileShader(fs);
    if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
      var err = gl.getShaderInfoLog(fs); gl.deleteShader(fs);
      if (statusEl) { statusEl.textContent = 'error'; statusEl.classList.add('error'); }
      if (errEl) { errEl.textContent = err; errEl.classList.add('show'); }
      return false;
    }
    var vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, VERT); gl.compileShader(vs);
    var newProg = gl.createProgram();
    gl.attachShader(newProg, vs); gl.attachShader(newProg, fs);
    gl.bindAttribLocation(newProg, 0, 'a');
    gl.linkProgram(newProg);
    if (prog) gl.deleteProgram(prog);
    prog = newProg;
    gl.useProgram(prog);
    uT = gl.getUniformLocation(prog, 'T');
    uR = gl.getUniformLocation(prog, 'R');
    uM = gl.getUniformLocation(prog, 'M');
    uU = gl.getUniformLocation(prog, 'U');
    if (statusEl) { statusEl.textContent = t(UI.editorCompiled); statusEl.classList.remove('error'); }
    if (errEl) errEl.classList.remove('show');
    return true;
  }
  recompile(code);

  function resize() {
    var rect = canvas.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  canvas.addEventListener('mousemove', function(e){
    var rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) / rect.width;
    mouseY = 1 - (e.clientY - rect.top) / rect.height;
  });
  document.addEventListener('visibilitychange', function(){ isVisible = !document.hidden; });
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(es){ isInViewport = es[0].isIntersecting; }, { threshold:0.01 });
    obs.observe(canvas);
  }

  var rafId;
  function frame(now) {
    rafId = requestAnimationFrame(frame);
    if (paused || !isVisible || !isInViewport || !prog) return;
    if (now - lastDraw < FRAME) return;
    lastDraw = now;
    gl.uniform1f(uT, (now - startTime) * 0.001);
    gl.uniform2f(uR, canvas.width, canvas.height);
    gl.uniform2f(uM, mouseX, mouseY);
    if (uU) gl.uniform1f(uU, userUniformValue);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  rafId = requestAnimationFrame(frame);

  return {
    recompile: recompile,
    setU: function(v){ userUniformValue = v; },
    destroy: function(){ paused = true; cancelAnimationFrame(rafId); }
  };
}

// ============================================================
// Background FBM — silky mantle
// ============================================================
function initBgFbm() {
  var wrap = document.getElementById('bgFbm');
  if (!wrap) return;
  var canvas = wrap.querySelector('canvas');
  var gl = canvas.getContext('webgl', { antialias:false, alpha:false });
  if (!gl) return;

  var dpr = Math.min(window.devicePixelRatio || 1, window.innerWidth < 768 ? 1.25 : 1.5);

  var vsrc = 'attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}';
  var fsrc = [
    'precision mediump float;',
    'uniform float T;',
    'uniform vec2 R;',
    '',
    'float h2(vec2 p){',
    '  vec3 p3=fract(vec3(p.xyx)*0.1031);',
    '  p3+=dot(p3,p3.yzx+33.33);',
    '  return fract((p3.x+p3.y)*p3.z);',
    '}',
    'float n2(vec2 p){',
    '  vec2 i=floor(p),f=fract(p);',
    '  f=f*f*f*(f*(f*6.-15.)+10.);',
    '  return mix(mix(h2(i),h2(i+vec2(1,0)),f.x),',
    '             mix(h2(i+vec2(0,1)),h2(i+vec2(1,1)),f.x),f.y);',
    '}',
    'float fb(vec2 p){',
    '  float v=0.,a=.5;',
    '  mat2 r=mat2(.8,.6,-.6,.8);',
    '  for(int i=0;i<4;i++){v+=a*n2(p);p=r*p*2.07;a*=.5;}',
    '  return v;',
    '}',
    'void main(){',
    '  vec2 uv=(gl_FragCoord.xy/R-.5)*2.;',
    '  uv.x*=R.x/R.y;',
    '  float t=T*0.015;',
    '  vec2 p=uv*1.2;',
    '  vec2 q=vec2(fb(p+t),fb(p+vec2(4.7,2.3)+t*0.8));',
    '  float f=fb(p+2.*q);',
    '  float fold=sin(f*8.+t*8.)*.5+.5;',
    '  fold=pow(fold,1.8);',
    '  vec3 c=vec3(0.02,0.018,0.025);',
    '  c+=vec3(0.08,0.06,0.07)*fold;',
    '  c+=vec3(0.12,0.08,0.06)*pow(fold,3.)*0.5;',
    '  c+=vec3(0.10,0.06,0.04)*pow(fold,5.)*0.3;',
    '  gl_FragColor=vec4(c,1.);',
    '}',
  ].join('\n');

  var vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, vsrc); gl.compileShader(vs);
  var fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, fsrc); gl.compileShader(fs);
  if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
    console.warn('BG FBM compile error:', gl.getShaderInfoLog(fs));
    return;
  }
  var prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.bindAttribLocation(prog, 0, 'a');
  gl.linkProgram(prog); gl.useProgram(prog);

  var uT = gl.getUniformLocation(prog, 'T');
  var uR = gl.getUniformLocation(prog, 'R');

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  function resize() {
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  var FPS = 30, FRAME = 1000/FPS, lastDraw = 0;
  var startTime = performance.now();
  var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function frame(now) {
    requestAnimationFrame(frame);
    if (reducedMotion || document.hidden) return;
    if (now - lastDraw < FRAME) return;
    lastDraw = now;
    gl.uniform1f(uT, (now - startTime) * 0.001);
    gl.uniform2f(uR, canvas.width, canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  requestAnimationFrame(frame);
}

// ============================================================
// Boot academy after language is selected
// ============================================================
function bootAcademy() {
  // Update page title
  document.title = lang === 'en' ? 'WoGL Learn · Start Here' : 'WoGL Aprende · Start Here';
  updateLangToggle();
  updateSidebarText();
  buildSidebar();
  goTo(0);
}

// ============================================================
// Bootstrap
// ============================================================
document.addEventListener('DOMContentLoaded', function(){
  initBgFbm();

  // Language toggle click handlers
  document.querySelectorAll('.lang-toggle-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var newLang = btn.getAttribute('data-lang');
      if (newLang !== lang) switchLanguage(newLang);
    });
  });

  initLanguage();

  // Arrow key navigation
  document.addEventListener('keydown', function(e){
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') goTo(currentIdx + 1);
    if (e.key === 'ArrowLeft') goTo(currentIdx - 1);
  });
});
