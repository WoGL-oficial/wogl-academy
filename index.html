      es:'<p>En la vida real nada frena en seco. Todo <strong>se pasa, rebota y se asienta</strong>. Eso es movimiento elástico.</p><p>La fórmula: <code>exp(-T * 2.) * sin(T * 12.)</code>. El <code>sin()</code> oscila rápido (el rebote). El <code>exp(-T)</code> lo va apagando (el damping). Juntos: un golpe que vibra y se calma.</p><p><em>Overshoot → bounce → settle. Física elástica en una línea.</em></p><div class="glossary"><span class="glossary-label">Damped oscillation</span><code>exp(-t * damping) * sin(t * freq)</code>. <code>damping</code> controla qué tan rápido se calma. <code>freq</code> controla qué tan rápido vibra.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>2.</code> (damping) a <code>0.5</code> — tarda mucho en calmarse. Cambia <code>12.</code> (frecuencia) a <code>30.</code> — vibra más rápido.</span></div>',
      en:'<p>In real life nothing stops dead. Everything <strong>overshoots, bounces, and settles</strong>. That is elastic motion.</p><p>The formula: <code>exp(-T * 2.) * sin(T * 12.)</code>. The <code>sin()</code> oscillates fast (the bounce). The <code>exp(-T)</code> fades it out (damping). Together: a hit that vibrates and calms down.</p><p><em>Overshoot → bounce → settle. Elastic physics in one line.</em></p><div class="glossary"><span class="glossary-label">Damped oscillation</span><code>exp(-t * damping) * sin(t * freq)</code>. <code>damping</code> controls how fast it calms. <code>freq</code> controls how fast it vibrates.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>2.</code> (damping) to <code>0.5</code> — takes forever to settle. Change <code>12.</code> (frequency) to <code>30.</code> — vibrates faster.</span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float t = mod(T, 4.);\n  float elastic = exp(-t * 2.) * sin(t * 12.);\n  float warp = fb(p * 2.);\n  float w = fb(p * 3. + warp * (0.5 + elastic * 0.5));\n  vec3 a = vec3(0.9, 0.92, 0.98);\n  vec3 b = vec3(0.03, 0.05, 0.15);\n  vec3 col = mix(b, a, w) * (0.8 + 0.2 * elastic);\n  col *= smoothstep(1.8, 0.1, length(p));\n  gl_FragColor = vec4(col, 1.);\n}'},
  { num:'05', title:{es:'Morph',en:'Morph'}, desc:{es:'Un material muta en otro. Transición viva.',en:'One material mutates into another. Living transition.'},
    explain: {
      es:'<p>Dos texturas, dos mundos. Quieres que uno <strong>se transforme en el otro</strong>. No un fade — una <em>mutación</em>.</p><p>El truco: dos domain warps diferentes y un <code>mix()</code> controlado por tiempo. Cuando <code>t = 0</code>, ves el material A. Cuando <code>t = 1</code>, el B. En medio: algo que no es ninguno.</p><p><em>mix() entre dos mundos. La materia muta.</em></p><div class="glossary"><span class="glossary-label">Morph con mix()</span><code>mix(warpA, warpB, t)</code> interpola entre dos domain warps. El resultado es una mutación — la estructura cambia, no solo la apariencia.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.5</code> (velocidad del morph) a <code>0.1</code> para transición ultra lenta. Cambia <code>p * 2.</code> a <code>p * 5.</code> para materiales más diferentes.</span></div>',
      en:'<p>Two textures, two worlds. You want one to <strong>transform into the other</strong>. Not a fade — a <em>mutation</em>.</p><p>The trick: two different domain warps and a <code>mix()</code> controlled by time. When <code>t = 0</code>, you see material A. When <code>t = 1</code>, material B. In between: something that is neither.</p><p><em>mix() between two worlds. Matter mutates.</em></p><div class="glossary"><span class="glossary-label">Morph with mix()</span><code>mix(warpA, warpB, t)</code> interpolates between two domain warps. The result is a mutation — the structure changes, not just the appearance.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.5</code> (morph speed) to <code>0.1</code> for ultra slow transition. Change <code>p * 2.</code> to <code>p * 5.</code> so materials differ more.</span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float t = sin(T * 0.5) * 0.5 + 0.5;\n  float a = fb(p + vec2(T * 0.1));\n  float b = fb(p * 2. + vec2(0., T * 0.3));\n  float w = mix(a, b, t);\n  vec3 col = iri(w + t * 0.3 + T * 0.04);\n  gl_FragColor = vec4(col, 1.);\n}'},
  { num:'06', title:{es:'Flow field',en:'Flow field'}, desc:{es:'Velocidad que varía por posición. Zonas rápidas, zonas lentas.',en:'Velocity varies by position. Fast zones, slow zones.'},
    explain: {
      es:'<p>Hasta ahora el tiempo avanza igual en todas partes. Pero en un río, hay zonas donde el agua corre rápido y zonas donde se estanca. Eso es un <strong>flow field</strong>.</p><p>El truco: en vez de sumar <code>T</code> directo, lo multiplicas por un valor que cambia con la posición. <code>T * (0.5 + fb(p))</code>. Donde el noise es alto, el tiempo corre rápido. Donde es bajo, casi se detiene.</p><p><em>Cada coordenada tiene su propia velocidad.</em></p><div class="glossary"><span class="glossary-label">Flow field</span>Un campo donde cada punto tiene su propia velocidad. Modulas <code>T</code> con una función espacial. El resultado: movimiento que se siente líquido.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>0.5</code> (velocidad base) a <code>0.0</code> — las zonas lentas se congelan. Cambia <code>p * 1.5</code> a <code>p * 4.</code> para zonas de velocidad más pequeñas.</span></div>',
      en:'<p>Until now time advances equally everywhere. But in a river, there are fast zones and stagnant zones. That is a <strong>flow field</strong>.</p><p>The trick: instead of adding <code>T</code> directly, multiply it by a value that changes with position. <code>T * (0.5 + fb(p))</code>. Where noise is high, time runs fast. Where low, it nearly stops.</p><p><em>Every coordinate has its own velocity.</em></p><div class="glossary"><span class="glossary-label">Flow field</span>A field where each point has its own velocity. You modulate <code>T</code> with a spatial function. The result: motion that feels liquid.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.5</code> (base speed) to <code>0.0</code> — slow zones freeze. Change <code>p * 1.5</code> to <code>p * 4.</code> for smaller velocity zones.</span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float vel = 0.2 + fb(p * 1.5) * 0.8;\n  float localT = T * vel;\n  float w = fb(p * 2.5 + vec2(0., localT));\n  vec3 col = vec3(0.03, 0.01, 0.02);\n  col += vec3(0.9, 0.2, 0.05) * pow(w, 1.5) * vel;\n  col += vec3(1.0, 0.7, 0.15) * pow(w, 4.) * vel * 2.;\n  gl_FragColor = vec4(col, 1.);\n}'},
  { num:'07', title:{es:'Oscillator stack',en:'Oscillator stack'}, desc:{es:'Tres frecuencias que nunca se sincronizan. Movimiento infinito.',en:'Three frequencies that never sync. Infinite motion.'},
    explain: {
      es:'<p>Un <code>sin()</code> es predecible. Tres a frecuencias irracionales entre sí son <strong>impredecibles para siempre</strong>.</p><p><code>sin(T*0.3) + sin(T*0.17) + sin(T*0.07)</code>. Esas tres frecuencias nunca se sincronizan. El resultado: una señal que varía perpetuamente.</p><p><em>Tres relojes desincronizados. El caos controlado más elegante.</em></p><div class="glossary"><span class="glossary-label">Oscillator stack</span>Sumar múltiples osciladores a frecuencias que no son múltiplos entre sí. En síntesis de audio se llama <em>additive synthesis</em>. Tres osciladores bastan para romper cualquier ciclo.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Quita el tercer <code>sin()</code> — se siente más predecible. Cambia <code>0.07</code> a <code>0.3</code> — dos frecuencias iguales, el patrón se simplifica.</span></div>',
      en:'<p>One <code>sin()</code> is predictable. Three at mutually irrational frequencies are <strong>unpredictable forever</strong>.</p><p><code>sin(T*0.3) + sin(T*0.17) + sin(T*0.07)</code>. Those three frequencies never synchronize. The result: a signal that varies perpetually.</p><p><em>Three desynchronized clocks. The most elegant controlled chaos.</em></p><div class="glossary"><span class="glossary-label">Oscillator stack</span>Summing multiple oscillators at frequencies that are not multiples of each other. In audio synthesis it is called <em>additive synthesis</em>. Three oscillators are enough to break any cycle.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Remove the third <code>sin()</code> — it feels more predictable. Change <code>0.07</code> to <code>0.3</code> — two frequencies match, the pattern simplifies.</span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float ox = sin(T*0.3) * 0.3 + sin(T*0.17) * 0.15;\n  float oy = sin(T*0.23) * 0.3 + sin(T*0.07) * 0.15;\n  float warp = fb(p * 2. + vec2(ox, oy));\n  float amp = 0.5 + sin(T * 0.11) * 0.3;\n  float w = fb(p * 3. + warp * amp);\n  vec3 col = mix(vec3(0.08, 0.05, 0.2), vec3(0.9, 0.92, 0.95), pow(w, 1.5));\n  col += vec3(0.7, 0.75, 1.0) * pow(w, 4.) * 0.3;\n  col *= smoothstep(1.8, 0.1, length(p));\n  gl_FragColor = vec4(col, 1.);\n}'},
  { num:'08', title:{es:'Seamless loop',en:'Seamless loop'}, desc:{es:'La animación repite exacto. Loop perfecto.',en:'The animation repeats exactly. Perfect loop.'},
    explain: {
      es:'<p>A veces necesitas que la animación repita <strong>exactamente</strong> — un GIF, un loop para redes. Sin salto, sin corte.</p><p>La fórmula: <code>cos(T * 6.2831 / dur)</code> donde <code>dur</code> es la duración en segundos. <code>6.2831</code> es TAU (2*PI) — una vuelta completa.</p><p><em>El último frame es el primero. Sin corte. Sin salto.</em></p><div class="glossary"><span class="glossary-label">TAU / dur</span>Convierte tu tiempo en ángulo. Cuando <code>T = dur</code> el ángulo es TAU (vuelta completa). El coseno regresa al inicio. Loop cerrado.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>4.</code> (duración) a <code>2.</code> para un loop más rápido. A <code>8.</code> para uno lento. Siempre cierra perfecto.</span></div>',
      en:'<p>Sometimes you need the animation to repeat <strong>exactly</strong> — a GIF, a social media loop. No jump, no cut.</p><p>The formula: <code>cos(T * 6.2831 / dur)</code> where <code>dur</code> is the duration in seconds. <code>6.2831</code> is TAU (2*PI) — one full revolution.</p><p><em>The last frame is the first. No cut. No jump.</em></p><div class="glossary"><span class="glossary-label">TAU / dur</span>Converts your time to angle. When <code>T = dur</code> the angle is TAU (full revolution). Cosine returns to start. Closed loop.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>4.</code> (duration) to <code>2.</code> for a faster loop. To <code>8.</code> for a slow one. It always closes perfectly.</span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float ph = T * 6.2831 / 3.;\n  vec2 orbit = vec2(cos(ph)*0.3, sin(ph)*0.25);\n  float warp = fb(p * 2. + orbit);\n  float w = fb(p * 3. + warp * (0.6 + sin(ph*2.) * 0.3));\n  vec3 col = vec3(0.95, 0.2, 0.5) * pow(w, 1.5) * 1.5;\n  col += vec3(1.0, 0.6, 0.8) * pow(w, 4.) * 0.4;\n  col += vec3(0.03, 0.01, 0.05);\n  col *= smoothstep(1.6, 0.1, length(p));\n  gl_FragColor = vec4(col, 1.);\n}'},
  { num:'09', title:{es:'Rhythm',en:'Rhythm'}, desc:{es:'Pulsos con pico y descanso. Latido, no metrónomo.',en:'Pulses with peak and rest. Heartbeat, not metronome.'},
    explain: {
      es:'<p>Un <code>sin()</code> sube y baja parejo. Un <strong>pulso</strong> tiene un pico fuerte y luego descanso — como un latido.</p><p><em>pow(x, 8.) — todo se aplasta excepto el peak. Pulso quirúrgico.</em></p><p><code>pow(sin(T) * 0.5 + 0.5, 8.)</code> — normalizas el seno a 0-1, lo elevas a una potencia alta. Los valores cercanos a 1 sobreviven. Los demás se aplastan.</p><div class="glossary"><span class="glossary-label">pow() como shaper</span><code>pow(x, n)</code> donde <code>x</code> va de 0 a 1: potencias altas (<code>8., 16.</code>) concentran toda la energía en el peak. Es el truco para convertir cualquier onda en un pulso rítmico.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>8.</code> a <code>2.</code> — pulso suave. A <code>20.</code> — flash brevísimo. Cambia <code>T * 2.</code> a <code>T * 4.</code> para doble velocidad.</span></div>',
      en:'<p>A <code>sin()</code> rises and falls evenly. A <strong>pulse</strong> has a strong peak then rest — like a heartbeat.</p><p><em>pow(x, 8.) — everything crushes except the peak. Surgical pulse.</em></p><p><code>pow(sin(T) * 0.5 + 0.5, 8.)</code> — normalize the sine to 0-1, raise it to a high power. Values near 1 survive. Everything else gets crushed.</p><div class="glossary"><span class="glossary-label">pow() as shaper</span><code>pow(x, n)</code> where <code>x</code> goes from 0 to 1: high powers (<code>8., 16.</code>) concentrate all energy in the peak. The trick for turning any wave into a rhythmic pulse.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>8.</code> to <code>2.</code> — soft pulse. To <code>20.</code> — ultra brief flash. Change <code>T * 2.</code> to <code>T * 4.</code> for double speed.</span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float beat = pow(sin(T * 1.8) * 0.5 + 0.5, 6.);\n  float w = fb(p * 2.5 + beat * 0.5);\n  vec3 a = vec3(0.95, 0.8, 0.3);\n  vec3 b = vec3(0.15, 0.08, 0.03);\n  vec3 col = mix(b, a, w);\n  col *= 0.4 + beat * 1.2;\n  col += a * pow(w, 3.) * beat * 0.6;\n  col *= smoothstep(1.8, 0.1, length(p));\n  gl_FragColor = vec4(col, 1.);\n}'},
  { num:'10', title:{es:'Tu motion',en:'Your motion'}, desc:{es:'Combina todo. Tu coreografía.',en:'Combine everything. Your choreography.'},
    finale: true,

    celebrateText: {es:'Breathe, drift, phase, elastic, morph, flow, oscillators, loops, rhythm — ya no animas, <strong>coreografías</strong>. <em>Estamos construyendo más secciones.</em> Mientras tanto, sigue experimentando. No pares.',en:'Breathe, drift, phase, elastic, morph, flow, oscillators, loops, rhythm — you no longer animate, you <strong>choreograph</strong>. <em>We are building more sections.</em> Meanwhile, keep experimenting. Don\'t stop.'},
    explain: {
      es:'<p><em>Oscillators + elastic + beat. Tu coreografía a 60fps.</em></p><p>Todo junto. Cada bloque ya lo conoces:</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(T * 0.618)</code> &nbsp; breathe irracional (lección 01)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(T*0.3) + sin(T*0.17)</code> &nbsp; oscillator stack (lección 07)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">pow(sin(), 8.)</code> &nbsp; rhythm pulse (lección 09)</li></ul><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia las frecuencias de los osciladores. Cambia el <code>8.</code> del pow. Cambia las escalas. <em>Esta es tu coreografía.</em></span></div>',
      en:'<p><em>Oscillators + elastic + beat. Your choreography at 60fps.</em></p><p>Everything together. Every block is something you already know:</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(T * 0.618)</code> &nbsp; irrational breathe (lesson 01)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(T*0.3) + sin(T*0.17)</code> &nbsp; oscillator stack (lesson 07)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">pow(sin(), 8.)</code> &nbsp; rhythm pulse (lesson 09)</li></ul><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change the oscillator frequencies. Change the <code>8.</code> in pow. Change the scales. <em>This is your choreography.</em></span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float ox = sin(T*0.3) * 0.3 + sin(T*0.11) * 0.2;\n  float oy = sin(T*0.19) * 0.3 + sin(T*0.07) * 0.2;\n  float t = mod(T, 5.);\n  float elastic = exp(-t * 1.5) * sin(t * 10.) * 0.2;\n  float warp = fb(p * 2. + vec2(ox, oy + T * 0.08));\n  float beat = pow(sin(T * 2.) * 0.5 + 0.5, 10.);\n  float w = fb(p * 3. + warp * (0.5 + beat * 0.5 + elastic));\n  vec3 a = vec3(0.95, 0.3, 0.05);\n  vec3 b = vec3(1.0, 0.75, 0.2);\n  vec3 c = vec3(0.04, 0.02, 0.06);\n  vec3 col = mix(c, a, pow(w, 1.5));\n  col += b * pow(w, 3.) * (0.3 + beat * 0.7);\n  col *= smoothstep(1.8, 0.1, length(p));\n  gl_FragColor = vec4(col, 1.);\n}'},
  ],

  // ===== 01 =====
  { num:'01',
    title: { es: 'Hola, luz', en: 'Hello, light' },
    desc: { es: 'Un fragment. Millones de colores. Tu primera pieza.', en: 'One fragment. Millions of colors. Your first piece.' },
    welcome: true,
    iridescent: true,
    explain: {
      es: '<p><em>Tu primer pixel encendido. La GPU esperando instrucciones.</em></p><div class="glossary"><span class="glossary-label">¿Qué es un fragment?</span>Tu pantalla está hecha de millones de puntos de luz. La GPU los llama <em>fragments</em> — cada uno es un pedacito independiente de la imagen. <span class="gold">Tu pantalla tiene millones.</span> Un <em>fragment shader</em> es el programa que decide de qué color se enciende cada uno. Eso es lo que vas a escribir aquí.</div><p class="statement-hero">Lo que ves abajo es un solo fragment. Un shader le dice de qué color encenderse.</p><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>0.42</code> a cualquier número — prueba <code>0.1</code>, <code>0.5</code>, <code>0.9</code>. Cada número cambia el color. Después cambia el <code>0.05</code> a <code>0.2</code> para que se mueva más rápido.</span></div><div class="supernova"></div><div class="pulse-block"><span class="pulse-label">Pulse</span>Reemplaza todo el código con esto — ve cómo pulsa.<pre>void main(){&#10;  vec3 col = iri(T * 0.05 + 0.42);&#10;  col *= .5 + .5 * sin(T);&#10;  gl_FragColor = vec4(col, 1.);&#10;}</pre><p class="pulse-hint">¿Quieres que pulse más rápido? Cambia <code>T</code> por <code>T * 3.</code> — el punto después del 3 es importante. En shaders, los números siempre llevan punto: <code>3.</code> no <code>3</code></p></div>',
      en: '<p><em>Your first pixel lit. The GPU waiting for instructions.</em></p><div class="glossary"><span class="glossary-label">What is a fragment?</span>Your screen is made of millions of points of light. The GPU calls them <em>fragments</em> — each one is an independent piece of the image. <span class="gold">Your screen has millions.</span> A <em>fragment shader</em> is the program that decides what color each one lights up. That is what you are going to write here.</div><p class="statement-hero">What you see below is a single fragment. A shader tells it what color to light up.</p><div class="supernova"></div><div class="ref-block"><span class="ref-block-label">Reading the code</span><code>void main()</code> — the starting point. Every shader begins here.<br><code>vec3 col</code> — a variable that holds 3 numbers: red, green, blue.<br><code>iri()</code> — the color formula. It cycles through 7 colors.<br><code>T</code> — time in seconds. It keeps growing, so the color keeps changing.<br><code>0.05</code> — how fast the color shifts. Bigger = faster.<br><code>0.42</code> — the starting point in the color cycle.<br><code>gl_FragColor</code> — the final output. This is what paints the fragment.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change the <code>0.42</code> to any number — try <code>0.1</code>, <code>0.5</code>, <code>0.9</code>. Each number shifts the color. Then change <code>0.05</code> to <code>0.2</code> to make it move faster.</span></div><div class="supernova"></div><div class="pulse-block"><span class="pulse-label">Pulse</span>Replace all the code with this — watch it pulse.<pre>void main(){&#10;  vec3 col = iri(T * 0.05 + 0.42);&#10;  col *= .5 + .5 * sin(T);&#10;  gl_FragColor = vec4(col, 1.);&#10;}</pre><p class="pulse-hint">Want it faster? Change <code>T</code> to <code>T * 3.</code> — the dot after the 3 matters. In shaders, numbers always need a dot: <code>3.</code> not <code>3</code></p></div>'
    },
    code:'void main(){\n  vec3 col = iri(T * 0.05 + 0.42);\n  col *= 0.85 + 0.15 * sin(T * 0.618);\n  gl_FragColor = vec4(col, 1.);\n}'

  // ===== 02 =====
  { num:'02',
    title: { es: 'Los tres números', en: 'The three numbers' },
    desc: { es: 'Rojo, verde, azul. Así se hace cualquier color.', en: 'Red, green, blue. That is how you make any color.' },
    explain: {
      es: '<p>Cualquier color que veas en una pantalla está hecho de <strong>tres números</strong>: qué tanto rojo, qué tanto verde, qué tanto azul. <em>R, G, B.</em></p><p>Si los tres están al máximo (1, 1, 1), tienes blanco. Si los tres están apagados (0, 0, 0), tienes negro. Si solo el rojo está prendido (1, 0, 0), tienes rojo puro.</p><div class="glossary"><span class="glossary-label">¿Por qué tres?</span>Porque tu pantalla está hecha de tres tipos de luces: rojas, verdes y azules. Es como mezclar luces en vez de mezclar pintura — mezclando esos tres puedes hacer <em>cualquier</em> color del mundo.</div><p><em>Tres números entre 0 y 1. Todo el espectro visible.</em></p><p>Nota una cosa rara: escribimos <code>1.</code> con punto, no <code>1</code>. Eso es porque la GPU distingue entre números enteros y decimales. Aquí siempre usamos decimales — el punto es obligatorio.</p><div class="try-it"><span class="try-it-icon">Prueba</span><span>Intenta hacer <em>amarillo</em>. Pista: amarillo es rojo + verde, sin azul. Después intenta <em>morado</em>. Pista: rojo + azul, sin verde.</span></div>',
      en: '<p>Any color you see on a screen is made of <strong>three numbers</strong>: how much red, how much green, how much blue. <em>R, G, B.</em></p><p>If all three are at maximum (1, 1, 1), you get white. If all three are off (0, 0, 0), you get black. If only red is on (1, 0, 0), you get pure red.</p><div class="glossary"><span class="glossary-label">Why three?</span>Because your screen is made of three types of lights: red, green, and blue. It is like mixing lights instead of mixing paint — by combining those three you can make <em>any</em> color in the world.</div><p><em>Three numbers between 0 and 1. The entire visible spectrum.</em></p><p>Notice something odd: we write <code>1.</code> with a dot, not <code>1</code>. That is because the GPU treats whole numbers and decimals differently. Here we always use decimals — the dot is mandatory.</p><div class="try-it"><span class="try-it-icon">Try</span><span>Try making <em>yellow</em>. Hint: yellow is red + green, no blue. Then try <em>purple</em>. Hint: red + blue, no green.</span></div>'

    code:'void main(){\n  float r = 0.95;\n  float g = 0.55;\n  float b = 0.15;\n  gl_FragColor = vec4(r, g, b, 1.);\n}'

    explain: {
      es: '<p>Los números de los colores se pueden <strong>sumar, restar, multiplicar y dividir</strong>. Igual que los números que ya conoces.</p><p>Si multiplicas un color por <em>0.5</em>, queda más oscuro (la mitad de luz). Si lo multiplicas por <em>2.</em>, queda más brillante. Si le restas <em>0.3</em>, le quitas un poco de cada canal.</p><p><em>Matemáticas que se ven.</em></p><div class="glossary"><span class="glossary-label">vec3</span>Un <code>vec3</code> es como un <em>paquete con tres números adentro</em>. La usamos para guardar un color (R, G, B). Cuando le sumas otro paquete, la GPU opera los tres al mismo tiempo.</div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>0.5</code> por <code>0.2</code> para ver el color más oscuro. O por <code>1.5</code> para verlo brillando.</span></div>',

    explain: {
      es: '<p>Cada frag de la pantalla tiene una <strong>posición</strong>: dos números, X y Y. X es horizontal (izquierda-derecha), Y es vertical (abajo-arriba). Como en el plano cartesiano.</p><p><em>Posición X, posición Y. El frag sabe. Your decision.</em></p><p>Lo importante: <em>cada frag ejecuta el código por separado</em>, pero conoce su propia posición. El frag de la esquina inferior izquierda sabe que es (0, 0). El de la esquina superior derecha sabe que es el último.</p><div class="glossary"><span class="glossary-label">vec2</span>Si <code>vec3</code> es un paquete de 3 números, <code>vec2</code> es un paquete de 2. La usamos para posiciones (X, Y). Aquí <code>p</code> es la posición del frag, dividida entre el tamaño de la pantalla — para que vaya de 0 a 1 en lugar de 0 a 1920.</div><p>Si pones <code>p.x</code> como rojo, el rojo aumenta hacia la derecha. Si pones <code>p.y</code> como verde, el verde aumenta hacia arriba. <em>El color es la posición.</em></p><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>p.x</code> por <code>p.y</code> en la primera línea. ¿Qué pasa? Ahora pon <code>p.x</code> en los tres lugares. ¿Y ahora?</span></div>',
      en: '<p>Every frag on the screen has a <strong>position</strong>: two numbers, X and Y. X is horizontal (left-right), Y is vertical (bottom-top). Just like the coordinate plane.</p><p><em>Position X, position Y. The frag knows. Your decision.</em></p><p>Here is the key idea: <em>every frag runs the code on its own</em>, but it knows its own position. The frag at the bottom-left corner knows it is (0, 0). The one at the top-right knows it is the last one.</p><div class="glossary"><span class="glossary-label">vec2</span>If <code>vec3</code> is a pack of 3 numbers, <code>vec2</code> is a pack of 2. We use it for positions (X, Y). Here <code>p</code> is the frag position divided by the screen size — so it goes from 0 to 1 instead of 0 to 1920.</div><p>If you put <code>p.x</code> as red, the red increases to the right. Put <code>p.y</code> as green and the green increases upward. <em>The color is the position.</em></p><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>p.x</code> to <code>p.y</code> on the first line. What happens? Now put <code>p.x</code> in all three spots. And now?</span></div>'

  // ===== 05 =====
  { num:'05',
    title: { es: 'El degradé', en: 'The gradient' },
    desc: { es: 'Una posición controla un color. Ya está, eres artista.', en: 'A position controls a color. There you go, you are an artist.' },
    explain: {
      es: '<p>Esto es la <strong>idea más poderosa</strong> que vas a aprender hoy: <em>la posición puede convertirse en color</em>. Y al revés: <em>las matemáticas que apliques a la posición se ven como imagen</em>.</p><div class="punch-gradient-demo" data-text="La posición se convierte en imagen. Bienvenido a los shaders."><canvas></canvas><div class="punch-gradient-letters"></div></div><p>Un degradé es solo eso: tomas <code>p.x</code> (la posición horizontal) y la usas como un canal de color. El frag de la izquierda tiene <code>p.x = 0</code>, el de la derecha tiene <code>p.x = 1</code>. Si lo conectas al rojo, queda un degradé de negro a rojo.</p><div class="glossary"><span class="glossary-label">mix()</span>La función <code>mix(A, B, t)</code> "mezcla" dos cosas. Cuando <code>t</code> es 0, te da A puro. Cuando es 1, te da B puro. Cuando es 0.5, te da la mitad de cada uno. Es como un slider.</div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>p.x</code> por <code>p.y</code> para que el degradé sea vertical. Cambia los colores <code>vec3(1.,0.3,0.2)</code> y <code>vec3(0.2,0.5,1.)</code> a otros que tú elijas.</span></div>',
      en: '<p>This is the <strong>most powerful idea</strong> you will learn today: <em>position can become color</em>. And the other way around: <em>the math you apply to the position shows up as an image</em>.</p><div class="punch-gradient-demo" data-text="Position becomes image. Welcome to shaders."><canvas></canvas><div class="punch-gradient-letters"></div></div><p>A gradient is just that: you take <code>p.x</code> (the horizontal position) and use it as a color channel. The frag on the left has <code>p.x = 0</code>, the one on the right has <code>p.x = 1</code>. Connect it to red, and you get a gradient from black to red.</p><div class="glossary"><span class="glossary-label">mix()</span>The function <code>mix(A, B, t)</code> "blends" two things. When <code>t</code> is 0, you get pure A. When it is 1, you get pure B. When it is 0.5, you get half and half. It is like a slider.</div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>p.x</code> to <code>p.y</code> to make the gradient vertical. Change the colors <code>vec3(1.,0.3,0.2)</code> and <code>vec3(0.2,0.5,1.)</code> to anything you like.</span></div>'

  // ===== 06 =====
  { num:'06',

    desc: { es: 'El origin point de cada shader.', en: 'The origin point of every shader.' },
    explain: {
      es: '<p>Hasta ahora <code>p</code> iba de <em>0 (esquina)</em> a <em>1 (esquina opuesta)</em>. Eso es útil para degradés, pero no para cosas centradas, como un círculo en el medio.</p><p><em>(0, 0). Ground zero. Todo se mide desde aquí.</em></p><p>Hay una fórmula que todos los shaders usan al inicio. <em>Piénsalo como afinar tu instrumento antes de tocar</em>:</p><div class="glossary"><span class="glossary-label">La fórmula del centro</span><code>vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);</code><br><br>Lo que hace: el centro de la pantalla ahora es <em>(0,0)</em>. La esquina superior derecha es <em>(1,1)</em>. La inferior izquierda es <em>(-1,-1)</em>. Y funciona aunque la pantalla sea cuadrada o alargada — no se distorsiona.</div><p>No tienes que entender la fórmula completa todavía. Es la primera línea de casi cualquier shader que escribas.</p><div class="try-it"><span class="try-it-icon">Prueba</span><span>Quita el <code>2.*</code> y la <code>- R</code> y el <code>/ min(...)</code>. Es decir, deja solo <code>vec2 p = gl_FragCoord.xy / R;</code> ¿Ves cómo la "X" se va a la esquina? Ahora vuelve a la versión centrada.</span></div>',
      en: '<p>So far <code>p</code> went from <em>0 (corner)</em> to <em>1 (opposite corner)</em>. That is useful for gradients, but not for centered things like a circle in the middle.</p><p><em>(0, 0). Ground zero. Everything is measured from here.</em></p><p>There is a formula that almost every shader uses at the start. <em>Think of it as tuning your instrument before you play</em>:</p><div class="glossary"><span class="glossary-label">The center formula</span><code>vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);</code><br><br>What it does: the center of the screen is now <em>(0,0)</em>. The top-right corner is <em>(1,1)</em>. The bottom-left is <em>(-1,-1)</em>. And it works whether the screen is square or wide — no distortion.</div><p>You do not need to understand the full formula yet. It is the first line of almost every shader you write.</p><div class="try-it"><span class="try-it-icon">Try</span><span>Remove the <code>2.*</code> and the <code>- R</code> and the <code>/ min(...)</code>. That is, leave only <code>vec2 p = gl_FragCoord.xy / R;</code> See how the "X" moves to the corner? Now go back to the centered version.</span></div>'
    },
    code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  vec3 col = vec3(p.x * 0.5 + 0.5, p.y * 0.5 + 0.5, 0.4);\n  col *= 0.9 + 0.1 * (1.0 - length(p));\n  gl_FragColor = vec4(col, 1.);\n}'

      es: '<p>Hasta ahora todo era <em>estático</em>. Ahora le agregamos <strong>movimiento</strong>.</p><p><em>Un contador que nunca se detiene. Tu primer input live.</em></p><p>Hay una variable lista para ti: <code>T</code>. Es el tiempo en segundos desde que cargó la página. Va creciendo: <em>0.1, 0.2, 0.3...</em> y nunca para.</p><p>Como cualquier número, lo puedes usar en tus colores. Si haces que el rojo dependa de <code>T</code>, el rojo va a cambiar con el tiempo.</p><div class="glossary"><span class="glossary-label">¿Por qué sin(T)?</span>Si pusieras solo <code>T</code>, el color crecería para siempre y se quedaría en blanco. Por eso lo "envolvemos" con <code>sin()</code>, que oscila entre -1 y 1 eternamente. La fórmula <code>.5 + .5 * sin(T)</code> hace que oscile entre 0 y 1 — perfecto para colores.</div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>sin(T)</code> por <code>sin(T*5.)</code> para que sea más rápido. O por <code>sin(T*.2)</code> para más lento.</span></div>',
      en: '<p>Until now everything was <em>static</em>. Now we add <strong>motion</strong>.</p><p><em>A counter that never stops. Your first live input.</em></p><p>There is a variable ready for you: <code>T</code>. It is the time in seconds since the page loaded. It keeps growing: <em>0.1, 0.2, 0.3...</em> and it never stops.</p><p>Like any number, you can use it in your colors. If you make the red depend on <code>T</code>, the red will change over time.</p><div class="glossary"><span class="glossary-label">Why sin(T)?</span>If you just used <code>T</code> by itself, the color would grow forever and stay white. So we "wrap" it with <code>sin()</code>, which oscillates between -1 and 1 forever. The formula <code>.5 + .5 * sin(T)</code> makes it oscillate between 0 and 1 — perfect for colors.</div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>sin(T)</code> to <code>sin(T*5.)</code> to make it faster. Or <code>sin(T*.2)</code> to make it slower.</span></div>'

var VERT = 'attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}';
var HEAD = [
  'precision mediump float;',
  'uniform float T;', 'uniform vec2 R;', 'uniform vec2 M;',
  'uniform float U;',
  '',
  '// Iridescent color cycle — 7 spectral anchors',
  'vec3 iri(float t){',
  '  vec3 d=vec3(.83,.65,.30),me=vec3(.97,.78,.55),pe=vec3(.95,.70,.60),',
  '       la=vec3(.77,.63,1.),ro=vec3(.95,.78,.88),ve=vec3(.65,.85,.72),mo=vec3(.55,.45,.80);',
  '  t=fract(t);float s=t*7.;int i=int(floor(s));float f=fract(s);f=f*f*(3.-2.*f);',
  '  vec3 a,b;',
  '  if(i==0){a=d;b=me;}else if(i==1){a=me;b=pe;}else if(i==2){a=pe;b=la;}',
  '  else if(i==3){a=la;b=ro;}else if(i==4){a=ro;b=ve;}else if(i==5){a=ve;b=mo;}',
  '  else{a=mo;b=d;}',
  '  return mix(a,b,f);',
  '}',
  '',
  '// Hash — pseudo-random from 2D',
  'float h2(vec2 p){',
  '  vec3 p3=fract(vec3(p.xyx)*0.1031);',
  '  p3+=dot(p3,p3.yzx+33.33);',
  '  return fract((p3.x+p3.y)*p3.z);',
  '}',
  '',
  '// Value noise — smooth random',
  'float n2(vec2 p){',
  '  vec2 i=floor(p),f=fract(p);',
  '  f=f*f*f*(f*(f*6.-15.)+10.);',
  '  return mix(mix(h2(i),h2(i+vec2(1,0)),f.x),',
  '             mix(h2(i+vec2(0,1)),h2(i+vec2(1,1)),f.x),f.y);',
  '}',
  '',
  '// FBM — layered noise',
  'float fb(vec2 p){',
  '  float v=0.,a=.5;',
  '  mat2 r=mat2(.8,.6,-.6,.8);',
  '  for(int i=0;i<4;i++){v+=a*n2(p);p=r*p*2.07;a*=.5;}',
  '  return v;',
  '}',
].join('\n');

// ============================================================
// GLSL syntax highlighter — Opalo palette
// ============================================================
var GLSL_KW = /^(void|return|if|else|for|while|break|continue|discard|precision|mediump|highp|lowp|in|out|inout|uniform|attribute|varying|const)$/;
var GLSL_TYPE = /^(float|int|bool|vec2|vec3|vec4|mat2|mat3|mat4|sampler2D|ivec2|ivec3|ivec4|bvec2|bvec3|bvec4)$/;
var GLSL_FN = /^(sin|cos|tan|asin|acos|atan|pow|exp|log|sqrt|abs|sign|floor|ceil|fract|mod|min|max|clamp|mix|step|smoothstep|length|distance|dot|cross|normalize|reflect|refract|texture2D|iri|fb|n2|h2)$/;

function highlightGLSL(src) {
  var out = '';
  var i = 0;
  while (i < src.length) {
    // Line comment
    if (src[i] === '/' && src[i+1] === '/') {
      var end = src.indexOf('\n', i);
      if (end === -1) end = src.length;
      out += '<span class="sh-comment">' + esc(src.slice(i, end)) + '</span>';
      i = end;
      continue;
    }
    // Number
    if (/[0-9]/.test(src[i]) || (src[i] === '.' && i+1 < src.length && /[0-9]/.test(src[i+1]))) {
      var start = i;
      while (i < src.length && /[0-9.]/.test(src[i])) i++;
      out += '<span class="sh-num">' + esc(src.slice(start, i)) + '</span>';
      continue;
    }
    // Word
    if (/[a-zA-Z_]/.test(src[i])) {
      var start = i;
      while (i < src.length && /[a-zA-Z0-9_]/.test(src[i])) i++;
      var w = src.slice(start, i);
      if (GLSL_KW.test(w)) out += '<span class="sh-kw">' + esc(w) + '</span>';
      else if (GLSL_TYPE.test(w)) out += '<span class="sh-type">' + esc(w) + '</span>';
      else if (GLSL_FN.test(w)) out += '<span class="sh-fn">' + esc(w) + '</span>';
      else out += '<span class="sh-plain">' + esc(w) + '</span>';
      continue;
    }
    // Parens/braces
    if ('(){}[]'.indexOf(src[i]) !== -1) {
      out += '<span class="sh-paren">' + esc(src[i]) + '</span>';
      i++; continue;
    }
    // Semicolon
    if (src[i] === ';') {
      out += '<span class="sh-semi">;</span>';
      i++; continue;
    }
    // Operators
    if ('=+-*/<>!&|^~%'.indexOf(src[i]) !== -1) {
      out += '<span class="sh-op">' + esc(src[i]) + '</span>';
      i++; continue;
    }
    // Newline and whitespace preserved
    out += esc(src[i]);
    i++;
  }
  return out;
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function syncHighlight(textarea, pre) {
  pre.innerHTML = highlightGLSL(textarea.value) + '\n';
  pre.scrollTop = textarea.scrollTop;
}

function el(tag, attrs, kids) {
  var e = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.indexOf('on') === 0) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if (kids) {
    if (typeof kids === 'string') e.textContent = kids;
    else kids.forEach(function(c){ if (c) e.appendChild(c); });
  }
  return e;
}

  document.title = lang === 'en' ? 'WoGL Learn · Start Here' : 'WoGL Aprende · Start Here';
  // Destroy current renderer before rebuilding
  if (currentRenderer) currentRenderer.destroy();
  // Rebuild everything
  updateLangToggle();
  updateSidebarText();
  showContext(currentContext);
}

function extractShaderColor(code) {
  if (!code) return null;
  var candidates = [];
  var m;
  // vec3(r, g, b)
  var re3 = /vec3\s*\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*\)/g;
  while ((m = re3.exec(code)) !== null) {
    candidates.push([parseFloat(m[1]), parseFloat(m[2]), parseFloat(m[3])]);
  }
  // vec4(r, g, b, a) — grab the rgb
  var re4 = /vec4\s*\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*[\d.]+\s*\)/g;
  while ((m = re4.exec(code)) !== null) {
    candidates.push([parseFloat(m[1]), parseFloat(m[2]), parseFloat(m[3])]);
  }
  // float r = X; float g = Y; float b = Z;
  var fr = code.match(/float\s+r\s*=\s*([\d.]+)/);
  var fg = code.match(/float\s+g\s*=\s*([\d.]+)/);
  var fb = code.match(/float\s+b\s*=\s*([\d.]+)/);
  if (fr && fg && fb) {
    candidates.push([parseFloat(fr[1]), parseFloat(fg[1]), parseFloat(fb[1])]);
  }
  // iri() — WoGL iridescent, assign gold
  if (code.indexOf('iri(') !== -1 && candidates.length === 0) {
    candidates.push([0.91, 0.78, 0.60]);
  }
  var best = null;
  var bestLum = 0;
  for (var i = 0; i < candidates.length; i++) {
    var r = Math.round(Math.min(candidates[i][0], 1) * 255);
    var g = Math.round(Math.min(candidates[i][1], 1) * 255);
    var b = Math.round(Math.min(candidates[i][2], 1) * 255);
    var lum = r * 0.299 + g * 0.587 + b * 0.114;
    if (lum > bestLum && lum >= 60) {
      bestLum = lum;
      best = 'rgb(' + r + ',' + g + ',' + b + ')';
    }
  }
  return best;
}

function buildMobileSecTabs() {
  var c = document.getElementById('mobileSecTabs');
  if (!c) return;
  c.innerHTML = '';
  SECTIONS.forEach(function(sec) {
    var tab = el('div', { class:'mobile-sec-tab' + (sec.num === currentSection ? ' active' : '') }, t(sec.name));
    tab.addEventListener('click', function() {
      openMobileOverlay(sec.num);
      tab.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
    });
    c.appendChild(tab);
  });
}

function buildDrawers() {
  var container = document.getElementById('drawerList');
  container.innerHTML = '';
  SECTIONS.forEach(function(sec, sIdx) {
    var isOpen = sec.num === currentSection;
    var lessons = sec.num === '00' ? LESSONS : (SECTION_LESSONS[sec.num] || []);
    var drawer = el('div', { class:'drawer' + (isOpen ? ' open' : ''), 'data-section':sec.num });

    var head = el('div', { class:'drawer-head' }, [
      el('div', { class:'drawer-num', style:'color:' + SECTION_ACCENTS[sec.num] }, sec.num),
      el('div', { class:'drawer-name' }, t(sec.name)),
      el('div', { class:'drawer-progress' }, lessons.length + ''),
      el('div', { class:'drawer-chevron' }, '\u203A')
    ]);

    head.addEventListener('click', function() {
      if (isMobile()) {
        openMobileOverlay(sec.num);
        return;
      }
      var wasOpen = drawer.classList.contains('open');
      container.querySelectorAll('.drawer').forEach(function(d) { d.classList.remove('open'); });
      if (!wasOpen) {
        drawer.classList.add('open');
        switchSection(sec.num);
      }
    });

    var body = el('div', { class:'drawer-body' });
    var lessonList = el('div', { class:'drawer-lessons' });

    lessons.forEach(function(lesson, lIdx) {
      var shaderCol = extractShaderColor(lesson.code);
      var idxEl = el('span', { class:'lesson-index' }, lesson.num || String(lIdx + 1).padStart(2, '0'));
      if (shaderCol) idxEl.style.color = shaderCol;
      var item = el('div', { class:'lesson-item' + (isOpen && lIdx === currentIdx ? ' active' : ''), 'data-section':sec.num, 'data-lesson':lIdx+'' }, [
        idxEl,
        el('span', { class:'lesson-name' }, t(lesson.title)),
        el('span', { class:'lesson-check' }, (sec.num === currentSection && visited.has(lIdx)) ? '\u2713' : '')
      ]);
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        if (sec.num !== currentSection) {
          currentSection = sec.num;
          currentIdx = 0;
          visited = new Set();
          introShown = false;
          document.documentElement.style.setProperty('--accent', SECTION_ACCENTS[sec.num]);
        }
        goTo(lIdx);
      });
      lessonList.appendChild(item);
    });

    body.appendChild(lessonList);
    drawer.appendChild(head);
    drawer.appendChild(body);
    container.appendChild(drawer);
  });
}

function getActiveLessons() {

  currentContext = ctx;
  var drawerList = document.getElementById('drawerList');
  var practiceList = document.getElementById('sideLessonList');

  document.querySelectorAll('.side-top-tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.ctx === ctx);
  });

  if (ctx === 'learn') {
    drawerList.style.display = '';
    practiceList.style.display = 'none';
    buildDrawers();
    buildMobileSecTabs();

    practiceList.style.display = 'flex';

      var item = el('div', { class:'side-create-item' + (activePracticeGenerator === ci.id ? ' active' : '') }, [
        el('div', { class:'side-create-name' }, t(ci.name)),

      ]);

        practiceList.querySelectorAll('.side-create-item').forEach(function(el) { el.classList.remove('active'); });

    else if (activePracticeGenerator === 'challenge') renderPracticeChallenge();
  }
}

function buildPracticeSandbox(main, code, onRecompile) {
  var sandbox = el('div', { class:'sandbox' });
  var canvasWrap = el('div', { class:'canvas-wrap' });
  var canvas = el('canvas', {});
  canvasWrap.appendChild(canvas);
  canvasWrap.appendChild(el('div', { class:'badge' }, 'live \u00B7 webgl'));
  var editorDiv = el('div', { class:'editor' });
  var editorWrap = el('div', { class:'editor-wrap' });
  var hlPre = el('pre', { class:'editor-highlight' });
  var textarea = el('textarea', { spellcheck:'false' });
  textarea.value = code;
  editorWrap.appendChild(hlPre);
  editorWrap.appendChild(textarea);
  editorDiv.appendChild(editorWrap);
  sandbox.appendChild(canvasWrap);
  sandbox.appendChild(editorDiv);
  main.appendChild(el('div', { class:'sandbox-label' }, '\u2193 Edit the code and see'));
  main.appendChild(sandbox);

  syncHighlight(textarea, hlPre);

  var renderer = createRenderer(canvas, code, null, null);
  currentRenderer = renderer;

  var debounce;
  textarea.addEventListener('input', function() {
    syncHighlight(textarea, hlPre);
    clearTimeout(debounce);
    debounce = setTimeout(function() {
      if (renderer) renderer.recompile(textarea.value);
    }, 400);
  });
  textarea.addEventListener('scroll', function() { hlPre.scrollTop = textarea.scrollTop; });

  return { canvas: canvas, textarea: textarea, hlPre: hlPre, renderer: renderer };
}

function buildRemixModeA_starter(shader) {
  return 'void main(){\n  vec2 p = (2.0*gl_FragCoord.xy - R) / min(R.x,R.y);\n\n  // Add your force here\n\n  ' + shader.code + '\n\n  gl_FragColor = vec4(col, 1.0);\n}';
}
function buildRemixModeA_solution(shader, force) {
  var lines = ['void main(){', '  vec2 p = (2.0*gl_FragCoord.xy - R) / min(R.x,R.y);'];
  if (force.code_pre) { lines.push(''); force.code_pre.split('\n').forEach(function(l) { lines.push('  ' + l); }); }
  lines.push('');
  shader.code.split('\n').forEach(function(l) { lines.push('  ' + l); });
  if (force.code_post) { lines.push(''); force.code_post.split('\n').forEach(function(l) { lines.push('  ' + l); }); }
  lines.push('', '  gl_FragColor = vec4(col, 1.0);', '}');
  return lines.join('\n');
}
function buildRemixModeB_starter(force) {
  var lines = ['void main(){', '  vec2 p = (2.0*gl_FragCoord.xy - R) / min(R.x,R.y);'];
  if (force.code_pre) { lines.push(''); force.code_pre.split('\n').forEach(function(l) { lines.push('  ' + l); }); }
  lines.push('', '  // Build your shader here', '  vec3 col = vec3(0.0);');
  if (force.code_post) { lines.push(''); force.code_post.split('\n').forEach(function(l) { lines.push('  ' + l); }); }
  lines.push('', '  gl_FragColor = vec4(col, 1.0);', '}');
  return lines.join('\n');
}

function getChallengePool(type) {
  if (type === 'material') return PRACTICE_MATERIALS;
  if (type === 'force') return CHALLENGE_FORCES;
  if (type === 'light') return CHALLENGE_LIGHTS;
  if (type === 'shape') return CHALLENGE_SHAPES;
}
function getChallengeTagClass(type) { return type === 'material' ? 'mat' : type; }
function getChallengeSpanClass(type) {
  var m = { material:'ch-material', force:'ch-force', light:'ch-light', shape:'ch-shape' };
  return m[type];
}
function buildChallengeSolution(items) {
  var pre = [], core = '', post = [];
  items.forEach(function(it) {
    if (it.type === 'force') {
      if (it.item.code_pre) pre.push(it.item.code_pre);
      if (it.item.code_post) post.push(it.item.code_post);
    } else if (it.type === 'light') {
      if (it.item.code_post) post.push(it.item.code_post);
    } else {
      core = it.item.code_core;
    }
  });
  var lines = ['void main(){', '  vec2 p = (2.0*gl_FragCoord.xy - R) / min(R.x,R.y);'];
  if (pre.length) { lines.push(''); pre.forEach(function(p) { lines.push('  ' + p); }); }
  lines.push('');
  core.split('\n').forEach(function(l) { lines.push('  ' + l); });
  if (post.length) { lines.push(''); post.forEach(function(p) { p.split('\n').forEach(function(l) { lines.push('  ' + l); }); }); }
  lines.push('', '  gl_FragColor = vec4(col, 1.0);', '}');
  return lines.join('\n');
}
function buildChallengeHints(items) {
  function ref(it) { return ' <span class="hint-lesson-ref">(' + it.item.lesson + ')</span>'; }
  return [
    items.map(function(it) { return '<strong>' + it.item.word + '</strong>' + ref(it) + ' \u2014 ' + it.item.h1; }).join('<br><br>'),
    items.map(function(it) { return '<strong>' + it.item.word + '</strong>' + ref(it) + ' \u2014 ' + it.item.h2; }).join('<br><br>'),
    items.map(function(it) { return '<strong>' + it.item.word + '</strong>' + ref(it) + ' \u2014 ' + it.item.h3; }).join('<br><br>'),
  ];
}

// ============================================================
// WebGL renderer
// ============================================================
function createRenderer(canvas, code, statusEl, errEl) {
  var gl = canvas.getContext('webgl', { antialias:true, alpha:false });
  if (!gl) return null;
  var prog = null, uT, uR, uM, uU;
  var userUniformValue = 0.42;
  var dpr = Math.max(window.devicePixelRatio || 1, window.innerWidth < 768 ? 1.25 : 1.5);
  var mouseX = 0.5, mouseY = 0.5;
  var paused = false, isVisible = true, isInViewport = true;
  var FPS = 30, FRAME = 1000/FPS, lastDraw = 0;
  var startTime = performance.now();

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  function recompile(src) {
    var fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, HEAD + '\n' + src);
    gl.compileShader(fs);
    if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
      var err = gl.getShaderInfoLog(fs); gl.deleteShader(fs);
      if (statusEl) { statusEl.textContent = 'error'; statusEl.classList.add('error'); }
      if (errEl) { errEl.textContent = err; errEl.classList.add('show'); }
      return false;
    }
    var vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, VERT); gl.compileShader(vs);
    var newProg = gl.createProgram();
    gl.attachShader(newProg, vs); gl.attachShader(newProg, fs);
    gl.bindAttribLocation(newProg, 0, 'a');
    gl.linkProgram(newProg);
    if (prog) gl.deleteProgram(prog);
    prog = newProg;
    gl.useProgram(prog);
    uT = gl.getUniformLocation(prog, 'T');
    uR = gl.getUniformLocation(prog, 'R');
    uM = gl.getUniformLocation(prog, 'M');
    uU = gl.getUniformLocation(prog, 'U');
    if (statusEl) { statusEl.textContent = t(UI.editorCompiled); statusEl.classList.remove('error'); }
    if (errEl) errEl.classList.remove('show');
    return true;
  }
  recompile(code);

  function resize() {
    var rect = canvas.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  canvas.addEventListener('mousemove', function(e){
    var rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) / rect.width;
    mouseY = 1 - (e.clientY - rect.top) / rect.height;
  });
  document.addEventListener('visibilitychange', function(){ isVisible = !document.hidden; });
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(es){ isInViewport = es[0].isIntersecting; }, { threshold:0.01 });
    obs.observe(canvas);
  }

  var rafId;
  function frame(now) {
    rafId = requestAnimationFrame(frame);
    if (paused || !isVisible || !isInViewport || !prog) return;
    if (now - lastDraw < FRAME) return;
    lastDraw = now;
    gl.uniform1f(uT, (now - startTime) * 0.001);
    gl.uniform2f(uR, canvas.width, canvas.height);
    gl.uniform2f(uM, mouseX, mouseY);
    if (uU) gl.uniform1f(uU, userUniformValue);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  rafId = requestAnimationFrame(frame);

  return {
    recompile: recompile,
    setU: function(v){ userUniformValue = v; },
    destroy: function(){
      paused = true;
      cancelAnimationFrame(rafId);
      if (prog) { gl.deleteProgram(prog); prog = null; }
      var ext = gl.getExtension('WEBGL_lose_context');
      if (ext) ext.loseContext();
    }
  };
}

// ============================================================
// Background FBM — silky mantle
// ============================================================
function initBgFbm() {
  var wrap = document.getElementById('bgFbm');
  if (!wrap) return;
  var canvas = wrap.querySelector('canvas');
  var gl = canvas.getContext('webgl', { antialias:false, alpha:false });
  if (!gl) return;

  var dpr = Math.min(window.devicePixelRatio || 1, window.innerWidth < 768 ? 1.25 : 1.5);

  var vsrc = 'attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}';
  var fsrc = [
    'precision mediump float;',
    'uniform float T;',
    'uniform vec2 R;',
    '',
    'float h(vec2 p){',
    '  vec3 p3=fract(vec3(p.xyx)*0.1031);',
    '  p3+=dot(p3,p3.yzx+33.33);',
    '  return fract((p3.x+p3.y)*p3.z);',
    '}',
    'float n(vec2 p){',
    '  vec2 i=floor(p),f=fract(p);',
    '  f=f*f*f*(f*(f*6.-15.)+10.);',
    '  return mix(mix(h(i),h(i+vec2(1,0)),f.x),',
    '             mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);',
    '}',
    'float fb(vec2 p){',
    '  float v=0.,a=.5; mat2 r=mat2(.8,.6,-.6,.8);',
    '  for(int i=0;i<5;i++){v+=a*n(p);p=r*p*2.;a*=.5;}',
    '  return v;',
    '}',
    'void main(){',
    '  vec2 uv=gl_FragCoord.xy/R;',
    '  uv.x*=R.x/R.y;',
    '  vec2 l1=vec2(0.4+sin(T/19.0)*0.35,0.45+sin(T/27.0)*0.35);',
    '  vec2 l2=vec2(0.6+sin(T/23.0)*0.35,0.55+cos(T/31.0)*0.35);',
    '  float s1=exp(-dot(uv-l1,uv-l1)*2.8)*(0.7+0.3*sin(T*0.618));',
    '  float s2=exp(-dot(uv-l2,uv-l2)*2.8)*(0.7+0.3*sin(T*0.437));',
    '  vec3 col=vec3(0.003,0.005,0.016);',
    '  col+=vec3(0.008,0.02,0.06)*s1;',
    '  col+=vec3(0.005,0.028,0.045)*s2;',
    '  col+=vec3(0.006,0.018,0.04)*s1*s2*3.0;',
    '  gl_FragColor=vec4(col,1.0);',
    '}',
  ].join('\n');

  var vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, vsrc); gl.compileShader(vs);
  var fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, fsrc); gl.compileShader(fs);
  if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
    console.warn('BG FBM compile error:', gl.getShaderInfoLog(fs));
    return;
  }
  var prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.bindAttribLocation(prog, 0, 'a');
  gl.linkProgram(prog); gl.useProgram(prog);

  var uT = gl.getUniformLocation(prog, 'T');
  var uR = gl.getUniformLocation(prog, 'R');

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  function resize() {
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  var FPS = 30, FRAME = 1000/FPS, lastDraw = 0;
  var startTime = performance.now();
  var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function frame(now) {
    requestAnimationFrame(frame);
    if (reducedMotion || document.hidden) return;
    if (now - lastDraw < FRAME) return;
    lastDraw = now;
    gl.uniform1f(uT, (now - startTime) * 0.001);
    gl.uniform2f(uR, canvas.width, canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  requestAnimationFrame(frame);
}

var _tiltRaf = null;
function initCardTilt() {
  var selectors = '.welcome-banner, .tips-banner, .glossary, .try-it, .pulse-block, .ref-block, .pw-mode-card, .celebrate, .hint-drawer';
  var targets = document.querySelectorAll(selectors);
  var isMobile = 'ontouchstart' in window;

  targets.forEach(function(card) {
    if (card._tiltBound) return;
    card._tiltBound = true;
    card.classList.add('tilt-card');

    // Inject shine layer
    var shine = document.createElement('div');
    shine.className = 'tilt-shine';
    card.appendChild(shine);

    if (!isMobile) {
      card.addEventListener('mousemove', function(e) {
        var r = card.getBoundingClientRect();
        var x = (e.clientX - r.left) / r.width - 0.5;
        var y = (e.clientY - r.top) / r.height - 0.5;
        card.style.transform = 'rotateY(' + (x * 6) + 'deg) rotateX(' + (-y * 6) + 'deg)';
        card.style.boxShadow = (-x * 6) + 'px ' + (y * 6) + 'px 20px rgba(0,0,0,0.25)';
        shine.style.background = 'radial-gradient(circle 200px at ' + (e.clientX - r.left) + 'px ' + (e.clientY - r.top) + 'px, rgba(244,241,234,0.07), transparent)';
      });
      card.addEventListener('mouseleave', function() {
        card.style.transform = '';
        card.style.boxShadow = '';
      });
    }
  });

  // Mobile auto-float
  if (isMobile && targets.length) {
    if (_tiltRaf) cancelAnimationFrame(_tiltRaf);
    var allCards = document.querySelectorAll('.tilt-card');
    function floatLoop(t) {
      var ts = t * 0.001;
      allCards.forEach(function(card, i) {
        var shine = card.querySelector('.tilt-shine');
        var p = (i * 2.1) % 6.28;
        var s = 0.7 + (i % 3) * 0.1;
        var rx = Math.sin(ts * s + p) * 1.2;
        var ry = Math.cos(ts * s * 0.7 + p * 1.3) * 0.8;
        card.style.transform = 'rotateY(' + ry + 'deg) rotateX(' + rx + 'deg)';
        card.style.boxShadow = (-ry * 1.5) + 'px ' + (rx * 1.5) + 'px 16px rgba(0,0,0,0.2)';
        var sx = 0.5 + Math.sin(ts * s * 0.5 + p) * 0.45;
        var sy = 0.5 + Math.cos(ts * s * 0.35 + p * 1.3) * 0.45;
        if (shine) {
          shine.style.opacity = '1';
          shine.style.background = 'radial-gradient(ellipse 140% 140% at ' + (sx * 100) + '% ' + (sy * 100) + '%, rgba(244,241,234,0.08), rgba(212,165,116,0.03) 45%, transparent 85%)';
        }
      });
      _tiltRaf = requestAnimationFrame(floatLoop);
    }
    _tiltRaf = requestAnimationFrame(floatLoop);
  }
}

/* ═══════════════════════════════════════
   Punch Gradient Demo — S+ interactive punchline
   Position becomes image. Each letter's color = its X position.
   Mouse repels letters. Spring physics settle. Canvas trails.
   ═══════════════════════════════════════ */
function initPunchGradient(container) {
  var text = container.getAttribute('data-text') || '';
  var lettersDiv = container.querySelector('.punch-gradient-letters');
  var canvas = container.querySelector('canvas');
  if (!lettersDiv || !canvas || !text) return;

  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  // Lesson colors: vec3(0.95, 0.15, 0.55) → vec3(0.1, 0.85, 0.5)
  var colA = [242, 38, 140];
  var colB = [26, 217, 128];

  function lerpCol(t) {
    t = Math.max(0, Math.min(1, t));
    return 'rgb(' +
      Math.round(colA[0] + (colB[0] - colA[0]) * t) + ',' +
      Math.round(colA[1] + (colB[1] - colA[1]) * t) + ',' +
      Math.round(colA[2] + (colB[2] - colA[2]) * t) + ')';
  }

  // Build letter spans
  var chars = [];
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch === ' ') {
      var sp = document.createElement('span');
      sp.className = 'pg-char pg-space';
      sp.textContent = '\u00A0';
      lettersDiv.appendChild(sp);
      chars.push({ el: sp, isSpace: true, homeX: 0, homeY: 0, x: 0, y: 0, vx: 0, vy: 0 });
    } else {
      var s = document.createElement('span');
      s.className = 'pg-char';
      s.textContent = ch;
      lettersDiv.appendChild(s);
      chars.push({ el: s, isSpace: false, homeX: 0, homeY: 0, x: 0, y: 0, vx: 0, vy: 0 });
    }
  }

  // Physics constants
  var SPRING = 0.06;
  var DAMPING = 0.82;
  var REPULSE_R = 70;
  var REPULSE_F = 4.5;
  var mouseX = -9999, mouseY = -9999;
  var containerRect = null;
  var running = true;
  var isVisible = true;
  var trailAlpha = 0.92;
  var FPS = 30, FRAME_MS = 1000/FPS, lastDraw = 0;

  // Pause when off-screen
  if ('IntersectionObserver' in window) {
    var visObs = new IntersectionObserver(function(es){ isVisible = es[0].isIntersecting; }, { threshold:0.01 });
    visObs.observe(container);
  }

  function measure() {
    containerRect = container.getBoundingClientRect();
    var cw = containerRect.width;
    var ch = containerRect.height;
    canvas.width = cw * dpr;
    canvas.height = ch * dpr;
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    for (var i = 0; i < chars.length; i++) {
      var rect = chars[i].el.getBoundingClientRect();
      chars[i].homeX = rect.left - containerRect.left + rect.width * 0.5;
      chars[i].homeY = rect.top - containerRect.top + rect.height * 0.5;
      if (chars[i].x === 0 && chars[i].y === 0) {
        chars[i].x = chars[i].homeX;
        chars[i].y = chars[i].homeY;
      }
    }
  }

  function onPointerMove(e) {
    if (!containerRect) return;
    mouseX = e.clientX - containerRect.left;
    mouseY = e.clientY - containerRect.top;
  }
  function onPointerLeave() {
    mouseX = -9999;
    mouseY = -9999;
  }

  container.addEventListener('pointermove', onPointerMove);
  container.addEventListener('pointerleave', onPointerLeave);

  function tick(now) {
    if (!running) return;
    requestAnimationFrame(tick);
    if (!isVisible || document.hidden) return;
    if (now - lastDraw < FRAME_MS) return;
    lastDraw = now;
    if (!containerRect) measure();

    var totalW = containerRect ? containerRect.width : 400;

    // Fade canvas trails
    ctx.fillStyle = 'rgba(14,12,20,' + (1 - trailAlpha) + ')';
    ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

    for (var i = 0; i < chars.length; i++) {
      var c = chars[i];
      if (c.isSpace) continue;

      // Spring toward home
      var dx = c.homeX - c.x;
      var dy = c.homeY - c.y;
      c.vx += dx * SPRING;
      c.vy += dy * SPRING;

      // Mouse repulsion
      var mx = c.x - mouseX;
      var my = c.y - mouseY;
      var md = Math.sqrt(mx * mx + my * my);
      if (md < REPULSE_R && md > 0.1) {
        var force = (1 - md / REPULSE_R) * REPULSE_F;
        c.vx += (mx / md) * force;
        c.vy += (my / md) * force;
      }

      // Damping
      c.vx *= DAMPING;
      c.vy *= DAMPING;

      // Update position
      c.x += c.vx;
      c.y += c.vy;

      // Color = current X position normalized
      var t = Math.max(0, Math.min(1, c.x / totalW));
      var col = lerpCol(t);
      c.el.style.color = col;

      // Transform
      var offX = c.x - c.homeX;
      var offY = c.y - c.homeY;
      c.el.style.transform = 'translate(' + offX.toFixed(1) + 'px,' + offY.toFixed(1) + 'px)';

      // Canvas trail dot
      var speed = Math.sqrt(c.vx * c.vx + c.vy * c.vy);
      if (speed > 0.3) {
        ctx.beginPath();
        ctx.arc(c.x, c.y, 1.5 + speed * 0.3, 0, 6.28);
        ctx.fillStyle = col;
        ctx.globalAlpha = Math.min(0.5, speed * 0.08);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  // Init
  requestAnimationFrame(function() {
    measure();
    // Set initial colors
    var totalW = containerRect ? containerRect.width : 400;
    for (var i = 0; i < chars.length; i++) {
      if (chars[i].isSpace) continue;
      var t = chars[i].homeX / totalW;
      chars[i].el.style.color = lerpCol(t);
    }
    tick();
  });

  // Resize
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      // Reset positions before re-measuring
      for (var i = 0; i < chars.length; i++) {
        chars[i].el.style.transform = '';
      }
      requestAnimationFrame(function() {
        measure();
        for (var i = 0; i < chars.length; i++) {
          chars[i].x = chars[i].homeX;
          chars[i].y = chars[i].homeY;
          chars[i].vx = 0;
          chars[i].vy = 0;
        }
      });
    }, 200);
  });

  // Cleanup on lesson change
  var obs = new MutationObserver(function() {
    if (!document.contains(container)) {
      running = false;
      obs.disconnect();
      if (visObs) visObs.disconnect();
    }
  });
  obs.observe(document.getElementById('main'), { childList: true });
}
</script>

<!-- Scatter-settle on .scatter-settle text — DOM spring physics, same font -->
<script>
(function(){
  var k=55, c=8, kR=50, cR=9, dt=1/60;
  function rand(s){var x=Math.sin(s*9301+49297)*233280;return x-Math.floor(x);}

  function initScatter(el){
    if(el._scatterDone) return;
    el._scatterDone=true;
    var text=el.textContent;
    el.textContent='';
    el.style.display='inline-block';el.style.position='relative';el.style.cursor='default';el.style.userSelect='none';el.style.webkitUserSelect='none';
    var spans=[], states=[];
    for(var i=0;i<text.length;i++){
      var sp=document.createElement('span');
      sp.textContent=text[i];
      sp.style.cssText='display:inline-block;position:relative;will-change:transform;'+(text[i]===' '?'min-width:0.3em;':'');
      el.appendChild(sp);
      states.push({settled:true});
      spans.push(sp);
    }
    el.addEventListener('mousemove',function(e){
          var rect=el.getBoundingClientRect();
          var mx=e.clientX-rect.left, my=e.clientY-rect.top;
          for(var j=0;j<spans.length;j++){
            var sr=spans[j].getBoundingClientRect();
            var cx=sr.left+sr.width/2-rect.left, cy=sr.top+sr.height/2-rect.top;
            var dx=cx-mx, dy=cy-my;
            var dist=Math.sqrt(dx*dx+dy*dy)+1;
            var push=Math.min(12, 80/dist);
            var nx=dx/dist*push, ny=dy/dist*push;
            spans[j].style.transform='translate('+nx.toFixed(1)+'px,'+ny.toFixed(1)+'px)';
            spans[j].style.transition='transform 0.15s ease-out';
          }
        });
        el.addEventListener('mouseleave',function(){
          for(var j=0;j<spans.length;j++){
            spans[j].style.transform='';
            spans[j].style.transition='transform 0.4s ease-out';
          }
        });
  }

  var obs=new MutationObserver(function(){
    setTimeout(function(){
      document.querySelectorAll('.scatter-settle').forEach(function(el){initScatter(el);});
    },200);
  });
  var main=document.getElementById('main');
  if(main) obs.observe(main,{childList:true});
  setTimeout(function(){
    document.querySelectorAll('.scatter-settle').forEach(function(el){initScatter(el);});
  },300);
})();
</script>
