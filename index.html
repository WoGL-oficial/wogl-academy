* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

/* ===== LANGUAGE TOGGLE (header) ===== */

}

/* ===== SIDEBAR ===== */

    explain: {
      es: '<p>Hace dos lecciones le aplicaste <code>sin()</code> al tiempo y el brillo subía y bajaba. Ahora le aplicas <code>sin()</code> a la <strong>posición</strong> — y aparecen <em>rayas</em>.</p><p>¿Por qué? Porque <code>sin(p.x * 10)</code> oscila entre -1 y 1 a medida que <code>p.x</code> cambia. Así que de izquierda a derecha, el valor sube, baja, sube, baja... y eso son rayas.</p><div class="glossary"><span class="glossary-label">El número 10</span>Es la <em>frecuencia</em>. Más alto, más rayas. Más bajo, menos rayas. Pruébalo: cambia <code>10.</code> por <code>50.</code> (muchísimas rayas finas) o por <code>3.</code> (poquitas rayas gordas).</div><p>Le sumamos <code>T</code> al final (<code>+ T</code>) para que las rayas <em>se muevan</em>. Sin eso son rayas estáticas. Con eso son rayas que fluyen.</p><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>p.x</code> por <code>p.y</code> — las rayas se vuelven horizontales. Cambia <code>+ T</code> por <code>- T</code> — las rayas van en la otra dirección.</span></div>',
      en: '<p>Two lessons ago you applied <code>sin()</code> to time and the brightness went up and down. Now you apply <code>sin()</code> to the <strong>position</strong> — and <em>stripes</em> appear.</p><p>Why? Because <code>sin(p.x * 10)</code> oscillates between -1 and 1 as <code>p.x</code> changes. So from left to right, the value goes up, down, up, down... and those are stripes.</p><div class="glossary"><span class="glossary-label">The number 10</span>It is the <em>frequency</em>. Higher means more stripes. Lower means fewer stripes. Try it: change <code>10.</code> to <code>50.</code> (tons of thin stripes) or to <code>3.</code> (a few thick ones).</div><p>We add <code>T</code> at the end (<code>+ T</code>) so the stripes <em>move</em>. Without it they are static stripes. With it they flow.</p><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>p.x</code> to <code>p.y</code> — the stripes become horizontal. Change <code>+ T</code> to <code>- T</code> — the stripes go the other way.</span></div>'
    },
    code: 'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  // Spatial wave pattern\n  float v = sin(p.x * 10. + T) * .5 + .5;\n  vec3 col = vec3(1., 0.5, 0.2) * v;\n  gl_FragColor = vec4(col, 1.);\n}'
  },

  // ===== 09 =====
  { num:'09',
    title: { es: 'El círculo', en: 'The circle' },
    desc: { es: 'length() te dice qué tan lejos estás del centro.', en: 'length() tells you how far you are from the center.' },
    explain: {
      es: '<p>Para hacer un <strong>círculo</strong> necesitas saber: <em>¿qué tan lejos está cada pixel del centro?</em></p><p>La función <code>length(p)</code> te lo dice. Si el pixel está en el centro, devuelve <em>0</em>. Si está en una esquina, devuelve algo como <em>1.4</em>.</p><p>Si tomas esa distancia y dices "los pixeles que estén a menos de <em>0.5</em> son blancos, los demás negros" — tienes un círculo perfecto.</p><div class="glossary"><span class="glossary-label">smoothstep()</span>Hace una transición suave entre dos valores. <code>smoothstep(0.5, 0.45, d)</code> dice: cuando <em>d</em> es 0.5, da 0. Cuando es 0.45, da 1. Y entre medio, una transición suave. Sin esto, el borde del círculo se ve pixelado. Con esto, mantequilloso.</div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>0.5</code> a <code>0.8</code> (círculo más grande) o a <code>0.2</code> (círculo más chico). Cambia el <code>sin(T)</code> que multiplica al radio a <code>sin(T*5.)</code> para que pulse rápido.</span></div>',
      en: '<p>To make a <strong>circle</strong> you need to know: <em>how far is each pixel from the center?</em></p><p>The function <code>length(p)</code> tells you. If the pixel is at the center, it returns <em>0</em>. If it is in a corner, it returns something like <em>1.4</em>.</p><p>If you take that distance and say "pixels closer than <em>0.5</em> are white, the rest are black" — you have a perfect circle.</p><div class="glossary"><span class="glossary-label">smoothstep()</span>Makes a smooth transition between two values. <code>smoothstep(0.5, 0.45, d)</code> says: when <em>d</em> is 0.5, give 0. When it is 0.45, give 1. And in between, a smooth curve. Without this, the circle edge looks pixelated. With it, buttery smooth.</div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>0.5</code> to <code>0.8</code> (bigger circle) or <code>0.2</code> (smaller circle). Change the <code>sin(T)</code> that multiplies the radius to <code>sin(T*5.)</code> to make it pulse fast.</span></div>'
    },
    code: 'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float d = length(p);\n  // Pulsing radial mask\n  float r = 0.5 + 0.1 * sin(T);\n  float circ = smoothstep(r, r - 0.02, d);\n  vec3 col = vec3(1., 0.7, 0.3) * circ;\n  gl_FragColor = vec4(col, 1.);\n}'
  },

  // ===== 10 =====
  { num:'10',
    title: { es: 'Tu primera obra', en: 'Your first piece' },
    desc: { es: 'Junta todo lo que aprendiste.', en: 'Bring together everything you learned.' },
    finale: true,
    explain: {
      es: '<p>Esta lección no enseña nada nuevo. <strong>Junta todo lo anterior</strong>: coordenadas centradas, el tiempo, ondas, círculos, colores que cambian.</p><p>Mira el código. Cada línea ya la conoces:</p><ul style="list-style:none; padding-left:0; margin:18px 0;"><li style="padding:6px 0; font-family:var(--font-mono); font-size:13px; color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">vec2 p = ...</code> &nbsp; coordenadas centradas (lección 06)</li><li style="padding:6px 0; font-family:var(--font-mono); font-size:13px; color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">length(p)</code> &nbsp; distancia al centro (lección 09)</li><li style="padding:6px 0; font-family:var(--font-mono); font-size:13px; color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(d * 8. - T)</code> &nbsp; ondas que se mueven (lección 08)</li><li style="padding:6px 0; font-family:var(--font-mono); font-size:13px; color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">mix(c1, c2, ...)</code> &nbsp; mezclar dos colores (lección 05)</li></ul><p><em>Esta es tu primera obra.</em> Anillos concéntricos que pulsan, hechos con todo lo que aprendiste en una hora.</p><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>8.</code> a <code>20.</code> para anillos finos. Cambia los dos colores. Cambia el <code>T</code> por <code>T*3.</code> para que pulse rápido. <em>Esta es tu obra ahora.</em> Hazla tuya.</span></div>',
      en: '<p>This lesson does not teach anything new. It <strong>brings everything together</strong>: centered coordinates, time, waves, circles, colors that change.</p><p>Look at the code. You already know every line:</p><ul style="list-style:none; padding-left:0; margin:18px 0;"><li style="padding:6px 0; font-family:var(--font-mono); font-size:13px; color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">vec2 p = ...</code> &nbsp; centered coordinates (lesson 06)</li><li style="padding:6px 0; font-family:var(--font-mono); font-size:13px; color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">length(p)</code> &nbsp; distance to center (lesson 09)</li><li style="padding:6px 0; font-family:var(--font-mono); font-size:13px; color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(d * 8. - T)</code> &nbsp; moving waves (lesson 08)</li><li style="padding:6px 0; font-family:var(--font-mono); font-size:13px; color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">mix(c1, c2, ...)</code> &nbsp; blend two colors (lesson 05)</li></ul><p><em>This is your first piece.</em> Concentric rings that pulse, made with everything you learned in an hour.</p><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>8.</code> to <code>20.</code> for thin rings. Change both colors. Change <code>T</code> to <code>T*3.</code> to make it pulse fast. <em>This is your piece now.</em> Make it yours.</span></div>'
    },
    celebrateTitle: { es: 'Hace una hora no sabías programar.', en: 'An hour ago you did not know how to code.' },
    celebrateText: { es: 'Ahora hiciste anillos que pulsan con código que tú escribiste. <em>Eso es ser shader artist.</em> Lo siguiente es la sección de <strong>Patrones</strong> — vas a aprender a hacer rayas, espirales, mandalas. Cuando estés listo.', en: 'Now you made pulsing rings with code you wrote yourself. <em>That is being a shader artist.</em> Next up is the <strong>Patterns</strong> section — you will learn to make stripes, spirals, mandalas. Whenever you are ready.' },
    code: 'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float d = length(p);\n  float v = sin(d * 8. - T * 2.) * .5 + .5;\n  vec3 c1 = vec3(1., 0.4, 0.2);\n  vec3 c2 = vec3(0.3, 0.6, 1.);\n  vec3 col = mix(c1, c2, v);\n  col *= 1. - d * 0.6;  // edge vignette\n  gl_FragColor = vec4(col, 1.);\n}'
  },

];

// ============================================================
// Shader preamble
// ============================================================
var VERT = 'attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}';
var HEAD = [
  'precision mediump float;',
  'uniform float T;', 'uniform vec2 R;', 'uniform vec2 M;',
].join('\n');

// ============================================================
// State
// ============================================================
var currentIdx = 0;
var visited = new Set();
var currentRenderer = null;

function el(tag, attrs, kids) {
  var e = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.indexOf('on') === 0) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if (kids) {
    if (typeof kids === 'string') e.textContent = kids;
    else kids.forEach(function(c){ if (c) e.appendChild(c); });
  }
  return e;
}

// ============================================================
// Language initialization
// ============================================================
function initLanguage() {
  // Default to Spanish if no language saved
  if (!lang) lang = 'es';
  document.documentElement.lang = lang === 'en' ? 'en' : 'es';
  bootAcademy();
}

function updateLangToggle() {
  document.querySelectorAll('.lang-toggle-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });
}

function switchLanguage(newLang) {
  lang = newLang;
  localStorage.setItem('wogl-lang', lang);
  document.documentElement.lang = lang === 'en' ? 'en' : 'es';
  // Update page title
  document.title = lang === 'en' ? 'WoGL Learn · Start Here' : 'WoGL Aprende · Start Here';
  // Rebuild everything
  updateLangToggle();
  updateSidebarText();
  rebuildToc();
  rebuildKit();
  renderLesson();
  updateProgress();
}

function updateSidebarText() {
  document.getElementById('sideTag').textContent = t(UI.sideTag);
  document.getElementById('sideTitle').textContent = t(UI.sideTitle);
  document.getElementById('sideSub').textContent = t(UI.sideSub);
  document.getElementById('sideLessonsLabel').textContent = t(UI.lessonsLabel);
  document.getElementById('sideKitLabel').textContent = t(UI.kitLabel);
  document.getElementById('headerTagline').textContent = t(UI.headerTagline);
}

// ============================================================
// Sidebar navigation
// ============================================================
function rebuildToc() {
  var toc = document.getElementById('toc');
  toc.innerHTML = '';
  LESSONS.forEach(function(lesson, i) {
    var item = el('div', { class:'toc-item', 'data-idx':i }, [
      el('span', { class:'toc-num' }, lesson.num),
      el('span', { class:'toc-name' }, t(lesson.title)),
      el('span', { class:'toc-mark' }, '')
    ]);
    item.addEventListener('click', function(){ goTo(i); });
    toc.appendChild(item);
  });
}

function rebuildKit() {
  var kitList = document.getElementById('kitList');
  kitList.innerHTML = '';
  KIT.forEach(function(item, i) {
    var lessonText = (currentIdx + 1 >= item.unlock)
      ? t(UI.learnedAt) + ' ' + String(item.unlock).padStart(2,'0')
      : t(UI.unlockAt) + ' ' + String(item.unlock).padStart(2,'0');
    var isUnlocked = currentIdx + 1 >= item.unlock;
    var card = el('div', { class:'kit-card ' + (isUnlocked ? 'unlocked' : 'locked'), 'data-unlock': item.unlock }, [
      el('div', { class:'kit-card-title' }, t(item.title)),
      el('pre', { class:'kit-card-code' }, item.code),
      el('p', { class:'kit-card-explain' }, t(item.explain)),
      el('div', { class:'kit-card-lesson' }, lessonText)
    ]);
    kitList.appendChild(card);
  });
}

function buildSidebar() {
  rebuildToc();
  rebuildKit();
}

function updateProgress() {
  var done = visited.size;
  document.getElementById('progressText').textContent = done + ' / ' + LESSONS.length;
  document.getElementById('progressBar').style.width = (done / LESSONS.length * 100) + '%';

  document.querySelectorAll('.toc-item').forEach(function(item){
    var idx = parseInt(item.getAttribute('data-idx'));
    item.classList.toggle('active', idx === currentIdx);
    item.classList.toggle('done', visited.has(idx));
    var mark = item.querySelector('.toc-mark');
    mark.textContent = visited.has(idx) ? '✓' : '';
  });

  // Unlock kit cards by lesson index
  document.querySelectorAll('.kit-card').forEach(function(card){
    var unlock = parseInt(card.getAttribute('data-unlock'));
    if (currentIdx + 1 >= unlock) {
      card.classList.add('unlocked');
      card.classList.remove('locked');
      var lessonLabel = card.querySelector('.kit-card-lesson');
      if (lessonLabel) lessonLabel.textContent = t(UI.learnedAt) + ' ' + String(unlock).padStart(2,'0');
    }
  });
}

// ============================================================
// Lesson renderer
// ============================================================
function goTo(idx) {
  if (idx < 0 || idx >= LESSONS.length) return;
  if (currentRenderer) currentRenderer.destroy();
  currentIdx = idx;
  visited.add(idx);
  renderLesson();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderLesson() {
  var lesson = LESSONS[currentIdx];
  var main = document.getElementById('main');
  main.innerHTML = '';

  // Breadcrumb
  main.appendChild(el('div', { class:'crumb' }, [
    el('span', null, t(UI.crumbLearn)),
    el('span', { class:'sep' }, '›'),
    el('span', null, 'Start Here'),
    el('span', { class:'sep' }, '›'),
    el('span', null, t(UI.crumbLesson) + ' ' + lesson.num)
  ]));

  // Welcome banner (lesson 01 only)
  if (lesson.welcome) {
    main.appendChild(el('div', { class:'welcome-banner' }, [
      el('div', { class:'welcome-eyebrow' }, t(SECTION_DATA.welcome.eyebrow)),
      el('h2', { class:'welcome-title' }, t(SECTION_DATA.welcome.title)),
      el('p', { class:'welcome-text', html: t(SECTION_DATA.welcome.text) })
    ]));
  }

  // Lesson header
  main.appendChild(el('div', { class:'lesson-num-big' }, lesson.num));
  main.appendChild(el('h1', { class:'lesson-title-big' }, t(lesson.title)));
  main.appendChild(el('p', { class:'lesson-desc-big' }, t(lesson.desc)));

  // Tips banner (lesson 01 only)
  if (lesson.welcome) {
    main.appendChild(el('div', { class:'tips-banner' }, [
      el('span', { class:'tips-icon' }, t(UI.tipsIcon)),
      el('p', { class:'tips-text', html: t(SECTION_DATA.tips) })
    ]));
  }

  // Explanation content
  main.appendChild(el('div', { class:'explain', html: t(lesson.explain) }));

  // Interactive sandbox
  main.appendChild(el('div', { class:'sandbox-label' }, t(UI.sandboxLabel)));

  // Canvas + editor
  var canvas = el('canvas');
  var errEl = el('div', { class:'err' });
  var canvasWrap = el('div', { class:'canvas-wrap' }, [canvas, errEl, el('div', { class:'badge' }, 'live · webgl')]);
  var statusEl = el('span', { class:'editor-status' }, t(UI.editorCompiled));
  var textarea = el('textarea', { spellcheck:'false', id:'shader-editor', name:'shader-editor' });
  textarea.value = lesson.code;
  var editor = el('div', { class:'editor' }, [
    el('div', { class:'editor-head' }, [
      el('span', { class:'editor-label' }, t(UI.editorLabel)),
      statusEl
    ]),
    textarea
  ]);
  main.appendChild(el('div', { class:'sandbox' }, [canvasWrap, editor]));

  // WebGL compile loop
  setTimeout(function(){
    currentRenderer = createRenderer(canvas, lesson.code, statusEl, errEl);
    var debounce;
    textarea.addEventListener('input', function(){
      clearTimeout(debounce);
      debounce = setTimeout(function(){
        if (currentRenderer) currentRenderer.recompile(textarea.value);
      }, 250);
    });
  }, 50);

  // Action buttons
  var btnCopy = el('button', { class:'btn' }, [el('span', { class:'icon' }, '⧉'), el('span', null, t(UI.btnCopy))]);
  var btnReset = el('button', { class:'btn' }, [el('span', { class:'icon' }, '↺'), el('span', null, 'Reset')]);

  var btnNextLabel, btnNextIcon;
  if (lesson.finale) {
    btnNextLabel = t(UI.btnCompleted);
    btnNextIcon = '✓';
  } else if (currentIdx < LESSONS.length - 1) {
    btnNextLabel = t(UI.btnNext);
    btnNextIcon = '→';
  } else {
    btnNextLabel = t(UI.btnCompletedAlt);
    btnNextIcon = '✓';
  }
  var btnNext = el('button', { class:'btn primary' }, [
    el('span', null, btnNextLabel),
    el('span', { class:'icon' }, btnNextIcon)
  ]);

  btnCopy.addEventListener('click', function(){
    navigator.clipboard.writeText(textarea.value).then(function(){
      var l = btnCopy.querySelector('span:last-child');
      var o = l.textContent; l.textContent = t(UI.btnCopied);
      btnCopy.classList.add('copied');
      setTimeout(function(){ l.textContent = o; btnCopy.classList.remove('copied'); }, 1400);
    });
  });
  btnReset.addEventListener('click', function(){
    textarea.value = lesson.code;
    if (currentRenderer) currentRenderer.recompile(lesson.code);
  });
  btnNext.addEventListener('click', function(){
    if (currentIdx < LESSONS.length - 1) goTo(currentIdx + 1);
  });

  main.appendChild(el('div', { class:'actions' }, [btnCopy, btnReset, btnNext]));

  // Completion card (lesson 10 only)
  if (lesson.finale) {
    main.appendChild(el('div', { class:'celebrate' }, [
      el('div', { class:'celebrate-eyebrow' }, t(UI.celebrateEyebrow)),
      el('h3', { class:'celebrate-title' }, t(lesson.celebrateTitle)),
      el('p', { class:'celebrate-text', html: t(lesson.celebrateText) })
    ]));
  }

  // Prev / next navigation
  var prevArrow = el('div', { class:'nav-arrow' + (currentIdx === 0 ? ' disabled' : '') }, [
    el('span', { class:'nav-arrow-label' }, t(UI.navPrev)),
    el('span', { class:'nav-arrow-name' }, currentIdx > 0 ? t(LESSONS[currentIdx-1].title) : '—')
  ]);
  var nextArrow = el('div', { class:'nav-arrow next' + (currentIdx === LESSONS.length - 1 ? ' disabled' : '') }, [
    el('span', { class:'nav-arrow-label' }, t(UI.navNext)),
    el('span', { class:'nav-arrow-name' }, currentIdx < LESSONS.length - 1 ? t(LESSONS[currentIdx+1].title) : '—')
  ]);
  prevArrow.addEventListener('click', function(){ if (currentIdx > 0) goTo(currentIdx - 1); });
  nextArrow.addEventListener('click', function(){ if (currentIdx < LESSONS.length - 1) goTo(currentIdx + 1); });

  main.appendChild(el('div', { class:'nav-bottom' }, [prevArrow, nextArrow]));
}

// ============================================================
// WebGL renderer
// ============================================================
function createRenderer(canvas, code, statusEl, errEl) {
  var gl = canvas.getContext('webgl', { antialias:true, alpha:false });
  if (!gl) return null;
  var prog = null, uT, uR, uM;
  var dpr = Math.max(window.devicePixelRatio || 1, window.innerWidth < 768 ? 1.25 : 1.5);
  var mouseX = 0.5, mouseY = 0.5;
  var paused = false, isVisible = true, isInViewport = true;
  var FPS = 30, FRAME = 1000/FPS, lastDraw = 0;
  var startTime = performance.now();

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  function recompile(src) {
    var fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, HEAD + '\n' + src);
    gl.compileShader(fs);
    if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
      var err = gl.getShaderInfoLog(fs); gl.deleteShader(fs);
      if (statusEl) { statusEl.textContent = 'error'; statusEl.classList.add('error'); }
      if (errEl) { errEl.textContent = err; errEl.classList.add('show'); }
      return false;
    }
    var vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, VERT); gl.compileShader(vs);
    var newProg = gl.createProgram();
    gl.attachShader(newProg, vs); gl.attachShader(newProg, fs);
    gl.bindAttribLocation(newProg, 0, 'a');
    gl.linkProgram(newProg);
    if (prog) gl.deleteProgram(prog);
    prog = newProg;
    gl.useProgram(prog);
    uT = gl.getUniformLocation(prog, 'T');
    uR = gl.getUniformLocation(prog, 'R');
    uM = gl.getUniformLocation(prog, 'M');
    if (statusEl) { statusEl.textContent = t(UI.editorCompiled); statusEl.classList.remove('error'); }
    if (errEl) errEl.classList.remove('show');
    return true;
  }
  recompile(code);

  function resize() {
    var rect = canvas.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  canvas.addEventListener('mousemove', function(e){
    var rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) / rect.width;
    mouseY = 1 - (e.clientY - rect.top) / rect.height;
  });
  document.addEventListener('visibilitychange', function(){ isVisible = !document.hidden; });
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(es){ isInViewport = es[0].isIntersecting; }, { threshold:0.01 });
    obs.observe(canvas);
  }

  var rafId;
  function frame(now) {
    rafId = requestAnimationFrame(frame);
    if (paused || !isVisible || !isInViewport || !prog) return;
    if (now - lastDraw < FRAME) return;
    lastDraw = now;
    gl.uniform1f(uT, (now - startTime) * 0.001);
    gl.uniform2f(uR, canvas.width, canvas.height);
    gl.uniform2f(uM, mouseX, mouseY);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  rafId = requestAnimationFrame(frame);

  return {
    recompile: recompile,
    destroy: function(){ paused = true; cancelAnimationFrame(rafId); }
  };
}

// ============================================================
// Boot academy after language is selected
// ============================================================
function bootAcademy() {
  // Update page title
  document.title = lang === 'en' ? 'WoGL Learn · Start Here' : 'WoGL Aprende · Start Here';
  updateLangToggle();
  updateSidebarText();
  buildSidebar();
  goTo(0);
}

// ============================================================
// Bootstrap
// ============================================================
document.addEventListener('DOMContentLoaded', function(){
  // Language toggle click handlers
  document.querySelectorAll('.lang-toggle-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var newLang = btn.getAttribute('data-lang');
      if (newLang !== lang) switchLanguage(newLang);
    });
  });

  initLanguage();

  // Arrow key navigation
  document.addEventListener('keydown', function(e){
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') goTo(currentIdx + 1);
    if (e.key === 'ArrowLeft') goTo(currentIdx - 1);
  });
});
