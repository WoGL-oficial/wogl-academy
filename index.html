<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WoGL Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #03020a;
  --bg-lift: #07061a;
  --bg-deep: #000;
  --bg-side: rgba(3,4,14,0.45);
  --ink: #f2efe8;
  --ink-soft: #c0bcc0;
  --ink-mute: #8a8690;
  --ink-faint: #686470;
  --gold: #d4a8a0;
  --copper: #a87060;
  --green: rgb(180, 220, 150);
  --line: rgba(212, 168, 160, 0.14);
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --side-w: 320px;
  --sidebar-slim: 80px;
  --accent: #a8e4dc;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background:var(--bg); }
body { background:transparent; color:var(--ink); font-family:var(--font-body); font-weight:400; min-height:100vh; min-height:100dvh; -webkit-font-smoothing:antialiased; }

/* Background — Cisne */
.bg-fbm {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  z-index:0; pointer-events:none;
}
.bg-fbm canvas { width:100%; height:100%; display:block; }
::selection { background:rgba(212,184,150,.25); }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(232,217,192,.10); border-radius:3px; }

/* ===== LANGUAGE TOGGLE (header) ===== */
.lang-toggle {
  display:flex; align-items:center; gap:2px;
  margin-left:16px; flex-shrink:0;
}
.lang-toggle-btn {
  background:transparent; border:0; outline:0;
  font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px;
  color:var(--ink-faint); padding:6px 10px; cursor:pointer;
  transition:all 0.3s var(--ease); text-transform:uppercase;
}
.lang-toggle-btn.active {
  color:#e8c89a;
}
.lang-toggle-btn:hover:not(.active) {
  color:var(--ink-soft);
}

/* ===== LAYOUT ===== */
.app { display:grid; grid-template-columns:var(--side-w) 1fr; min-height:100vh; min-height:100dvh; position:relative; z-index:1; transition:grid-template-columns 300ms cubic-bezier(0.4, 0, 0.2, 1); }
@media (max-width:1100px) { .app { grid-template-columns:1fr; } }

/* ===== SIDEBAR ===== */
.side {
  background:var(--bg-side); border-right:1px solid var(--line);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  position:sticky; top:60px; height:calc(100vh - 60px); height:calc(100dvh - 60px);
  overflow-y:auto; display:flex; flex-direction:column;
  width:var(--side-w); transition:width 300ms cubic-bezier(0.4, 0, 0.2, 1);
}
/* side-head removed — replaced by drawer system */

/* ===== MOBILE: sidebar becomes top navbar ===== */
/* Mobile section tabs — only visible on small screens */
.mobile-sec-tabs {
  display:none; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none;
  border-bottom:1px solid var(--line); flex-shrink:0;
}
.mobile-sec-tabs::-webkit-scrollbar { display:none; }
.mobile-sec-tab {
  flex:0 0 auto; padding:12px 18px; text-align:center;
  font-family:var(--font-body); font-size:12px; font-weight:400; color:var(--ink-faint);
  cursor:pointer; border-bottom:2px solid transparent; transition:all .3s;
  white-space:nowrap;
}
.mobile-sec-tab:hover { color:var(--ink-soft); }
.mobile-sec-tab.active { color:var(--ink); border-bottom-color:var(--accent); }

@media (max-width:1100px) {
  .app { display:flex; flex-direction:column; }
  .side {
    position:sticky; top:60px; z-index:400;
    height:auto; border-right:0; border-bottom:1px solid var(--line);
    background:rgba(5,4,16,0.95); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    overflow-y:visible; overflow-x:hidden; width:100% !important;
  }
  .side .side-top-tabs { border-top:none; }
  .side .drawer-list { display:none; }
  .mobile-sec-tabs { display:flex; }
}

/* Mobile lesson overlay */
.mobile-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(2,1,10,0.90); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  flex-direction:column; align-items:center; justify-content:center;
  padding:20px;
}
.mobile-overlay.open { display:flex; }
.mobile-overlay-head {
  font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--ink-mute);
  text-transform:uppercase; margin-bottom:20px;
}
.mobile-overlay-list {
  width:100%; max-width:340px; display:flex; flex-direction:column; gap:2px;
  max-height:70vh; overflow-y:auto;
}
.mobile-overlay-item {
  display:grid; grid-template-columns:28px 1fr auto; align-items:center; gap:10px;
  padding:14px 20px; cursor:pointer; border-left:2px solid transparent;
  transition:all .2s var(--ease);
}
.mobile-overlay-item:hover { background:rgba(232,217,192,.04); border-left-color:var(--copper); }
.mobile-overlay-item.active { background:rgba(212,184,150,.06); border-left-color:var(--gold); }
.mobile-overlay-item .mo-num { font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); }
.mobile-overlay-item.active .mo-num { color:var(--gold); }
.mobile-overlay-item .mo-name { font-family:var(--font-body); font-size:14px; font-weight:400; color:var(--ink-soft); }
.mobile-overlay-item.active .mo-name { color:var(--ink); font-weight:400; }
.mobile-overlay-item .mo-check { font-family:var(--font-mono); font-size:10px; color:var(--green); }
.mobile-overlay-close {
  margin-top:24px; padding:10px 24px;
  font-family:var(--font-mono); font-size:10px; letter-spacing:2px; color:var(--ink-faint);
  cursor:pointer; text-transform:uppercase; transition:color .3s;
}
.mobile-overlay-close:hover { color:var(--gold); }
.side-subtitle { font-family:var(--font-body); font-weight:400; font-size:13px; color:var(--ink-soft); margin-top:8px; line-height:1.4; letter-spacing:.01em; }
.side-progress { margin-top:18px; display:flex; align-items:center; gap:10px; font-family:var(--font-mono); font-size:10px; color:var(--ink-mute); letter-spacing:1.5px; }
.side-progress .bar { flex:1; height:2px; background:var(--line); position:relative; overflow:hidden; }
.side-progress .bar-fill { position:absolute; left:0; top:0; bottom:0; background:var(--gold); transition:width .6s var(--ease); }

.side-section-label {
  font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--ink-mute);
  text-transform:uppercase; padding:24px 28px 12px;
}

/* TOC */
.toc { display:flex; flex-direction:column; }
.toc-item {
  display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:14px;
  padding:14px 28px; cursor:pointer; border-left:2px solid transparent;
  transition:all .3s var(--ease);
}
.toc-item:hover { background:rgba(232,217,192,.025); border-left-color:var(--copper); }
.toc-item.active { background:rgba(212,184,150,.06); border-left-color:var(--gold); }
.toc-item.done .toc-num { color:var(--green); }
.toc-num { font-family:var(--font-mono); font-size:10px; letter-spacing:1px; color:var(--ink-faint); width:24px; }
.toc-item.active .toc-num { color:var(--gold); }
.toc-name { font-family:var(--font-body); font-size:14px; font-weight:400; color:var(--ink-soft); letter-spacing:.005em; line-height:1.3; }
.toc-item.active .toc-name { color:var(--ink); font-weight:400; }
.toc-mark { font-family:var(--font-mono); font-size:10px; color:var(--green); }

/* Top context tabs — Logic style */
.side-top-tabs { display:flex; border-bottom:1px solid var(--line); }
.side-top-tab {
  flex:1; padding:10px 8px; text-align:center;
  font-family:var(--font-mono); font-size:9px; letter-spacing:1.5px; color:var(--ink-faint);
  text-transform:uppercase; cursor:pointer; border-bottom:2px solid transparent;
  transition:all .3s var(--ease);
}
.side-top-tab:hover { color:var(--ink-soft); background:rgba(232,217,192,.02); }
.side-top-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* ── DRAWERS (accordion sections) ── */
.drawer-list {
  flex:1; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:rgba(232,217,192,0.50) transparent;
}

.drawer { border-bottom:1px solid rgba(232,217,192,0.08); }
.drawer-head {
  display:flex; align-items:center; padding:12px 20px;
  cursor:pointer; gap:10px; transition:all 200ms; user-select:none;
  border-left:3px solid rgba(212,184,150,0.5);
  background:linear-gradient(90deg, rgba(212,184,150,0.15), rgba(212,184,150,0.03) 70%, transparent);
}
.drawer-head:hover { background:linear-gradient(90deg, rgba(212,184,150,0.10), rgba(212,184,150,0.02) 80%, transparent); }
.drawer.open .drawer-head {
  border-left-color:var(--gold);
  background:linear-gradient(90deg, rgba(212,184,150,0.14), rgba(212,184,150,0.03) 80%, transparent);
  box-shadow: inset 3px 0 12px rgba(212,184,150,0.08);
}
.drawer.open .drawer-name { text-shadow: 0 0 12px rgba(212,184,150,0.35); }

.drawer-num {
  font-family:var(--font-mono); font-weight:300; font-size:10px;
  line-height:1; min-width:18px; flex-shrink:0; transition:color 200ms; letter-spacing:0.04em; opacity:0.7;
}
.drawer-name {
  font-family:var(--font-display); font-weight:500; font-size:13px;
  color:var(--gold); flex:1; letter-spacing:0.02em;
}
.drawer-progress {
  font-family:var(--font-mono); font-size:10px; color:var(--ink-mute);
  letter-spacing:1px; flex-shrink:0;
}
.drawer-chevron {
  font-family:var(--font-mono); font-size:14px; color:var(--ink-faint);
  transition:transform 250ms cubic-bezier(0.4, 0, 0.2, 1); flex-shrink:0;
}
.drawer.open .drawer-chevron { transform:rotate(90deg); }

.drawer-body { max-height:0; overflow:hidden; transition:max-height 350ms cubic-bezier(0.4, 0, 0.2, 1); }
.drawer.open .drawer-body { max-height:600px; }
.drawer-lessons { padding:4px 0 8px; }

.lesson-item {
  display:flex; align-items:center; padding:10px 20px;
  cursor:pointer; transition:all 200ms; gap:12px;
  border-left:3px solid transparent;
}
.lesson-item:hover { background:rgba(232,217,192,0.03); }
.lesson-item.active { border-left-color:var(--accent); background:linear-gradient(90deg, color-mix(in srgb, var(--accent) 12%, transparent), color-mix(in srgb, var(--accent) 3%, transparent) 80%, transparent); }
.lesson-item.active .lesson-name { color:var(--ink); font-weight:500; }
@keyframes lessonGlow {
  0%, 100% { text-shadow: 0 0 12px rgba(232,200,154,0.35), 0 0 24px rgba(232,200,154,0.15); }
  50% { text-shadow: 0 0 16px rgba(232,200,154,0.5), 0 0 32px rgba(232,200,154,0.25); }
}
.lesson-index {
  font-family:var(--font-mono); font-weight:300; font-size:9px; color:var(--ink-faint);
  min-width:18px; flex-shrink:0; text-align:right; opacity:0.6;
}
.lesson-item.active .lesson-index { opacity:1; color:var(--accent); }
.lesson-name {
  font-family:var(--font-body); font-weight:400; font-size:12px;
  color:var(--ink-soft); transition:color 200ms;
}
.lesson-item:hover .lesson-name { color:var(--ink-soft); }
.lesson-check {
  font-family:var(--font-mono); font-size:9px; color:var(--green); margin-left:auto;
}

/* Practice items */
.side-create-item {
  padding:12px 20px; cursor:pointer; border-left:2px solid transparent;
  transition:all .2s var(--ease);
}
.side-create-item:hover { background:rgba(232,217,192,.025); border-left-color:var(--copper); }
.side-create-item.active { border-left-color:var(--gold); background:rgba(232,217,192,.025); }
.side-create-item.active .side-create-name { color:var(--gold); }
.side-create-name { font-family:var(--font-body); font-size:13px; font-weight:400; color:var(--ink-soft); margin-bottom:3px; }
.side-create-desc { font-family:var(--font-body); font-size:11px; font-weight:400; color:var(--ink-faint); opacity:.7; }

/* Practice components */
.practice-intro { margin-bottom:40px; }
.practice-intro-title {
  font-family:var(--font-display); font-size:clamp(28px, 5vw, 44px); font-weight:600;
  color:var(--ink); letter-spacing:-.02em; margin-bottom:12px;
}
.practice-intro-punch {
  font-family:var(--font-body); font-size:15px; font-weight:400;
  color:var(--ink-soft); line-height:1.6;
}
.practice-gen-btn {
  display:inline-flex; align-items:center; gap:10px;
  background:transparent; border:1px solid var(--copper); color:var(--gold);
  font-family:var(--font-mono); font-size:11px; letter-spacing:2px; text-transform:uppercase;
  padding:14px 24px; cursor:pointer; transition:all .3s var(--ease);
  margin-bottom:36px;
}
.practice-gen-btn:hover { background:rgba(212,184,150,.05); border-color:var(--gold); }
.practice-gen-btn:active { transform:scale(.98); }
.template-info {
  margin-bottom:24px; padding:16px 20px;
  border-left:2px solid var(--copper);
  background:rgba(232,217,192,.02);
}
.template-label {
  font-family:var(--font-mono); font-size:8px; letter-spacing:2px; color:var(--copper);
  text-transform:uppercase; margin-bottom:8px;
}
.template-name {
  font-family:var(--font-display); font-size:20px; font-weight:400; color:var(--ink);
  margin-bottom:4px;
}
.template-desc {
  font-family:var(--font-body); font-size:13px; color:var(--ink-soft); font-weight:400;
}
.remix-card {
  margin-bottom:28px; padding:28px 28px 24px;
  border:1px solid rgba(232,180,100,.15);
  background:rgba(232,180,100,.03);
}
.remix-label {
  font-family:var(--font-mono); font-size:8px; letter-spacing:2.5px; color:var(--copper);
  text-transform:uppercase; margin-bottom:16px;
}
.remix-prompt {
  font-family:var(--font-display); font-size:clamp(20px, 3.5vw, 28px); font-weight:400;
  color:var(--ink); line-height:1.4; letter-spacing:-.01em;
  margin-bottom:12px;
}
.remix-prompt .rx-shader { color:#e8c89a; }
.remix-prompt .rx-force { color:#c89be8; }
.remix-prompt .rx-task { color:var(--ink-soft); font-weight:400; }
.remix-tags { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.remix-tag {
  font-family:var(--font-mono); font-size:9px; letter-spacing:1.5px;
  padding:4px 10px; border-radius:2px;
}
.remix-tag.given { color:var(--green); background:rgba(180,220,150,.08); border:1px solid rgba(180,220,150,.15); }
.remix-tag.todo { color:#e89b8b; background:rgba(232,155,139,.08); border:1px solid rgba(232,155,139,.15); }
.challenge-card {
  margin-bottom:28px; padding:28px 28px 24px;
  border:1px solid rgba(200,160,255,.15);
  background:rgba(200,160,255,.03);
}
.challenge-label {
  font-family:var(--font-mono); font-size:8px; letter-spacing:2.5px; color:rgba(200,160,255,.7);
  text-transform:uppercase; margin-bottom:16px;
}
.challenge-prompt {
  font-family:var(--font-display); font-size:clamp(22px, 4vw, 32px); font-weight:400;
  color:var(--ink); line-height:1.35; letter-spacing:-.01em;
  margin-bottom:16px;
}
.challenge-prompt .ch-material { color:#e8c89a; }
.challenge-prompt .ch-force { color:#c89be8; }
.challenge-prompt .ch-light { color:#8be8c0; }
.challenge-prompt .ch-shape { color:#e89b8b; }
.challenge-tags { display:flex; gap:8px; flex-wrap:wrap; }
.challenge-tag {
  font-family:var(--font-mono); font-size:9px; letter-spacing:1.5px;
  padding:4px 10px; border-radius:2px;
}
.challenge-tag.mat { color:#e8c89a; background:rgba(232,200,154,.08); border:1px solid rgba(232,200,154,.15); }
.challenge-tag.force { color:#c89be8; background:rgba(200,155,232,.08); border:1px solid rgba(200,155,232,.15); }
.challenge-tag.light { color:#8be8c0; background:rgba(139,232,192,.08); border:1px solid rgba(139,232,192,.15); }
.challenge-tag.shape { color:#e89b8b; background:rgba(232,155,139,.08); border:1px solid rgba(232,155,139,.15); }
.hint-drawers { margin-bottom:28px; }
.hint-drawer {
  border:1px solid var(--line); border-bottom:none;
  transition:background .2s var(--ease);
}
.hint-drawer:last-child { border-bottom:1px solid var(--line); }
.hint-drawer.solution-drawer .hint-head { color:var(--green); }
.hint-drawer.solution-drawer .hint-num { color:var(--green); border-color:rgba(180,220,150,.25); }
.hint-head {
  display:flex; align-items:center; gap:12px; padding:14px 18px;
  cursor:pointer; user-select:none; transition:all .2s var(--ease);
  color:var(--ink-soft);
}
.hint-head:hover { background:rgba(232,217,192,.02); color:var(--ink); }
.hint-num {
  font-family:var(--font-mono); font-size:9px; letter-spacing:1px;
  color:var(--ink-mute); border:1px solid rgba(232,217,192,.12);
  padding:2px 8px; border-radius:2px; flex-shrink:0;
}
.hint-title {
  font-family:var(--font-body); font-size:13px; font-weight:400; flex:1;
}
.hint-chevron {
  font-family:var(--font-mono); font-size:12px; color:var(--ink-faint);
  transition:transform .2s var(--ease); flex-shrink:0;
}
.hint-drawer.open .hint-chevron { transform:rotate(90deg); }
.hint-body { max-height:0; overflow:hidden; transition:max-height .3s var(--ease); }
.hint-drawer.open .hint-body { max-height:600px; }
.hint-content {
  padding:0 18px 16px 48px;
  font-family:var(--font-body); font-size:13px; line-height:1.7; color:var(--ink-soft); font-weight:400;
}
.hint-content code {
  font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep);
  color:var(--gold); padding:2px 6px; border:1px solid var(--line);
}
.hint-content pre {
  font-family:var(--font-mono); font-size:12px; line-height:1.7; color:var(--ink);
  background:var(--bg-deep); border:1px solid var(--line); padding:12px 14px; margin:10px 0 4px;
  white-space:pre-wrap; word-break:break-word; -webkit-user-select:all; user-select:all; cursor:copy;
}
.hint-content .copy-solution {
  display:inline-flex; align-items:center; gap:6px; margin-top:8px;
  background:transparent; border:1px solid var(--line); color:var(--ink-mute);
  font-family:var(--font-mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
  padding:6px 12px; cursor:pointer; transition:all .2s var(--ease);
}
.hint-content .copy-solution:hover { color:var(--gold); border-color:rgba(212,184,150,.3); }
.hint-content .copy-solution.copied { color:var(--green); border-color:rgba(180,220,150,.4); }
.hint-lesson-ref {
  font-family:var(--font-mono); font-size:10px; color:var(--copper); opacity:.8; margin-left:4px;
}

/* Progressive kit */
.kit-list { padding:0 28px 28px; display:flex; flex-direction:column; gap:12px; }
.kit-card {
  background:var(--bg-deep); border:1px solid var(--line); padding:14px; position:relative;
  opacity:.80; transition:opacity .5s var(--ease);
}
.kit-card.unlocked { opacity:1; }
.kit-card-title {
  font-family:var(--font-display); font-weight:400;
  font-size:13px; color:var(--gold); margin-bottom:8px; letter-spacing:.02em;
}
.kit-card-code {
  font-family:var(--font-mono); font-size:10.5px; line-height:1.55; color:var(--ink);
  border-left:2px solid var(--copper); padding:6px 10px; margin-bottom:8px;
  white-space:pre-wrap; word-break:break-word; -webkit-user-select:text; user-select:text;
}
.kit-card-explain { font-family:var(--font-body); font-weight:400; font-size:12px; line-height:1.5; color:var(--ink-mute); }

/* ===== MAIN ===== */
.main { padding:clamp(32px, 3vw, 64px) clamp(32px, 4vw, 80px) 80px; max-width:100%; min-width:0; overflow-x:hidden; word-wrap:break-word; box-sizing:border-box; }

.crumb {
  font-family:var(--font-mono); font-size:clamp(8px, 0.7vw, 9px); letter-spacing:clamp(2px, 0.3vw, 3px); color:var(--ink-mute);
  text-transform:uppercase; margin-bottom:clamp(16px, 1.8vw, 24px); display:flex; align-items:center; gap:clamp(6px, 0.8vw, 10px);
}
.crumb span { color:var(--ink-soft); }
.crumb .sep { color:var(--ink-faint); }

/* Card tilt — 3D mouse follow (desktop) / auto-float (mobile) */
.tilt-card {
  transform-style:preserve-3d; perspective:1200px;
  transition:transform .15s ease-out, box-shadow .15s ease-out;
  position:relative; overflow:hidden;
}
.tilt-card .tilt-shine {
  position:absolute; inset:0; pointer-events:none; z-index:1; opacity:0;
  transition:opacity .3s ease;
}
.tilt-card:hover .tilt-shine { opacity:1; }

/* Welcome banner */
.welcome-banner {
  background:linear-gradient(180deg, rgba(212,184,150,.12), rgba(168,112,76,.06));
  border:1px solid rgba(212,184,150,.25); padding:clamp(18px, 2vw, 28px) clamp(20px, 2.5vw, 32px); margin-bottom:clamp(28px, 3vw, 48px);
  display:flex; flex-direction:column; gap:14px;
}
.welcome-eyebrow {
  font-family:var(--font-mono); font-size:clamp(8px, 0.8vw, 10px); letter-spacing:clamp(2px, 0.3vw, 3px); color:var(--gold);
  text-transform:uppercase; font-weight:400;
}
.welcome-title {
  font-family:var(--font-display); font-weight:600;
  font-size:clamp(20px, 2.5vw, 28px); line-height:1.15; color:var(--ink); letter-spacing:-.01em;
}
.welcome-text {
  font-family:var(--font-body); font-size:clamp(13px, 1.1vw, 15px); line-height:1.65; color:var(--ink-soft); font-weight:400;
}
.welcome-text em { font-family:var(--font-display); font-weight:500; color:var(--gold); }

.lesson-num-big { font-family:var(--font-display); font-weight:700; font-size:clamp(64px, 5vw, 120px); line-height:1; color:var(--accent); letter-spacing:-.04em; margin-bottom:clamp(4px, 0.5vw, 12px); }
.lesson-title-big { font-family:var(--font-display); font-weight:400; font-size:clamp(36px, 4vw, 80px); line-height:1; color:var(--ink); letter-spacing:-.02em; margin-bottom:clamp(12px, 1vw, 20px); }
.lesson-desc-big { font-family:var(--font-body); font-weight:400; font-size:clamp(14px, 1.2vw, 20px); color:var(--ink-soft); margin-bottom:clamp(28px, 2.5vw, 48px); line-height:1.5; max-width:clamp(480px, 45vw, 800px); }

/* Tips */
.tips-banner {
  background:linear-gradient(180deg,rgba(168,112,76,.06),rgba(168,112,76,.02));
  border:none; border-left:3px solid var(--copper);
  padding:clamp(14px, 1.5vw, 20px) clamp(16px, 1.8vw, 24px); margin-bottom:clamp(28px, 3vw, 48px); display:flex; gap:clamp(10px, 1.2vw, 18px); align-items:flex-start;
}
.tips-icon { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; color:var(--copper); text-transform:uppercase; padding:4px 10px; border:none; flex-shrink:0; margin-top:2px; }
.tips-text { font-family:var(--font-body); font-weight:400; font-size:clamp(12px, 0.9vw, 15px); color:var(--ink-soft); line-height:1.6; }
.tips-text em { color:var(--gold); font-style:normal; font-weight:500; }
.tips-text code { font-family:var(--font-mono); font-style:normal; font-size:.88em; background:var(--bg-deep); color:var(--gold); padding:2px 6px; border:1px solid var(--line); }

/* Explain */
.explain { font-family:var(--font-body); font-size:clamp(14px, 1.1vw, 18px); line-height:1.7; color:var(--ink-soft); font-weight:400; max-width:clamp(480px, 45vw, 800px); margin-bottom:clamp(24px, 2vw, 40px); }
.explain p { margin-bottom:1em; }
.explain p:last-child { margin-bottom:0; }
.explain strong { color:var(--ink); font-weight:400; }
.explain em { font-family:var(--font-display); font-style:normal; font-weight:500; color:var(--gold); }
.explain code { font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep); color:var(--gold); padding:2px 7px; border:1px solid var(--line); }

/* Inline glossary */
.glossary {
  background:var(--bg-lift); border:none; border-left:2px solid rgba(80,140,200,0.35);
  padding:clamp(16px, 1.8vw, 24px) clamp(18px, 2vw, 28px); margin:clamp(12px, 1.2vw, 18px) 0;
  font-family:var(--font-body); font-size:clamp(12px, 1vw, 14px); line-height:1.7; color:var(--ink-soft);
}
.glossary-label {
  font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--gold);
  text-transform:uppercase; margin-bottom:10px; display:block;
}
.glossary .gold { color:var(--gold); font-weight:400; }

/* Statement hero — the emotional hook */
.statement-hero {
  font-family:var(--font-display); font-weight:500; font-size:clamp(15px, 1.3vw, 18px); line-height:1.5;
  color:var(--gold); margin:clamp(18px, 2vw, 28px) 0; letter-spacing:.01em;
}
.glossary code { font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep); color:var(--gold); padding:2px 6px; border:1px solid rgba(80,140,200,0.12); margin:0 2px; }

/* Reference block */
.ref-block {
  background:var(--bg-lift); border:none; border-left:2px solid var(--copper);
  padding:clamp(10px, 1vw, 14px) clamp(14px, 1.3vw, 18px); margin:clamp(12px, 1.2vw, 18px) 0;
  font-family:var(--font-body); font-size:clamp(12px, 1vw, 14px); line-height:1.7; color:var(--ink-soft);
}
.ref-block-label {
  font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--copper);
  text-transform:uppercase; margin-bottom:10px; display:block;
}
.ref-block code { font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep); color:var(--gold); padding:2px 6px; border:1px solid var(--line); margin:0 2px; }

/* Try it prompt */
.try-it {
  background:rgba(80,140,200,.03); border:none;
  padding:clamp(12px, 1.2vw, 16px) clamp(14px, 1.5vw, 20px); margin-top:clamp(12px, 1.2vw, 18px); margin-bottom:clamp(12px, 1.2vw, 18px);
  font-family:var(--font-body); font-size:clamp(12px, 1vw, 14px); line-height:1.55; color:var(--ink-soft);
  display:flex; gap:clamp(8px, 1vw, 14px); align-items:flex-start;
}
.try-it-icon {
  font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--green);
  text-transform:uppercase; padding:3px 8px; border:none;
  flex-shrink:0; margin-top:1px;
}
.try-it code { font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep); color:var(--green); padding:2px 6px; border:1px solid rgba(80,140,200,0.12); }
.try-it em { font-family:var(--font-display); font-style:normal; font-weight:500; color:var(--gold); }

/* Pulse prompt */
.pulse-block {
  background:rgba(80,140,200,.03); border:none;
  padding:clamp(12px, 1.2vw, 16px) clamp(14px, 1.5vw, 20px); margin-top:clamp(12px, 1.2vw, 18px); margin-bottom:clamp(12px, 1.2vw, 18px);
  font-family:var(--font-body); font-size:clamp(12px, 1vw, 14px); line-height:1.55; color:var(--ink-soft);
}
.pulse-label {
  font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:rgba(200,160,255,.85);
  text-transform:uppercase; margin-bottom:10px; display:block;
}
.pulse-block pre {
  font-family:var(--font-mono); font-size:11px; line-height:1.6; color:var(--ink);
  background:var(--bg-deep); border:1px solid rgba(80,140,200,0.12); padding:12px 14px; margin:10px 0;
  white-space:pre-wrap; word-break:break-word; -webkit-user-select:all; user-select:all; cursor:copy;
}
.pulse-block code { font-family:var(--font-mono); font-size:.88em; background:var(--bg-deep); color:rgba(200,160,255,.85); padding:2px 6px; border:1px solid rgba(80,140,200,0.12); margin:0 2px; }
.pulse-hint { font-size:13px; color:var(--ink-mute); margin-top:8px; }

/* Supernova divider — Biolum Line */
.supernova {
  position:relative; height:1px; margin:clamp(24px, 2.5vw, 40px) 0;
  background:linear-gradient(90deg, transparent, rgba(60,100,180,0.08) 20%, rgba(60,100,180,0.08) 80%, transparent);
}
.supernova::after {
  content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:80px; height:1px;
  background:radial-gradient(ellipse at center, rgba(100,180,220,0.7) 0%, rgba(60,120,200,0.3) 40%, transparent 70%);
  box-shadow:0 0 15px rgba(80,150,220,0.3), 0 0 45px rgba(60,120,200,0.12);
  animation:supernova-breathe 6s ease-in-out infinite;
}
@keyframes supernova-breathe {
  0%, 100% { width:80px; opacity:0.6; }
  30% { width:140px; opacity:0.9; }
  70% { width:100px; opacity:0.7; }
}

/* Sandbox */
/* Intro — this is alive */
.intro-alive { position:relative; padding:48px 0 56px; margin-bottom:48px; border-bottom:1px solid var(--line); overflow:hidden; }
.intro-alive-line {
  font-family:var(--font-display); font-weight:600; font-size:clamp(24px, 4vw, 40px);
  color:var(--ink); line-height:1.4; letter-spacing:-0.01em;
  clip-path:inset(0 100% 0 0); opacity:0;
  transition:clip-path 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
}
.intro-alive-line.visible { clip-path:inset(0 0% 0 0); opacity:1; }
.intro-alive-line .intro-glow { color:#e8c89a; text-shadow:0 0 40px rgba(232,200,154,0.55); }
@keyframes gradient-sweep {
  0%   { background-position:0% 50%; }
  100% { background-position:300% 50%; }
}
@keyframes sub-glow {
  0%, 100% { filter:brightness(1) drop-shadow(0 0 8px rgba(232,200,154,0.0)); }
  50% { filter:brightness(1.6) drop-shadow(0 0 30px rgba(232,200,154,0.6)); }
}
.intro-alive-sub {
  font-family:var(--font-display); font-weight:500; font-size:clamp(24px, 4vw, 40px);
  letter-spacing:-0.01em; margin-top:28px; line-height:1.4;
  background:linear-gradient(90deg, #fff8ee, #e8c89a, #d4a876, #e8c89a, #fff8ee);
  background-size:300% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gradient-sweep 3s linear infinite, sub-glow 4s ease-in-out infinite;
  clip-path:inset(0 100% 0 0); opacity:0;
  transition:clip-path 1.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease;
}
.intro-alive-sub.visible { clip-path:inset(0 0% 0 0); opacity:1; }

/* Slider + text field controls */
.controls-row { display:flex; gap:16px; align-items:flex-end; margin-bottom:20px; flex-wrap:wrap; }
.control-group { flex:1; min-width:160px; }
.control-label { font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--ink-mute); text-transform:uppercase; margin-bottom:8px; }
.control-slider {
  -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:2px;
  background:linear-gradient(90deg, #e8a060, #d070a0, #7060d0, #60b8a0, #c8a070);
  outline:none; cursor:pointer;
}
.control-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none; width:14px; height:14px;
  border-radius:50%; background:#f8f0e8; cursor:pointer;
  box-shadow:0 0 8px rgba(248,240,232,0.4);
}
.control-slider::-moz-range-thumb {
  width:14px; height:14px; border:0; border-radius:50%;
  background:#f8f0e8; cursor:pointer;
  box-shadow:0 0 8px rgba(248,240,232,0.4);
}
.control-text-field {
  background:rgba(232,217,192,0.04); border:1px solid rgba(232,217,192,0.12);
  border-radius:4px; padding:8px 14px; width:90px;
  font-family:var(--font-mono); font-size:16px; color:#e8c89a;
  text-align:center; outline:none; transition:border-color 0.3s var(--ease);
}
.control-text-field:focus { border-color:rgba(232,200,154,0.35); }

/* Code wall (lesson 1) */
.code-wall {
  background:rgba(0,0,0,0.5); border:1px solid rgba(232,217,192,0.06);
  border-radius:4px; padding:14px 18px; margin-bottom:8px;
  font-family:var(--font-mono); font-size:13px; line-height:2;
  color:rgba(232,217,192,0.6); white-space:pre; overflow-x:auto;
}
.code-wall .code-hl {
  color:#e8c89a; background:rgba(232,200,154,0.1);
  padding:1px 6px; border-radius:3px;
  border:1px solid rgba(232,200,154,0.2);
}
.code-wall-note {
  font-family:var(--font-mono); font-size:8px; letter-spacing:1px;
  color:rgba(232,217,192,0.50); margin-bottom:0;
}

/* Iridescent sandbox right panel (lesson 1) */
.iri-panel { display:flex; flex-direction:column; background:var(--bg-deep); border:1px solid var(--line); padding:0; }
.iri-panel .controls-row { padding:16px 20px 12px; border-bottom:1px solid var(--line); margin:0; }
.iri-panel .control-label { font-size:8px; margin-bottom:6px; }
.iri-panel .control-text-field { font-size:13px; padding:6px 10px; width:72px; }
.iri-panel .code-wall { border:0; border-radius:0; margin:0; flex:1; padding:20px 24px; }
.iri-panel .code-wall-note { padding:0 24px 16px; margin:0; }

.sandbox-label { font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--ink-mute); text-transform:uppercase; margin-bottom:14px; }
.sandbox { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:clamp(32px, 2.5vw, 48px); min-width:0; }
.sandbox > * { min-width:0; overflow:hidden; }
@media (max-width:1100px) { .sandbox { grid-template-columns:1fr; } }
.canvas-wrap { background:#000; border:1px solid var(--line); aspect-ratio:1/1; position:relative; overflow:hidden; max-width:100%; max-height:clamp(280px, 25vw, 500px); }
.canvas-wrap canvas { width:100%; height:100%; display:block; }
.canvas-wrap .badge { position:absolute; bottom:12px; right:14px; font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:rgba(232,217,192,.3); pointer-events:none; }
.canvas-wrap .err { position:absolute; top:14px; left:14px; right:14px; font-family:var(--font-mono); font-size:11px; color:#ff6b6b; background:rgba(0,0,0,.85); padding:8px 12px; border-left:2px solid #ff6b6b; display:none; max-height:60%; overflow-y:auto; white-space:pre-wrap; }
.canvas-wrap .err.show { display:block; }
.editor { display:flex; flex-direction:column; background:var(--bg-deep); border:1px solid var(--line); position:relative; }
.editor-wrap { position:relative; flex:1; min-height:180px; max-height:clamp(280px, 25vw, 500px); }
.editor-highlight {
  position:absolute; top:0; left:0; right:0; bottom:0;
  padding:clamp(10px, 1vw, 16px) clamp(12px, 1vw, 18px); margin:0;
  font-family:var(--font-mono); font-size:clamp(11px, 0.85vw, 14px); line-height:1.7;
  white-space:pre-wrap; word-wrap:break-word; tab-size:2; -moz-tab-size:2;
  color:transparent; pointer-events:none; overflow:auto;
}
.editor-wrap textarea {
  position:relative; z-index:1;
  width:100%; height:100%; min-height:180px;
  background:transparent; border:0; outline:0; resize:vertical;
  padding:clamp(10px, 1vw, 16px) clamp(12px, 1vw, 18px); margin:0;
  color:transparent; caret-color:var(--ink);
  font-family:var(--font-mono); font-size:clamp(11px, 0.85vw, 14px); line-height:1.7;
  white-space:pre-wrap; word-wrap:break-word; tab-size:2; -moz-tab-size:2;
  -webkit-user-select:text; user-select:text;
}
/* Opalo syntax palette */
.sh-kw { color:#e8c070; }
.sh-type { color:#d4a850; }
.sh-fn { color:#885878; }
.sh-paren { color:#d898c0; }
.sh-num { color:#e8d8a0; }
.sh-op { color:#d0c8d8; }
.sh-semi { color:rgba(232,217,192,0.50); }
.sh-comment { color:rgba(232,217,192,0.50); font-style:italic; }
.sh-plain { color:rgba(232,217,192,0.6); }

/* Buttons */
.actions { display:flex; gap:10px; flex-wrap:wrap; padding-top:24px; border-top:1px solid transparent; border-image:linear-gradient(90deg, transparent, rgba(160,140,200,0.10) 20%, rgba(180,160,220,0.16) 50%, rgba(160,140,200,0.10) 80%, transparent) 1; }
.btn { background:transparent; border:1px solid var(--line); color:var(--ink-soft); font-family:var(--font-mono); font-size:clamp(9px, 0.7vw, 11px); letter-spacing:2px; text-transform:uppercase; padding:clamp(8px, 0.7vw, 12px) clamp(14px, 1.2vw, 24px); cursor:pointer; transition:all .3s var(--ease); display:flex; align-items:center; gap:8px; font-weight:400; }
.btn:hover { color:var(--gold); border-color:rgba(212,184,150,.3); background:rgba(212,184,150,.03); }
.btn .icon { font-size:13px; opacity:.7; }
.btn.copied { color:var(--green); border-color:rgba(180,220,150,.4); }
.btn.primary { border-color:var(--copper); color:var(--gold); margin-left:auto; }
.btn.primary:hover { background:rgba(168,112,76,.10); border-color:var(--gold); }
.btn.primary.finale-practice { border-color:var(--green); color:var(--green); }
.btn.primary.finale-practice:hover { background:rgba(180,220,150,.10); border-color:var(--green); }
.btn.primary.finale-practice.unlocked {
  border-color:var(--green);
  background:rgba(180,220,150,.10);
  box-shadow: 0 0 12px rgba(180,220,150,.25), 0 0 30px rgba(180,220,150,.10);
  animation: btnBoingGreen 1.8s ease-in-out infinite;
}
@keyframes btnBoingGreen {
  0%, 100% { transform:scale(1); box-shadow: 0 0 12px rgba(180,220,150,.25), 0 0 30px rgba(180,220,150,.10); }
  15% { transform:scale(1.08); box-shadow: 0 0 20px rgba(180,220,150,.4), 0 0 45px rgba(180,220,150,.2); }
  30% { transform:scale(0.97); }
  45% { transform:scale(1.04); }
  60% { transform:scale(1); }
}
.btn.primary.unlocked {
  border-color:var(--gold);
  background:rgba(212,184,150,.08);
  box-shadow: 0 0 12px rgba(212,184,150,.2), 0 0 30px rgba(212,184,150,.08);
  animation: btnBoing 1.8s ease-in-out infinite;
}
@keyframes btnBoing {
  0%, 100% { transform:scale(1); box-shadow: 0 0 12px rgba(212,184,150,.2), 0 0 30px rgba(212,184,150,.08); }
  15% { transform:scale(1.08); box-shadow: 0 0 20px rgba(212,184,150,.35), 0 0 45px rgba(212,184,150,.15); }
  30% { transform:scale(0.97); }
  45% { transform:scale(1.04); }
  60% { transform:scale(1); }
}
@media (max-width:560px) { .btn.primary { margin-left:0; width:100%; justify-content:center; } }
@media (max-width:480px) {
  .sandbox { grid-template-columns:1fr; }
}

/* Unlock hint */
.unlock-hint {
  text-align:center; margin:clamp(10px, 1.5vw, 18px) 0;
  font-family:var(--font-mono); font-size:clamp(10px, 0.9vw, 12px);
  letter-spacing:2.5px; text-transform:uppercase;
  color:var(--gold); position:relative; display:inline-block;
  width:100%; cursor:default; user-select:none; -webkit-user-select:none;
  min-height:1.5em;
}
.unlock-hint .uhl {
  display:inline-block; position:relative; will-change:transform, opacity;
  opacity:0; transform:translateY(-30px);
  text-shadow: 0 0 12px rgba(212,184,150,0.5), 0 0 30px rgba(212,184,150,0.2);
}
.unlock-hint .uhl.dropped {
  opacity:1; transform:translateY(0);
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease-out;
}
.unlock-hint .uhl.settled {
  animation: hintGlow 3s ease-in-out infinite;
}
.unlock-hint.hidden { display:none; }
@keyframes hintGlow {
  0%, 100% { text-shadow: 0 0 8px rgba(212,184,150,0.3), 0 0 20px rgba(212,184,150,0.1); }
  50% { text-shadow: 0 0 16px rgba(212,184,150,0.6), 0 0 40px rgba(212,184,150,0.25); }
}

/* Lesson navigation */
.nav-bottom { display:flex; justify-content:space-between; align-items:center; padding-top:32px; margin-top:48px; border-top:1px solid var(--line); }
.nav-arrow { display:flex; flex-direction:column; gap:4px; cursor:pointer; padding:12px 0; font-family:var(--font-body); transition:opacity .3s; }
.nav-arrow:hover { opacity:.7; }
.nav-arrow.disabled { opacity:.50; cursor:not-allowed; pointer-events:none; }
.nav-arrow-label { font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:var(--ink-mute); text-transform:uppercase; }
.nav-arrow-name { font-family:var(--font-display); font-weight:400; font-size:clamp(14px, 1.3vw, 18px); color:var(--ink); letter-spacing:-.01em; }
.nav-arrow.next { text-align:right; }

/* Completion */
.celebrate {
  background:linear-gradient(180deg, rgba(212,184,150,.06), rgba(180,220,150,.03));
  border:1px solid rgba(212,184,150,.2);
  padding:clamp(20px, 2.5vw, 32px); margin-top:clamp(20px, 2.5vw, 32px); text-align:center;
}

var SECTION_DATA = {
  tag: UI.sideTag,
  title: UI.sideTitle,
  sub: UI.sideSub,
  welcome: {
    eyebrow: { es: 'Bienvenido', en: 'Welcome' },

    text: { es: 'Estás en el lugar correcto. En estas 10 lecciones vas a ir de cero a escribir visuales en tiempo real — degradados, ondas, círculos, patrones — todo corriendo en tu GPU con unas cuantas líneas de código. No necesitas experiencia.', en: 'You are in the right place. In these 10 lessons you will go from zero to writing real-time visuals — gradients, waves, circles, patterns — all running on your GPU with a few lines of code. No experience needed.' }
  },
  tips: { es: 'Es <em>imposible</em> romper nada aquí. En serio. Cambia cualquier número, borra una línea entera, escribe lo que quieras. Si algo truena, aparece un mensaje rojo — le das <em>Reset</em> y vuelves a empezar. Cero consecuencias. <em>La única manera de aprender es tocando.</em>', en: 'It is <em>impossible</em> to break anything here. Seriously. Change any number, delete a whole line, type whatever you want. If something breaks, a red message shows up — hit <em>Reset</em> and you are back. Zero consequences. <em>The only way to learn is by touching the code.</em>' },
};

// Sections — the 7 chapters of the academy (Life, Fractals, Raymarching, Mandelbulb coming soon)
var SECTIONS = [
  { num:'00', name: { es:'Start Here', en:'Start Here' } },
  { num:'01', name: { es:'Patterns', en:'Patterns' } },
  { num:'02', name: { es:'Forces', en:'Forces' } },
  { num:'03', name: { es:'Noise', en:'Noise' } },
  { num:'04', name: { es:'Domain Warp', en:'Domain Warp' } },
  { num:'05', name: { es:'Motion', en:'Motion' } },
];

var currentSection = '00';

// Lesson titles per section (placeholder lessons use Start Here's code)
var SECTION_LESSONS = {
  '01': [
    { num:'01', title:{es:'Sharp lines',en:'Sharp lines'}, desc:{es:'Una onda. Un corte. Barras.',en:'One wave. One cut. Bars.'},
      explain: {
        es:'<p>En Start Here hiciste una onda con <code>sin()</code> y el brillo subía y bajaba. Ahora vas a usar esa misma onda para crear <strong>rayas duras</strong>. Blanco o negro. Prendido o apagado. Sin medio.</p><p>Para eso existe <code>step()</code>. Le das un umbral y un valor. Si el valor está abajo del umbral, devuelve <em>0</em>. Si está arriba, devuelve <em>1</em>. Sin transición. Como un switch.</p><p><em>Cero o uno. Sin transición. El corte más limpio.</em></p><div class="glossary"><span class="glossary-label">step(umbral, valor)</span>Es una decisión binaria — 0 o 1. <code>step(0.5, v)</code> pregunta: ¿<code>v</code> es mayor que <code>0.5</code>? Sí = 1. No = 0. Eso convierte una onda suave en barras sólidas.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>0.5</code> dentro del <code>step()</code> a <code>0.3</code> — las barras oscuras se hacen más delgadas. A <code>0.7</code> — las claras se hacen más delgadas. Ese número controla <em>dónde corta</em>.</span></div>',
        en:'<p>In Start Here you made a wave with <code>sin()</code> and the brightness went up and down. Now you will use that same wave to create <strong>hard stripes</strong>. White or black. On or off. No in-between.</p><p>That is what <code>step()</code> does. You give it a threshold and a value. If the value is below the threshold, it returns <em>0</em>. If it is above, it returns <em>1</em>. No transition. Like a switch.</p><p><em>Zero or one. No transition. The cleanest cut.</em></p><div class="glossary"><span class="glossary-label">step(threshold, value)</span>It is a binary decision — 0 or 1. <code>step(0.5, v)</code> asks: is <code>v</code> greater than <code>0.5</code>? Yes = 1. No = 0. That turns a smooth wave into solid bars.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change the <code>0.5</code> inside <code>step()</code> to <code>0.3</code> — the dark bars get thinner. To <code>0.7</code> — the bright bars get thinner. That number controls <em>where it cuts</em>.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float wave = sin(p.x * 8.) * .5 + .5;\n  float v = step(0.5, wave);\n  vec3 a = vec3(0.0, 0.95, 0.8);\n  vec3 b = vec3(0.12, 0.0, 0.28);\n  vec3 col = mix(a, b, v);\n  col *= 0.9 + 0.1 * (1.0 - abs(p.y) * 0.3);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'02', title:{es:'Stripes',en:'Stripes'}, desc:{es:'sin() del espacio. Rayas suaves infinitas.',en:'sin() of space. Soft infinite stripes.'},
      explain: {
        es:'<p>Las rayas de la lección anterior eran <em>duras</em> — prendido o apagado. Ahora quitas el <code>step()</code> y dejas que <code>sin()</code> haga lo suyo: una onda suave que se funde entre dos colores. <strong>Rayas con degradé.</strong></p><p><em>sin() se repite para siempre. Loop infinito sin RAM.</em></p><p>Un patrón es una forma que se <em>repite</em>. Y <code>sin()</code> ya se repite — oscila eternamente. Si mapeas eso a dos colores con <code>mix()</code>, tienes <em>rayas infinitas</em>.</p><div class="glossary"><span class="glossary-label">La frecuencia</span>El número que multiplica <code>p.x</code> (el <code>6.</code>) controla cuántas rayas caben en la pantalla. Más alto = más rayas, más finas. Más bajo = menos rayas, más anchas. Es como girar la perilla de un sintonizador.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>p.x</code> por <code>p.y</code> — las rayas se vuelven horizontales. Cambia el <code>6.</code> a <code>20.</code> para rayas finas. Prueba <code>p.x + p.y</code> para rayas diagonales.</span></div>',
        en:'<p>The stripes from the last lesson were <em>hard</em> — on or off. Now you remove the <code>step()</code> and let <code>sin()</code> do its thing: a smooth wave that blends between two colors. <strong>Gradient stripes.</strong></p><p><em>sin() repeats forever. Infinite loop, no RAM.</em></p><p>A pattern is a shape that <em>repeats</em>. And <code>sin()</code> already repeats — it oscillates forever. If you map that to two colors with <code>mix()</code>, you get <em>infinite stripes</em>.</p><div class="glossary"><span class="glossary-label">Frequency</span>The number that multiplies <code>p.x</code> (the <code>6.</code>) controls how many stripes fit on the screen. Higher = more stripes, thinner. Lower = fewer stripes, thicker. It is like turning the dial on a radio tuner.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>p.x</code> to <code>p.y</code> — the stripes become horizontal. Change <code>6.</code> to <code>20.</code> for thin stripes. Try <code>p.x + p.y</code> for diagonal stripes.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float v = sin(p.x * 6.) * .5 + .5;\n  vec3 a = vec3(0.95, 0.2, 0.45);\n  vec3 b = vec3(0.08, 0.06, 0.25);\n  vec3 col = mix(a, b, v * v);\n  col *= 0.85 + 0.15 * v;\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'03', title:{es:'The grid',en:'The grid'}, desc:{es:'Espacio infinito con una función.',en:'Infinite space from one function.'},
      explain: {
        es:'<p>Hasta ahora tus rayas eran una onda continua — <code>sin()</code> se estira suave de un lado al otro. Ahora vas a aprender a <strong>cortar el espacio en celdas</strong>.</p><p><code>fract()</code> toma solo la parte decimal de un número. Si le pasas <em>3.7</em>, devuelve <em>0.7</em>. Si le pasas <em>5.2</em>, devuelve <em>0.2</em>. El resultado: las coordenadas se <em>reinician</em> cada vez que cruzan un entero. El espacio se repite.</p><p><em>fract() — el espacio se reinicia. Tiling infinito.</em></p><div class="glossary"><span class="glossary-label">fract(p * N)</span>Multiplicas las coordenadas por <code>N</code> y luego tomas <code>fract()</code>. El espacio se divide en <em>N × N</em> celdas idénticas. Cada celda va de 0 a 1. Lo que dibujes en una celda aparece en todas. <em>Infinito gratis.</em></div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>4.</code> a <code>8.</code> — más celdas, más chicas. A <code>2.</code> — pocas celdas, más grandes. Cambia <code>length(cell - 0.5)</code> por <code>cell.x</code> para ver degradés por celda en vez de círculos.</span></div>',
        en:'<p>Until now your stripes were a continuous wave — <code>sin()</code> stretches smoothly from side to side. Now you will learn to <strong>cut space into cells</strong>.</p><p><code>fract()</code> takes only the decimal part of a number. If you give it <em>3.7</em>, it returns <em>0.7</em>. If you give it <em>5.2</em>, it returns <em>0.2</em>. The result: the coordinates <em>reset</em> every time they cross an integer. Space repeats.</p><p><em>fract() — space resets. Infinite tiling.</em></p><div class="glossary"><span class="glossary-label">fract(p * N)</span>You multiply the coordinates by <code>N</code> and then take <code>fract()</code>. Space splits into <em>N × N</em> identical cells. Each cell goes from 0 to 1. Whatever you draw in one cell shows up in all of them. <em>Infinity for free.</em></div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>4.</code> to <code>8.</code> — more cells, smaller. To <code>2.</code> — fewer cells, bigger. Change <code>length(cell - 0.5)</code> to <code>cell.x</code> to see gradients per cell instead of circles.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  vec2 cell = fract(p * 4.);\n  float d = length(cell - 0.5);\n  vec3 a = vec3(1.0, 0.88, 0.1);\n  vec3 b = vec3(0.15, 0.02, 0.4);\n  vec3 col = mix(a, b, smoothstep(0.0, 0.5, d));\n  col *= 0.9 + 0.1 * (1.0 - d);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'04', title:{es:'Checkerboard',en:'Checkerboard'}, desc:{es:'Pares e impares. Dos colores, infinitas celdas.',en:'Odds and evens. Two colors, infinite cells.'},
      explain: {
        es:'<p>¿Cómo alternas dos colores en una cuadrícula? <strong>Sumas la fila y la columna.</strong> Si la suma es par, un color. Si es impar, el otro. Eso es todo.</p><p><em>mod(x, 2.) — la pregunta más simple. El patrón más antiguo.</em></p><p><code>floor()</code> redondea hacia abajo — convierte las coordenadas en números enteros. Esos números son la fila y la columna de cada celda. <code>mod()</code> te dice si la suma es par o impar.</p><div class="glossary"><span class="glossary-label">mod(x, 2.)</span>Devuelve el residuo de dividir entre 2. Si el número es par, devuelve <em>0</em>. Si es impar, devuelve <em>1</em>. Una pregunta, dos respuestas, un tablero entero.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>4.</code> a <code>8.</code> — tablero más fino. Cambia uno de los colores para que sea tu tablero. Prueba sumarle <code>+ T * 0.5</code> a <code>p.x</code> antes del <code>floor()</code> — el tablero se desliza.</span></div>',
        en:'<p>How do you alternate two colors in a grid? <strong>Add the row and the column.</strong> If the sum is even, one color. If it is odd, the other. That is it.</p><p><em>mod(x, 2.) — the simplest question. The oldest pattern.</em></p><p><code>floor()</code> rounds down — it turns coordinates into whole numbers. Those numbers are the row and column of each cell. <code>mod()</code> tells you if the sum is even or odd.</p><div class="glossary"><span class="glossary-label">mod(x, 2.)</span>Returns the remainder of dividing by 2. If the number is even, it returns <em>0</em>. If odd, it returns <em>1</em>. One question, two answers, a whole checkerboard.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>4.</code> to <code>8.</code> — finer checkerboard. Change one of the colors to make it yours. Try adding <code>+ T * 0.5</code> to <code>p.x</code> before the <code>floor()</code> — the board slides.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float check = mod(floor(p.x * 4.) + floor(p.y * 4.), 2.);\n  vec3 a = vec3(0.9, 0.4, 0.35);\n  vec3 b = vec3(0.08, 0.3, 0.35);\n  vec2 cell = fract(p * 4.);\n  float edge = smoothstep(0.48, 0.5, max(abs(cell.x - 0.5), abs(cell.y - 0.5)));\n  vec3 col = mix(a, b, check);\n  col *= 0.92 + 0.08 * edge;\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'05', title:{es:'Going polar',en:'Going polar'}, desc:{es:'atan() te da el ángulo. Otra forma de ver.',en:'atan() gives you the angle. Another way to see.'},
      explain: {
        es:'<p>Hasta ahora todo era horizontal y vertical — <code>p.x</code> y <code>p.y</code>. Pero hay otra forma de describir una posición: <strong>¿a qué ángulo estás?</strong> y <strong>¿qué tan lejos del centro?</strong></p><p>Eso son las <em>coordenadas polares</em>. En vez de izquierda-derecha y arriba-abajo, piensas en giro y distancia. Como un reloj: cada punto tiene una hora (ángulo) y una distancia al centro.</p><p><em>Mismo espacio. Otra forma de recorrerlo.</em></p><div class="glossary"><span class="glossary-label">atan(p.y, p.x)</span>Te da el ángulo del frag respecto al centro. Va de <em>-3.14</em> a <em>3.14</em> (una vuelta completa). Arriba es 1.57, a la derecha es 0, abajo es -1.57. Con esto puedes hacer <em>cualquier cosa circular</em>.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>3.</code> a <code>6.</code> — más rebanadas. A <code>1.</code> — solo un degradé que gira. Prueba sumarle <code>+ T</code> al ángulo para que todo rote lentamente. <em>Pista:</em> <code>sin(ang * 3. + T)</code></span></div>',
        en:'<p>Until now everything was horizontal and vertical — <code>p.x</code> and <code>p.y</code>. But there is another way to describe a position: <strong>what angle are you at?</strong> and <strong>how far from the center?</strong></p><p>Those are <em>polar coordinates</em>. Instead of left-right and up-down, you think in spin and distance. Like a clock: every point has an hour (angle) and a distance from the center.</p><p><em>Same space. Another way to traverse it.</em></p><div class="glossary"><span class="glossary-label">atan(p.y, p.x)</span>Gives you the angle of the frag relative to the center. It goes from <em>-3.14</em> to <em>3.14</em> (one full turn). Top is 1.57, right is 0, bottom is -1.57. With this you can make <em>anything circular</em>.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>3.</code> to <code>6.</code> — more slices. To <code>1.</code> — just a spinning gradient. Try adding <code>+ T</code> to the angle to make it all rotate slowly. <em>Hint:</em> <code>sin(ang * 3. + T)</code></span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float ang = atan(p.y, p.x);\n  float d = length(p);\n  float v = sin(ang * 3.) * .5 + .5;\n  vec3 a = vec3(0.9, 0.05, 0.55);\n  vec3 b = vec3(0.05, 0.8, 0.45);\n  vec3 col = mix(a, b, v);\n  col *= 0.7 + 0.3 * exp(-d * 0.8);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'06', title:{es:'The spiral',en:'The spiral'}, desc:{es:'Ángulo + distancia. Hipnótico.',en:'Angle + distance. Hypnotic.'},
      explain: {
        es:'<p>En la lección anterior usaste el <strong>ángulo</strong> para hacer rebanadas. Ahora le sumas la <strong>distancia</strong> al centro — y las rebanadas se tuercen. Se convierten en espiral.</p><p>El truco: donde antes tenías <code>sin(ang * 3.)</code>, ahora tienes <code>sin(ang * 3. + dist * 6.)</code>. La distancia empuja el patrón angular y lo enrolla. Más distancia = más empuje = más giro.</p><p><em>Ángulo + distancia. La curva que no termina.</em></p><div class="glossary"><span class="glossary-label">ang + dist</span>El ángulo te da la dirección. La distancia te da qué tan lejos estás del centro. Cuando los sumas dentro de un <code>sin()</code>, las rayas radiales se curvan. Es el mismo truco que usaste con <code>+ T</code> para rotar — pero ahora en vez del tiempo, es el <em>espacio</em> el que tuerce.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>6.</code> a <code>12.</code> — espiral más apretada. A <code>2.</code> — espiral suelta. Súmale <code>- T</code> al final para que gire. <em>Pista:</em> <code>sin(ang * 3. + dist * 6. - T)</code></span></div>',
        en:'<p>In the last lesson you used the <strong>angle</strong> to make slices. Now you add the <strong>distance</strong> from the center — and the slices twist. They become a spiral.</p><p>Here is the trick: where before you had <code>sin(ang * 3.)</code>, now you have <code>sin(ang * 3. + dist * 6.)</code>. The distance pushes the angular pattern and curls it. More distance = more push = more twist.</p><p><em>Angle + distance. The curve that never ends.</em></p><div class="glossary"><span class="glossary-label">ang + dist</span>The angle gives you the direction. The distance tells you how far from the center. When you add them inside a <code>sin()</code>, the radial stripes curve. It is the same trick you used with <code>+ T</code> to rotate — but now instead of time, it is <em>space</em> doing the twisting.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>6.</code> to <code>12.</code> — tighter spiral. To <code>2.</code> — loose spiral. Add <code>- T</code> at the end to make it spin. <em>Hint:</em> <code>sin(ang * 3. + dist * 6. - T)</code></span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float ang = atan(p.y, p.x);\n  float dist = length(p);\n  float v = sin(ang * 3. + dist * 6.) * .5 + .5;\n  vec3 a = vec3(0.35, 0.25, 0.6);\n  vec3 b = vec3(0.8, 0.45, 0.2);\n  vec3 col = mix(a, b, v * v);\n  col *= 0.8 + 0.2 * exp(-dist * 0.5);\n  col += vec3(0.85, 0.65, 0.4) * pow(v, 5.) * exp(-dist * 1.5) * 0.2;\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'07', title:{es:'Mirror',en:'Mirror'}, desc:{es:'abs() refleja. Una forma se vuelve cuatro.',en:'abs() reflects. One shape becomes four.'},
      explain: {
        es:'<p>Imagina que doblas un papel por la mitad. Lo que dibujas en un lado aparece en el otro. Eso es <code>abs()</code>.</p><p><code>abs()</code> convierte números negativos en positivos. Si <code>p.x</code> va de <em>-1</em> a <em>1</em>, después de <code>abs()</code> va de <em>1</em> a <em>0</em> a <em>1</em>. La mitad izquierda se vuelve un reflejo de la derecha. <strong>Simetría instantánea.</strong></p><p><em>abs() — doblas el espacio. Un shape se vuelve cuatro.</em></p><div class="glossary"><span class="glossary-label">abs(p)</span>Aplicado a las dos coordenadas, doblas el papel dos veces — horizontal y vertical. Lo que dibujas en un cuadrante aparece en los cuatro. Una forma se vuelve cuatro sin escribir nada más.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Quita el <code>abs()</code> y mira cómo se ve sin espejo. Prueba solo <code>abs(p.x)</code> en vez de <code>abs(p)</code> para un solo eje de simetría. Cambia el <code>20.</code> a <code>8.</code> para ver diamantes más grandes.</span></div>',
        en:'<p>Imagine folding a piece of paper in half. What you draw on one side shows up on the other. That is <code>abs()</code>.</p><p><code>abs()</code> turns negative numbers into positive ones. If <code>p.x</code> goes from <em>-1</em> to <em>1</em>, after <code>abs()</code> it goes from <em>1</em> to <em>0</em> to <em>1</em>. The left half becomes a mirror of the right. <strong>Instant symmetry.</strong></p><p><em>abs() — fold the space. One shape becomes four.</em></p><div class="glossary"><span class="glossary-label">abs(p)</span>Applied to both coordinates, you fold the paper twice — horizontal and vertical. What you draw in one quadrant shows up in all four. One shape becomes four without writing anything extra.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Remove the <code>abs()</code> and see what it looks like without the mirror. Try just <code>abs(p.x)</code> instead of <code>abs(p)</code> for a single axis of symmetry. Change <code>20.</code> to <code>8.</code> to see fewer, bigger diamonds.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  vec2 q = abs(p);\n  float v = sin(q.x * 16. + q.y * 16.) * .5 + .5;\n  vec3 a = vec3(0.0, 0.95, 0.55);\n  vec3 b = vec3(0.55, 0.05, 0.8);\n  vec3 col = mix(a, b, v);\n  float d = length(p);\n  col *= 0.8 + 0.2 * exp(-d * 0.6);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'08', title:{es:'Radial',en:'Radial'}, desc:{es:'sin() del ángulo. Lóbulos de luz.',en:'sin() of angle. Lobes of light.'},
      explain: {
        es:'<p>En Going polar usaste <code>sin(ang)</code> para hacer rebanadas. Ahora lo usas para <strong>deformar un círculo</strong>. Si el radio del círculo cambia según el ángulo, el círculo se convierte en forma.</p><p><em>El círculo deformado por su propio ángulo.</em></p><p>El truco: tomas <code>length(p)</code> como distancia al centro, y la comparas con un radio que oscila con el ángulo: <code>0.5 + 0.2 * sin(ang * N)</code>. Donde N es el número de lóbulos.</p><div class="glossary"><span class="glossary-label">sin(ang * N)</span>El ángulo recorre una vuelta completa. Si multiplicas por <em>5</em>, el seno oscila 5 veces en esa vuelta — 5 picos, 5 valles, <em>5 lóbulos</em>. Cambia N y cambia la forma.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>5.</code> a <code>3.</code> — 3 brazos. A <code>8.</code> — 8 lóbulos. Prueba sumarle <code>+ T</code> al ángulo para que gire. <em>Pista:</em> <code>sin(ang * 5. + T)</code></span></div>',
        en:'<p>In Going polar you used <code>sin(ang)</code> to make slices. Now you use it to <strong>deform a circle</strong>. If the radius changes with the angle, the circle becomes a shape.</p><p><em>The circle deformed by its own angle.</em></p><p>The trick: you take <code>length(p)</code> as distance from center, and compare it to a radius that oscillates with angle: <code>0.5 + 0.2 * sin(ang * N)</code>. Where N is the number of lobes.</p><div class="glossary"><span class="glossary-label">sin(ang * N)</span>The angle goes around one full turn. If you multiply by <em>5</em>, the sine oscillates 5 times — 5 peaks, 5 valleys, <em>5 lobes</em>. Change N and you change the shape.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>5.</code> to <code>3.</code> — 3 arms. To <code>8.</code> — 8 lobes. Try adding <code>+ T</code> to the angle to make it spin. <em>Hint:</em> <code>sin(ang * 5. + T)</code></span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float ang = atan(p.y, p.x);\n  float dist = length(p);\n  float r = 0.5 + 0.2 * sin(ang * 5.);\n  float v = smoothstep(r, r - 0.03, dist);\n  float glow = exp(-max(dist - r, 0.0) * 4.0) * 0.3;\n  vec3 a = vec3(1.0, 0.5, 0.7);\n  vec3 b = vec3(0.08, 0.3, 0.85);\n  vec3 col = mix(b, a, v);\n  col += a * glow;\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'09', title:{es:'Chladni',en:'Chladni'}, desc:{es:'Dos sin() multiplicados. Grilla de interferencia.',en:'Two sin() multiplied. Interference grid.'},
      explain: {
        es:'<p>Ernst Chladni ponía arena sobre una placa de metal y la hacía vibrar. La arena se movía hacia los puntos quietos y formaba patrones geométricos. <strong>Cada frecuencia produce un patrón diferente.</strong></p><p><em>Dos ondas se multiplican. La interferencia dibuja sola.</em></p><p>La fórmula es dos senos multiplicados: <code>sin(n * p.x) * sin(m * p.y)</code>. Los números <em>n</em> y <em>m</em> son los modos de vibración — cuántos nodos hay en cada dirección. Cuando sumas dos términos con n y m intercambiados, aparecen los patrones clásicos.</p><div class="glossary"><span class="glossary-label">n y m</span>Números enteros que definen la identidad del patrón. <code>2, 3</code> = circuito complejo. <code>5, 7</code> = laberinto. <code>8, 8</code> = grilla simétrica. Cuando n y m son primos entre sí, la complejidad es máxima.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>5.</code> y <code>3.</code> a <code>8., 8.</code> — patrón perfecto. A <code>2., 3.</code> — pocas celdas. A <code>7., 11.</code> — máxima complejidad. <em>Pista:</em> suma <code>+ T * 0.5</code> a los dos para que mute lentamente.</span></div>',
        en:'<p>Ernst Chladni put sand on a metal plate and made it vibrate. The sand moved to the quiet spots and formed geometric patterns. <strong>Each frequency produces a different pattern.</strong></p><p><em>Two waves multiply. Interference draws itself.</em></p><p>The formula is two sines multiplied: <code>sin(n * p.x) * sin(m * p.y)</code>. The numbers <em>n</em> and <em>m</em> are the vibration modes — how many nodes in each direction. When you add two terms with n and m swapped, the classic patterns appear.</p><div class="glossary"><span class="glossary-label">n and m</span>Whole numbers that define the pattern identity. <code>2, 3</code> = complex circuit. <code>5, 7</code> = labyrinth. <code>8, 8</code> = symmetric grid. When n and m share no common factors, complexity is maximum.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>5.</code> and <code>3.</code> to <code>8., 8.</code> — perfect pattern. To <code>2., 3.</code> — few cells. To <code>7., 11.</code> — maximum complexity. <em>Hint:</em> add <code>+ T * 0.5</code> to both to make it mutate slowly.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float n = 5.;\n  float m = 3.;\n  float z = sin(n * 3.14 * p.x) * sin(m * 3.14 * p.y)\n          + sin(m * 3.14 * p.x) * sin(n * 3.14 * p.y);\n  float v = abs(z);\n  vec3 a = vec3(0.95, 0.92, 0.85);\n  vec3 b = vec3(0.06, 0.03, 0.15);\n  vec3 col = mix(b, a, pow(v, 0.8));\n  float d = length(p);\n  col *= 0.85 + 0.15 * exp(-d * 0.4);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'10', title:{es:'Your pattern',en:'Your pattern'}, desc:{es:'Todo lo que aprendiste. Un solo shader.',en:'Everything you learned. One shader.'},
      explain: {
        es:'<p>Esta lección no enseña nada nuevo. <strong>Junta todo lo que aprendiste en Patterns</strong>: rayas, fract, polar, espiral, espejo, radiales, Chladni.</p><p><em>Tus variables. Tus frecuencias. Tu firma.</em></p><p>Mira el código. Cada línea ya la conoces:</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">abs(p)</code> &nbsp; espejo (lección 07)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">atan(p.y, p.x)</code> &nbsp; coordenadas polares (lección 05)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">1. / (d + 0.12)</code> &nbsp; túnel — 1/distance comprime al centro (Start Here 10)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(n * ang + inv * 8.)</code> &nbsp; Chladni en polar con túnel (lección 09 + 05)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">exp(-d * 2.0)</code> &nbsp; glow al centro — la luz emerge</li></ul><p><em>Este es tu patrón.</em> Hazlo tuyo.</p><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el <code>6.</code> para más o menos radiales. Cambia el <code>8.</code> para más o menos giros de la espiral. Cambia los colores. <em>Este patrón es tuyo ahora.</em></span></div><div class="supernova"></div><div class="pulse-block"><span class="pulse-label">Freebie</span>Reemplaza las dos líneas de color (<code>vec3 a</code> y <code>vec3 b</code> y el <code>mix</code>) con esta sola línea:<pre>vec3 col = iri(v * 0.4 + T * 0.05);</pre><p class="pulse-hint">Tu patrón ahora cicla por todos los colores del espectro. Automáticamente. Para siempre.</p></div>',
        en:'<p>This lesson does not teach anything new. It <strong>brings together everything you learned in Patterns</strong>: stripes, fract, polar, spiral, mirror, radials, Chladni.</p><p><em>Your variables. Your frequencies. Your signature.</em></p><p>Look at the code. You already know every line:</p><ul style="list-style:none;padding-left:0;margin:18px 0;"><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">abs(p)</code> &nbsp; mirror (lesson 07)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">atan(p.y, p.x)</code> &nbsp; polar coordinates (lesson 05)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">1. / (d + 0.12)</code> &nbsp; tunnel — 1/distance compresses to center (Start Here 10)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">sin(n * ang + inv * 8.)</code> &nbsp; Chladni in polar with tunnel (lesson 09 + 05)</li><li style="padding:6px 0;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">→ <code style="background:var(--bg-deep);padding:2px 6px;border:1px solid var(--line);">exp(-d * 2.0)</code> &nbsp; center glow — light emerges</li></ul><p><em>This is your pattern.</em> Make it yours.</p><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>6.</code> for more or fewer radials. Change <code>8.</code> for more or fewer spiral twists. Change the colors. <em>This pattern is yours now.</em></span></div><div class="supernova"></div><div class="pulse-block"><span class="pulse-label">Freebie</span>Replace the two color lines (<code>vec3 a</code> and <code>vec3 b</code> and the <code>mix</code>) with this single line:<pre>vec3 col = iri(v * 0.4 + T * 0.05);</pre><p class="pulse-hint">Your pattern now cycles through every color in the spectrum. Automatically. Forever.</p></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  vec2 q = abs(p);\n  float ang = atan(q.y, q.x);\n  float d = length(p);\n  float inv = 1. / (d + 0.12);\n  float n = 5., m = 3.;\n  float z1 = sin(n * ang + inv * 8. - T * 0.8) * sin(m * inv - T * 0.5);\n  float z2 = sin(m * ang - inv * 6. + T * 0.6) * sin(n * inv + T * 0.3);\n  float v = abs(z1 + z2);\n  vec3 a = vec3(0.92, 0.78, 0.42);\n  vec3 b = vec3(0.02, 0.015, 0.05);\n  vec3 col = mix(b, a, pow(v, 0.9));\n  col += vec3(1.0, 0.95, 0.8) * pow(v, 5.) * 0.35;\n  float glow = exp(-d * 1.8) * 0.3;\n  col += a * glow * 0.4;\n  col *= 1. - d * 0.25;\n  gl_FragColor = vec4(col, 1.);\n}',
      finale: true,
      celebrateTitle: { es:'Aprendiste a hacer patrones con código.', en:'You learned to make patterns with code.' },
      celebrateText: { es:'Rayas, cuadrículas, espirales, radiales, Chladni — todo con matemáticas que tú escribiste. <em>Lo siguiente es Forces</em> — vas a hacer que tus patrones se muevan.', en:'Stripes, grids, spirals, radials, Chladni — all with math you wrote yourself. <em>Next up is Forces</em> — you will make your patterns move.' },
    },
  ],
  '03': [
    { num:'01', title:{es:'Static',en:'Static'}, desc:{es:'El ruido crudo. Hash puro.',en:'Raw noise. Pure hash.'},
      explain: {
        es:'<p>En Forces usaste <code>fb()</code> como caja negra — generaba textura irregular y tú la movías. Ahora vamos a <strong>abrirla</strong>. Todo empieza aquí: el ruido crudo. Piensa en la estática de una TV vieja — ruido visual que llena la pantalla.</p><p><code>h2()</code> genera eso. Le das una coordenada, te devuelve un número entre 0 y 1 que parece aleatorio. <strong>Caos controlado.</strong></p><p><em>h2() genera caos. Cada celda, un dado digital.</em></p><div class="glossary"><span class="glossary-label">h2(p)</span>Un <em>hash</em>. Posición 2D entra, valor pseudo-aleatorio sale. La base de todo lo que viene — y de la <code>fb()</code> que ya conoces.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>p * 10.</code> a <code>p * 50.</code> — más fino. A <code>p * 3.</code> — bloques grandes.</span></div>',
        en:'<p>In Forces you used <code>fb()</code> as a black box — it generated irregular texture and you moved it. Now we are going to <strong>open it up</strong>. Everything starts here: raw noise. Think of the static on an old TV — visual noise filling the screen.</p><p><code>h2()</code> generates that. Give it a coordinate, it returns a number between 0 and 1 that looks random. <strong>Controlled chaos.</strong></p><p><em>h2() generates chaos. Every cell, a digital die.</em></p><div class="glossary"><span class="glossary-label">h2(p)</span>A <em>hash</em>. 2D position goes in, pseudo-random value comes out. The foundation of everything that comes next — and of the <code>fb()</code> you already know.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>p * 10.</code> to <code>p * 50.</code> — finer. To <code>p * 3.</code> — big blocks.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  vec2 grid = floor(p * 12.0);\n  float id = h2(grid);\n  float dead = step(0.92, id);\n  float scan = step(0.5, sin(gl_FragCoord.y * 1.5) * 0.5 + 0.5) * 0.12;\n  vec3 col = vec3(0.0);\n  col.r = step(0.6, h2(grid + 0.1)) * 0.8;\n  col.g = step(0.5, h2(grid + 0.2)) * 0.9;\n  col.b = step(0.55, h2(grid + 0.3)) * 0.7;\n  col *= 1.0 - dead;\n  col += vec3(0.9, 0.0, 0.4) * dead * 0.3;\n  col *= 1.0 - scan;\n  col += vec3(0.01, 0.02, 0.02);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'02', title:{es:'Smooth',en:'Smooth'}, desc:{es:'De bloques a señal.',en:'From blocks to signal.'},
      explain: {
        es:'<p>La estática es interesante pero <strong>dura</strong>. Para que sea usable necesitas suavizarla. <code>n2()</code> mezcla los bloques vecinos para que la transición sea continua.</p><p><em>La estática aprende a fluir. De bloques a señal.</em></p><div class="glossary"><span class="glossary-label">n2(p)</span>Value noise. Mezcla los 4 bloques vecinos según tu posición. Ondulaciones suaves en vez de bloques.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>4.</code> a <code>10.</code> — ondas más chicas. A <code>2.</code> — grandes.</span></div>',
        en:'<p>Static is interesting but <strong>hard</strong>. To make it usable you need to smooth it. <code>n2()</code> blends neighboring blocks so the transition is continuous.</p><p><em>Static learns to flow. From blocks to signal.</em></p><div class="glossary"><span class="glossary-label">n2(p)</span>Value noise. Blends the 4 neighboring blocks based on your position. Smooth waves instead of blocks.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>4.</code> to <code>10.</code> — smaller waves. To <code>2.</code> — bigger.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float bar = n2(vec2(p.y * 4.0, 0.5));\n  float signal = sin(p.x * 20.0 + bar * 8.0) * 0.5 + 0.5;\n  signal = smoothstep(0.3, 0.7, signal);\n  float noise = n2(p * 8.0) * 0.15;\n  vec3 col = vec3(0.0, signal * 0.85, signal * 0.65);\n  col += vec3(signal * 0.5, 0.0, signal * 0.3) * step(0.7, bar);\n  col += noise;\n  col *= 0.9 + 0.1 * step(0.5, sin(gl_FragCoord.y * 2.0) * 0.5 + 0.5);\n  col += vec3(0.015, 0.01, 0.02);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'03', title:{es:'Layers',en:'Layers'}, desc:{es:'Más capas. Más resolución.',en:'More layers. More resolution.'},
      explain: {
        es:'<p>Un solo layer de noise es liso. <strong>Apilar capas</strong> le da detalle: la primera da la forma grande, la segunda agrega textura, la tercera agrega grano. Se llaman <em>octavas</em>.</p><p><em>Bajo, medio, agudo. La señal tiene profundidad.</em></p><div class="glossary"><span class="glossary-label">Octavas</span>Cada capa duplica la frecuencia y reduce la amplitud. 3 capas se ven bien.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia el loop de <code>3</code> a <code>1</code> — solo la forma grande. A <code>5</code> — mucho detalle.</span></div>',
        en:'<p>A single layer of noise is flat. <strong>Stacking layers</strong> adds detail: the first gives the big shape, the second adds texture, the third adds grain. They are called <em>octaves</em>.</p><p><em>Bass, mids, treble. The signal has depth.</em></p><div class="glossary"><span class="glossary-label">Octaves</span>Each layer doubles the frequency and halves the amplitude. 3 layers look good.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change the loop from <code>3</code> to <code>1</code> — just the big shape. To <code>5</code> — lots of detail.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float b1 = step(0.5, sin(p.y * 6.0 + n2(vec2(p.y * 2.0, 1.0)) * 3.0) * 0.5 + 0.5);\n  float b2 = step(0.5, sin(p.y * 12.0 + n2(vec2(p.y * 4.0, 2.0)) * 3.0) * 0.5 + 0.5);\n  float b3 = step(0.5, sin(p.y * 24.0 + n2(vec2(p.y * 8.0, 3.0)) * 3.0) * 0.5 + 0.5);\n  float v = b1 * 0.5 + b2 * 0.3 + b3 * 0.2;\n  vec3 col = vec3(0.0, v * 0.8, v * 0.6);\n  col += vec3(v * 0.4, 0.0, v * 0.6) * b3;\n  col += vec3(0.8, 0.0, 0.9) * step(0.95, v) * 0.3;\n  col += vec3(0.02);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'04', title:{es:'FBM',en:'FBM'}, desc:{es:'La función core. Una línea, toda la textura.',en:'The core function. One line, all the texture.'},
      explain: {
        es:'<p>Lo que acabas de hacer a mano ya está empaquetado en <code>fb()</code> — la misma función que usaste en Forces como caja negra. Ahora sabes exactamente qué hay adentro: capas de noise apiladas. Una función, una línea, textura con detalle a todas las escalas.</p><div class="glossary"><span class="glossary-label">fb(p)</span>FBM — 4 octavas de noise apiladas y rotadas. La caja negra, abierta.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Prueba</span><span>Cambia <code>p * 3.</code> a <code>p * 8.</code> — más fino. A <code>p * 1.</code> — enorme.</span></div>',
        en:'<p>What you just built by hand is already packed in <code>fb()</code> — the same function you used in Forces as a black box. Now you know exactly what is inside: stacked layers of noise. One function, one line, texture with detail at every scale.</p><div class="glossary"><span class="glossary-label">fb(p)</span>FBM — 4 octaves of noise stacked and rotated. The black box, opened.</div><div class="supernova"></div><div class="try-it"><span class="try-it-icon">Try</span><span>Change <code>p * 3.</code> to <code>p * 8.</code> — finer. To <code>p * 1.</code> — huge.</span></div>'
      },
      code:'void main(){\n  vec2 p = (2.*gl_FragCoord.xy - R) / min(R.x, R.y);\n  float scale = 4.0 + floor(n2(vec2(floor(p.y * 3.0), 0.5)) * 4.0) * 2.0;\n  vec2 grid = floor(p * scale);\n  float id = h2(grid);\n  float fill = step(0.3, id);\n  float bright = step(0.7, id);\n  vec2 cell = fract(p * scale);\n  float border = step(0.9, max(cell.x, cell.y));\n  vec3 col = vec3(0.0, fill * 0.5, fill * 0.4);\n  col += vec3(0.0, 0.4, 0.3) * bright;\n  col += vec3(0.0, 0.7, 0.6) * border * 0.15;\n  col += vec3(0.02, 0.01, 0.03);\n  gl_FragColor = vec4(col, 1.);\n}'
    },
    { num:'05', title:{es:'Motion',en:'Motion'}, desc:{es:'Lo estático se vuelve live. Una línea.',en:'Static becomes live. One line.'},
      explain: {
